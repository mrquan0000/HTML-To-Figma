<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium HTML Card Mockup</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Poppins for premium feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #150A01; /* Brand Color: Màu nền đen đặc biệt */
        }
        /* Custom glow shadow for the card, using brand color #CF9A34 */
        .card-glow {
            box-shadow: 0 0 30px rgba(207, 154, 52, 0.6), /* Outer glow #CF9A34 */
                        0 0 15px rgba(207, 154, 52, 0.4) inset; /* Subtle inner glow */
        }
        /* Custom class for the dimmed A-roll background */
        .a-roll-dimmed {
            background-color: rgba(0, 0, 0, 0.4); /* Dimming effect */
        }
        /* CRITICAL FIGMA COMPATIBILITY NOTE:
           The description requested a "slides up from the bottom" motion.
           However, due to the "CRITICAL FIGMA COMPATIBILITY RULE"
           (elements must start with opacity: 1 and be fully positioned and visible on screen on load),
           the card is rendered in its final visible position without an initial off-screen state.
           Animations would typically be applied via JavaScript or CSS keyframes
           that transition from an initial off-screen/transparent state to the final visible state.
           For Figma compatibility, the final state is shown directly.
        */
    </style>
</head>
<body class="overflow-hidden h-screen w-screen flex items-center justify-center relative">

    <!-- Simulated A-roll background with dimming -->
    <div class="absolute inset-0 bg-cover bg-center a-roll-dimmed" style="background-image: url('https://via.placeholder.com/1920x1080/150A01/FFFFFF?text=Speaker+A-Roll+Video+Background');">
        <!-- Placeholder for actual speaker A-roll content, centered and slightly dimmed -->
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="w-3/4 h-3/4 bg-gray-800 rounded-lg flex items-center justify-center text-white text-3xl opacity-80">
                <span class="text-center">Speaker A-Roll (Centered)</span>
            </div>
        </div>
    </div>

    <!-- The Overlay Pop Card -->
    <div class="fixed bottom-8 right-8 max-w-xl w-full mx-auto p-6 rounded-2xl bg-[#200F00] bg-opacity-80 backdrop-blur-lg border border-[#A9ADB1]/20 card-glow">
        <div class="flex flex-col items-center text-center space-y-4">
            <h2 class="text-3xl font-bold text-[#F6C71E]">ENJOYED THIS VIDEO?</h2>
            <p class="text-xl text-[#35CC23] font-semibold">Subscribe for more strategies!</p>

            <!-- Subscribe Button -->
            <button class="flex items-center justify-center px-6 py-3 bg-[#E8973F] hover:bg-[#D36708] text-white font-bold rounded-full transition-colors duration-300 shadow-lg hover:shadow-xl transform hover:scale-105">
                <!-- Subscribe Icon (simple plus for 'add to subscriptions') -->
                <svg class="w-6 h-6 mr-2" fill="currentColor" viewBox="0 0 24 24">
                    <path fill-rule="evenodd" d="M12 5.25a.75.75 0 01.75.75v5.25H18a.75.75 0 010 1.5h-5.25V18a.75.75 0 01-1.5 0v-5.25H6a.75.75 0 010-1.5h5.25V6a.75.75 0 01.75-.75z" clip-rule="evenodd" />
                </svg>
                Subscribe
            </button>

            <!-- Notify Me Button (Bell Icon) -->
            <button class="flex items-center justify-center px-6 py-3 bg-transparent border-2 border-[#A9ADB1] text-[#A9ADB1] font-bold rounded-full transition-colors duration-300 hover:bg-[#A9ADB1]/20 transform hover:scale-105">
                <!-- Bell Icon -->
                <svg class="w-6 h-6 mr-2" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9zm-4.27 13a2 2 0 01-3.46 0"></path>
                </svg>
                Notify Me
            </button>
        </div>
    </div>

</body>
</html>
