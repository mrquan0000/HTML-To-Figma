<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Channel Advice Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-warm-accent': '#E8973F',
                        'brand-dark-orange': '#D36708',
                        'brand-dark-warm': '#200F00',
                        'brand-yellow-bright': '#F6C71E',
                        'brand-glass-gray': '#A9ADB1',
                        'brand-black-deep': '#150A01',
                        'brand-wood': '#542A06',
                        'brand-red': '#C21403',
                        'brand-neon-gold': '#CF9A34',
                        'brand-green': '#35CC23',
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #150A01;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Glassmorphism Card ── */
        .glass-card {
            background: rgba(32, 15, 0, 0.82);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1.5px solid rgba(207, 154, 52, 0.55);
            border-radius: 22px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 35px rgba(207, 154, 52, 0.28),
                0 0 70px rgba(207, 154, 52, 0.12),
                0 8px 32px rgba(0, 0, 0, 0.55),
                inset 0 1px 0 rgba(207, 154, 52, 0.15);
        }

        /* ── Animated Neon Border Glow ── */
        .glass-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 24px;
            background: conic-gradient(
                from 180deg,
                rgba(207, 154, 52, 0.6),
                rgba(232, 151, 63, 0.3),
                rgba(207, 154, 52, 0.1),
                rgba(246, 199, 30, 0.4),
                rgba(207, 154, 52, 0.6)
            );
            z-index: -1;
            filter: blur(4px);
            animation: borderRotate 6s linear infinite;
        }

        @keyframes borderRotate {
            0% { filter: blur(4px) hue-rotate(0deg); }
            50% { filter: blur(6px) hue-rotate(10deg); }
            100% { filter: blur(4px) hue-rotate(0deg); }
        }

        /* ── Lightsweep Effect ── */
        .glass-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                105deg,
                transparent 30%,
                rgba(207, 154, 52, 0.07) 45%,
                rgba(246, 199, 30, 0.05) 55%,
                transparent 70%
            );
            animation: lightsweep 5s ease-in-out infinite;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes lightsweep {
            0%, 100% { left: -120%; }
            50% { left: 120%; }
        }

        /* ── Title Glow ── */
        .title-glow {
            text-shadow:
                0 0 22px rgba(246, 199, 30, 0.55),
                0 0 44px rgba(246, 199, 30, 0.2),
                0 0 80px rgba(246, 199, 30, 0.1);
        }

        /* ── Accent Text Glow ── */
        .accent-glow {
            text-shadow:
                0 0 16px rgba(232, 151, 63, 0.5),
                0 0 32px rgba(232, 151, 63, 0.2);
        }

        /* ── Icon Glow ── */
        .icon-glow {
            filter: drop-shadow(0 0 8px rgba(207, 154, 52, 0.6));
        }

        /* ── Bullet Dot Glow ── */
        .bullet-dot {
            box-shadow: 0 0 10px rgba(207, 154, 52, 0.6), 0 0 20px rgba(207, 154, 52, 0.2);
        }

        /* ── Subtle Pulse for Bottom Line ── */
        .pulse-line {
            animation: subtlePulse 3s ease-in-out infinite;
        }

        @keyframes subtlePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }

        /* ── Decorative Ambient Glow ── */
        .ambient-glow {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(207, 154, 52, 0.08), transparent 70%);
            pointer-events: none;
        }

        /* ── Speaker Placeholder Gradient ── */
        .speaker-area {
            background: linear-gradient(
                135deg,
                #150A01 0%,
                #1a0e03 40%,
                #200F00 100%
            );
            position: relative;
            overflow: hidden;
        }

        .speaker-area::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(32, 15, 0, 0.6), transparent);
            pointer-events: none;
        }

        /* ── Divider Line ── */
        .divider-glow {
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(207, 154, 52, 0.4),
                rgba(246, 199, 30, 0.2),
                transparent
            );
        }

        /* ── Body Background ── */
        .frame-bg {
            background: linear-gradient(
                160deg,
                #150A01 0%,
                #1a0e03 50%,
                #150A01 100%
            );
        }

        /* ── Subtle noise texture overlay ── */
        .noise-overlay {
            position: fixed;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            z-index: 100;
        }
    </style>
</head>
<body class="p-4">

    <!-- Noise Texture Overlay -->
    <div class="noise-overlay"></div>

    <!-- ═══════════════════════════════════════════════ -->
    <!--         MAIN FRAME — SPLIT GRID LAYOUT         -->
    <!-- ═══════════════════════════════════════════════ -->
    <div class="frame-bg max-w-[600px] w-full rounded-2xl overflow-hidden shadow-2xl border border-[rgba(207,154,52,0.1)]" 
         style="aspect-ratio: 16 / 10;">

        <div class="flex w-full h-full">

            <!-- ──────────────────────────────── -->
            <!--       LEFT HALF — CARD AREA      -->
            <!-- ──────────────────────────────── -->
            <div class="w-[55%] h-full flex items-center justify-center p-5 relative" style="background: #150A01;">

                <!-- Ambient Glow (Top Left) -->
                <div class="absolute -top-10 -left-10 ambient-glow" style="width: 260px; height: 260px;"></div>
                <!-- Ambient Glow (Bottom Right) -->
                <div class="absolute -bottom-10 right-5 ambient-glow" style="width: 180px; height: 180px; opacity: 0.6;"></div>

                <!-- ═══════ GLASSMORPHISM CARD ═══════ -->
                <div class="glass-card w-full p-6 relative z-10" style="max-width: 300px;">

                    <!-- Card Inner Content -->
                    <div class="relative z-10">

                        <!-- ── Top Decorative Accent Bar ── -->
                        <div class="w-10 h-1 rounded-full mb-5 mx-auto" 
                             style="background: linear-gradient(90deg, #CF9A34, #F6C71E); box-shadow: 0 0 12px rgba(246, 199, 30, 0.4);"></div>

                        <!-- ── Title ── -->
                        <h1 class="title-glow text-center font-black tracking-wider leading-tight mb-5"
                            style="font-size: 1.15rem; color: #F6C71E; letter-spacing: 0.12em;">
                            NEW CHANNEL<br>ADVICE
                        </h1>

                        <!-- ── Divider ── -->
                        <div class="divider-glow mb-5 rounded-full"></div>

                        <!-- ── Bullet Point 1: Old Content ── -->
                        <div class="flex items-start gap-3 mb-4">
                            <!-- Icon: Podcast / Old Content -->
                            <div class="icon-glow flex-shrink-0 mt-0.5">
                                <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <rect x="2" y="2" width="24" height="24" rx="6" stroke="#CF9A34" stroke-width="1.5" fill="rgba(207,154,52,0.08)"/>
                                    <circle cx="14" cy="11" r="4" stroke="#E8973F" stroke-width="1.5" fill="none"/>
                                    <path d="M14 15V20" stroke="#E8973F" stroke-width="1.5" stroke-linecap="round"/>
                                    <path d="M10 20H18" stroke="#E8973F" stroke-width="1.5" stroke-linecap="round"/>
                                    <path d="M8 8C8 8 10 6 14 6C18 6 20 8 20 8" stroke="#CF9A34" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
                                </svg>
                            </div>
                            <div>
                                <p class="text-[10px] font-bold tracking-widest uppercase mb-1" style="color: #A9ADB1;">Old Content</p>
                                <p class="text-sm font-semibold text-white leading-snug">Podcasts</p>
                            </div>
                        </div>

                        <!-- ── Bullet Point 2: Goal ── -->
                        <div class="flex items-start gap-3 mb-5">
                            <!-- Icon: Personal Brand / Goal -->
                            <div class="icon-glow flex-shrink-0 mt-0.5">
                                <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <rect x="2" y="2" width="24" height="24" rx="6" stroke="#CF9A34" stroke-width="1.5" fill="rgba(207,154,52,0.08)"/>
                                    <circle cx="14" cy="10" r="3.5" stroke="#E8973F" stroke-width="1.5" fill="none"/>
                                    <path d="M8 22C8 18.6863 10.6863 16 14 16C17.3137 16 20 18.6863 20 22" stroke="#E8973F" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                                    <path d="M20 10L22 8" stroke="#CF9A34" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
                                    <path d="M22 12L24 12" stroke="#CF9A34" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
                                    <circle cx="21" cy="9" r="1" fill="#CF9A34" opacity="0.4"/>
                                </svg>
                            </div>
                            <div>
                                <p class="text-[10px] font-bold tracking-widest uppercase mb-1" style="color: #A9ADB1;">Goal</p>
                                <p class="text-sm font-semibold text-white leading-snug">Personal Brand</p>
                            </div>
                        </div>

                        <!-- ── Divider ── -->
                        <div class="divider-glow mb-5 rounded-full"></div>

                        <!-- ── Bottom Accent Line: Start from Scratch ── -->
                        <div class="pulse-line text-center">
                            <p class="accent-glow font-extrabold tracking-wide uppercase text-sm" style="color: #E8973F;">
                                ▸ Start from Scratch
                            </p>
                        </div>

                    </div>

                </div>
                <!-- ═══════ END GLASSMORPHISM CARD ═══════ -->

            </div>

            <!-- ──────────────────────────────── -->
            <!--     RIGHT HALF — SPEAKER AREA     -->
            <!-- ──────────────────────────────── -->
            <div class="w-[45%] h-full speaker-area flex flex-col items-center justify-end relative">

                <!-- Subtle Radial Light Behind Speaker -->
                <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2"
                     style="width: 200px; height: 250px; background: radial-gradient(ellipse, rgba(32,15,0,0.5), transparent 70%);"></div>

                <!-- Speaker Silhouette Placeholder -->
                <div class="relative z-10 flex flex-col items-center mb-6">
                    <!-- Head -->
                    <div class="rounded-full mb-1" 
                         style="width: 52px; height: 52px; background: linear-gradient(135deg, #2a1500, #3d2008); border: 1.5px solid rgba(207,154,52,0.15);"></div>
                    <!-- Body -->
                    <div class="rounded-t-full" 
                         style="width: 70px; height: 50px; background: linear-gradient(180deg, #3d2008, #2a1500); border: 1.5px solid rgba(207,154,52,0.1); border-bottom: none;"></div>
                </div>

                <!-- Speaker Label -->
                <div class="relative z-10 mb-4 text-center">
                    <p class="text-[9px] font-semibold tracking-widest uppercase" style="color: rgba(169,173,177,0.4);">
                        Speaker
                    </p>
                </div>

            </div>

        </div>

        <!-- ── Bottom Frame Bar ── -->
        <div class="absolute bottom-0 left-0 right-0 h-[2px]"
             style="background: linear-gradient(90deg, transparent, rgba(207,154,52,0.2), rgba(246,199,30,0.15), transparent);"></div>

    </div>

</body>
</html>
