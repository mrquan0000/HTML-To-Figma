<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Filming Focus Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#150A01',
                        'brand-card': '#200F00',
                        'brand-gold': '#CF9A34',
                        'brand-yellow': '#F6C71E',
                        'brand-orange': '#E8973F',
                        'brand-orange-dark': '#D36708',
                        'brand-wood': '#542A06',
                        'brand-red': '#C21403',
                        'brand-green': '#35CC23',
                        'brand-gray': '#A9ADB1',
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000000;
            overflow: hidden;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(32, 15, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid rgba(207, 154, 52, 0.6);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(
                135deg,
                rgba(207, 154, 52, 0.5) 0%,
                rgba(207, 154, 52, 0.15) 30%,
                rgba(207, 154, 52, 0.05) 50%,
                rgba(207, 154, 52, 0.15) 70%,
                rgba(207, 154, 52, 0.5) 100%
            );
            border-radius: 21px;
            z-index: -1;
            animation: borderGlow 4s ease-in-out infinite;
        }

        /* Neon Glow Effect */
        .glow-border {
            box-shadow: 
                0 0 15px rgba(207, 154, 52, 0.3),
                0 0 30px rgba(207, 154, 52, 0.15),
                0 0 60px rgba(207, 154, 52, 0.08),
                inset 0 0 20px rgba(207, 154, 52, 0.05);
        }

        /* Title Glow */
        .title-glow {
            text-shadow: 
                0 0 10px rgba(246, 199, 30, 0.4),
                0 0 20px rgba(246, 199, 30, 0.2),
                0 0 40px rgba(246, 199, 30, 0.1);
        }

        /* Keyword Glow */
        .keyword-glow {
            text-shadow: 
                0 0 8px rgba(232, 151, 63, 0.5),
                0 0 16px rgba(232, 151, 63, 0.3);
        }

        /* Lightsweep Effect */
        .lightsweep {
            position: relative;
            overflow: hidden;
        }

        .lightsweep::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.04),
                rgba(207, 154, 52, 0.06),
                transparent
            );
            animation: sweep 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes sweep {
            0% { left: -100%; }
            50% { left: 150%; }
            100% { left: 150%; }
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Icon Pulse */
        .icon-pulse {
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* Subtle float animation for cards - applied as final state */
        .card-visible {
            transform: translateX(0);
            opacity: 1;
        }

        /* Bullet item visible state */
        .bullet-visible {
            opacity: 1;
            transform: translateX(0);
        }

        /* Subtle ambient glow on background */
        .ambient-glow {
            background: radial-gradient(
                ellipse at 30% 50%,
                rgba(207, 154, 52, 0.06) 0%,
                rgba(32, 15, 0, 0.3) 40%,
                transparent 70%
            );
        }

        /* Decorative line */
        .accent-line {
            background: linear-gradient(90deg, #CF9A34, #E8973F, transparent);
            height: 2px;
            border-radius: 1px;
        }
    </style>
</head>
<body class="font-montserrat">
    <!-- Main Container - Split Grid Layout -->
    <div class="flex w-full h-screen max-w-[1200px] mx-auto relative">
        
        <!-- LEFT HALF - Dark Background with Card -->
        <div class="w-1/2 h-full relative" style="background: #150A01;">
            
            <!-- Ambient Glow Background -->
            <div class="absolute inset-0 ambient-glow"></div>
            
            <!-- Card Container -->
            <div class="absolute inset-0 flex items-center justify-center p-8">
                
                <!-- Main Glass Card -->
                <div class="glass-card glow-border lightsweep card-visible w-full max-w-[480px] px-8 py-10 relative">
                    
                    <!-- Decorative corner accents -->
                    <div class="absolute top-0 left-0 w-16 h-16">
                        <div class="absolute top-4 left-4 w-8 h-[1px] bg-brand-gold opacity-40"></div>
                        <div class="absolute top-4 left-4 w-[1px] h-8 bg-brand-gold opacity-40"></div>
                    </div>
                    <div class="absolute bottom-0 right-0 w-16 h-16">
                        <div class="absolute bottom-4 right-4 w-8 h-[1px] bg-brand-gold opacity-40"></div>
                        <div class="absolute bottom-4 right-4 w-[1px] h-8 bg-brand-gold opacity-40"></div>
                    </div>

                    <!-- Brain Icon -->
                    <div class="flex items-center gap-3 mb-6">
                        <div class="icon-pulse w-10 h-10 rounded-xl flex items-center justify-center" style="background: rgba(207, 154, 52, 0.15); border: 1px solid rgba(207, 154, 52, 0.3);">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 2a7 7 0 0 0-7 7c0 2.38 1.19 4.47 3 5.74V17a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-2.26c1.81-1.27 3-3.36 3-5.74a7 7 0 0 0-7-7z"/>
                                <path d="M10 21h4"/>
                                <path d="M9 9h.01"/>
                                <path d="M15 9h.01"/>
                                <path d="M12 9V5"/>
                                <path d="M8 13h8"/>
                                <circle cx="12" cy="9" r="2" stroke="#CF9A34" stroke-width="1" opacity="0.5"/>
                            </svg>
                        </div>
                        <div class="flex-1">
                            <div class="accent-line w-16"></div>
                        </div>
                    </div>

                    <!-- Title -->
                    <div class="bullet-visible mb-8">
                        <h1 class="text-2xl md:text-3xl font-black tracking-wider title-glow" style="color: #F6C71E;">
                            PRE-FILMING<br>FOCUS
                        </h1>
                    </div>

                    <!-- Divider with question mark icon -->
                    <div class="flex items-center gap-3 mb-7">
                        <div class="accent-line flex-1"></div>
                        <div class="w-8 h-8 rounded-full flex items-center justify-center" style="background: rgba(207, 154, 52, 0.1); border: 1px solid rgba(207, 154, 52, 0.25);">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#CF9A34" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                                <line x1="12" y1="17" x2="12.01" y2="17"/>
                            </svg>
                        </div>
                        <div class="accent-line flex-1"></div>
                    </div>

                    <!-- Bullet Points -->
                    <div class="space-y-5">
                        <!-- Bullet 1 -->
                        <div class="bullet-visible flex items-start gap-4 group">
                            <div class="mt-1 flex-shrink-0">
                                <div class="w-6 h-6 rounded-lg flex items-center justify-center" style="background: rgba(232, 151, 63, 0.15); border: 1px solid rgba(232, 151, 63, 0.3);">
                                    <div class="w-2 h-2 rounded-full" style="background: #E8973F;"></div>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 flex-wrap">
                                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="#A9ADB1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5"/>
                                </svg>
                                <span class="text-lg font-semibold" style="color: #FFFFFF;">Would I <span class="keyword-glow font-bold" style="color: #E8973F;">click</span>?</span>
                            </div>
                        </div>

                        <!-- Bullet 2 -->
                        <div class="bullet-visible flex items-start gap-4 group">
                            <div class="mt-1 flex-shrink-0">
                                <div class="w-6 h-6 rounded-lg flex items-center justify-center" style="background: rgba(232, 151, 63, 0.15); border: 1px solid rgba(232, 151, 63, 0.3);">
                                    <div class="w-2 h-2 rounded-full" style="background: #E8973F;"></div>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 flex-wrap">
                                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="#A9ADB1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"/>
                                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                                </svg>
                                <span class="text-lg font-semibold" style="color: #FFFFFF;">Creates <span class="keyword-glow font-bold" style="color: #E8973F;">Curiosity</span>?</span>
                            </div>
                        </div>

                        <!-- Bullet 3 -->
                        <div class="bullet-visible flex items-start gap-4 group">
                            <div class="mt-1 flex-shrink-0">
                                <div class="w-6 h-6 rounded-lg flex items-center justify-center" style="background: rgba(232, 151, 63, 0.15); border: 1px solid rgba(232, 151, 63, 0.3);">
                                    <div class="w-2 h-2 rounded-full" style="background: #E8973F;"></div>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 flex-wrap">
                                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="#A9ADB1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                                </svg>
                                <span class="text-lg font-semibold" style="color: #FFFFFF;">Communicates <span class="keyword-glow font-bold" style="color: #E8973F;">Value</span>?</span>
                            </div>
                        </div>
                    </div>

                    <!-- Bottom decorative element -->
                    <div class="mt-8 flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full icon-pulse" style="background: #CF9A34;"></div>
                        <div class="accent-line flex-1 opacity-50"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT HALF - Speaker Area (A-roll placeholder) -->
        <div class="w-1/2 h-full relative" style="background: linear-gradient(135deg, #200F00 0%, #150A01 50%, #0a0500 100%);">
            
            <!-- Subtle gradient overlay for speaker area -->
            <div class="absolute inset-0" style="background: radial-gradient(ellipse at 70% 45%, rgba(207, 154, 52, 0.04) 0%, transparent 60%);"></div>
            
            <!-- Speaker Silhouette Placeholder -->
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="relative">
                    <!-- Speaker figure placeholder -->
                    <div class="w-56 h-72 rounded-3xl relative" style="background: linear-gradient(180deg, rgba(84, 42, 6, 0.3) 0%, rgba(32, 15, 0, 0.5) 100%); border: 1px solid rgba(207, 154, 52, 0.1);">
                        <!-- Head placeholder -->
                        <div class="absolute -top-16 left-1/2 transform -translate-x-1/2 w-24 h-24 rounded-full" style="background: linear-gradient(180deg, rgba(84, 42, 6, 0.4) 0%, rgba(32, 15, 0, 0.6) 100%); border: 1px solid rgba(207, 154, 52, 0.1);"></div>
                        
                        <!-- Body placeholder -->
                        <div class="absolute top-12 left-1/2 transform -translate-x-1/2 w-36 h-48 rounded-2xl" style="background: linear-gradient(180deg, rgba(53, 204, 35, 0.08) 0%, rgba(32, 15, 0, 0.4) 100%); border: 1px solid rgba(207, 154, 52, 0.08);">
                            <!-- Subtle inner glow -->
                            <div class="absolute inset-2 rounded-xl" style="background: radial-gradient(ellipse at 50% 30%, rgba(207, 154, 52, 0.03) 0%, transparent 70%);"></div>
                        </div>
                    </div>
                    
                    <!-- Speaker label -->
                    <div class="absolute -bottom-12 left-1/2 transform -translate-x-1/2 text-center">
                        <p class="text-xs font-semibold tracking-widest uppercase" style="color: #A9ADB1; opacity: 0.5;">Speaker / A-Roll</p>
                    </div>
                </div>
            </div>

            <!-- Decorative elements in speaker area -->
            <div class="absolute top-8 right-8 w-3 h-3 rounded-full icon-pulse" style="background: rgba(207, 154, 52, 0.2);"></div>
            <div class="absolute bottom-8 right-12 w-2 h-2 rounded-full" style="background: rgba(207, 154, 52, 0.15); animation: pulse 4s ease-in-out infinite 1s;"></div>
        </div>

        <!-- Center Divider Line -->
        <div class="absolute top-0 bottom-0 left-1/2 transform -translate-x-1/2 w-[1px]" style="background: linear-gradient(180deg, transparent 10%, rgba(207, 154, 52, 0.15) 30%, rgba(207, 154, 52, 0.15) 70%, transparent 90%);"></div>
    </div>

    <!-- Bottom text overlay for full context -->
    <div class="absolute bottom-6 left-0 right-0 flex justify-center pointer-events-none">
        <div class="px-6 py-3 rounded-full" style="background: rgba(32, 15, 0, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(207, 154, 52, 0.15);">
            <p class="text-xs font-medium text-center max-w-md" style="color: #A9ADB1; line-height: 1.6;">
                <span style="color: #F6C71E;" class="font-bold">Before filming</span> — spend more time thinking about the 
                <span style="color: #E8973F;" class="font-bold">idea itself</span>. Does it create 
                <span style="color: #E8973F;" class="font-bold">curiosity</span>? Does it communicate 
                <span style="color: #E8973F;" class="font-bold">value</span>?
            </p>
        </div>
    </div>
</body>
</html>
