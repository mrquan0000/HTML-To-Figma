<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Billion+ Views Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0501;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── Dimmed A-Roll Background ─────────────────────── */
        .bg-stage {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 380px 480px at 50% 52%, rgba(84, 42, 6, 0.14) 0%, transparent 100%),
                radial-gradient(ellipse 260px 340px at 50% 65%, rgba(32, 15, 0, 0.35) 0%, transparent 100%),
                #0a0501;
        }
        .bg-stage::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 48%, transparent 35%, rgba(0, 0, 0, 0.55) 100%);
        }

        /* Speaker ambient glow */
        .speaker-glow {
            position: absolute;
            width: 300px;
            height: 420px;
            top: 18%;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(ellipse at 50% 35%, rgba(84, 42, 6, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        /* ── Glass Card ───────────────────────────────────── */
        .glass-card {
            background: rgba(32, 15, 0, 0.86);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(207, 154, 52, 0.28);
            border-radius: 28px;
            position: relative;
            overflow: hidden;
        }

        /* Top accent bar */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 12%;
            right: 12%;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #CF9A34 25%, #F6C71E 50%, #CF9A34 75%, transparent 100%);
            opacity: 0.7;
        }

        /* Lightsweep */
        .glass-card::after {
            content: '';
            position: absolute;
            top: -20%;
            left: -120%;
            width: 60%;
            height: 140%;
            background: linear-gradient(105deg, transparent 30%, rgba(207, 154, 52, 0.045) 50%, transparent 70%);
            animation: lightsweep 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes lightsweep {
            0%, 100% { left: -120%; }
            50% { left: 140%; }
        }

        /* ── Glow Pulse on Card ───────────────────────────── */
        .glow-pulse {
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow:
                    0 0 18px rgba(207, 154, 52, 0.1),
                    0 0 45px rgba(207, 154, 52, 0.05),
                    0 30px 80px rgba(0, 0, 0, 0.55),
                    inset 0 1px 0 rgba(207, 154, 52, 0.06);
            }
            50% {
                box-shadow:
                    0 0 28px rgba(207, 154, 52, 0.2),
                    0 0 65px rgba(207, 154, 52, 0.1),
                    0 30px 80px rgba(0, 0, 0, 0.55),
                    inset 0 1px 0 rgba(207, 154, 52, 0.1);
            }
        }

        /* ── Pop-In Animation ─────────────────────────────── */
        .pop-in {
            animation: popIn 0.85s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes popIn {
            from { transform: scale(0.88); }
            to   { transform: scale(1); }
        }

        /* ── Icon Effects ─────────────────────────────────── */
        .icon-glow-gold {
            filter: drop-shadow(0 0 14px rgba(246, 199, 30, 0.5)) drop-shadow(0 0 30px rgba(232, 151, 63, 0.2));
        }
        .icon-glow-green {
            filter: drop-shadow(0 0 8px rgba(53, 204, 35, 0.35));
        }

        /* ── Subtle Float ─────────────────────────────────── */
        .float-slow {
            animation: floatSlow 5s ease-in-out infinite;
        }
        @keyframes floatSlow {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-6px); }
        }

        /* ── Badge Shimmer ────────────────────────────────── */
        .badge-shimmer {
            position: relative;
            overflow: hidden;
        }
        .badge-shimmer::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 80%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(53, 204, 35, 0.06), transparent);
            animation: shimmer 3.5s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { left: -100%; }
            50%      { left: 120%; }
        }

        /* ── Title Glow Layers ────────────────────────────── */
        .title-primary {
            color: #F6C71E;
            text-shadow:
                0 0 20px rgba(246, 199, 30, 0.45),
                0 0 45px rgba(232, 151, 63, 0.3),
                0 0 90px rgba(232, 151, 63, 0.12);
        }
        .title-emphasis {
            color: #E8973F;
            text-shadow:
                0 0 28px rgba(232, 151, 63, 0.6),
                0 0 55px rgba(232, 151, 63, 0.3),
                0 0 100px rgba(232, 151, 63, 0.12);
        }
    </style>
</head>
<body>

    <!-- ═══ Dimmed A-Roll Background ═══ -->
    <div class="bg-stage">
        <div class="speaker-glow"></div>
    </div>

    <!-- ═══ Card Container ═══ -->
    <div class="relative z-10 w-full max-w-[600px] mx-4 pop-in glow-pulse">
        <div class="glass-card px-8 py-10 md:px-12 md:py-12">

            <!-- Inner content (above pseudo-elements) -->
            <div class="relative z-10">

                <!-- ── Trophy Icon ── -->
                <div class="flex justify-center mb-6 float-slow">
                    <div class="icon-glow-gold">
                        <svg width="54" height="54" viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <!-- Cup body -->
                            <path d="M17 10H37V23C37 31.83 30.51 39 26.5 39C22.49 39 17 31.83 17 23V10Z"
                                  fill="url(#tg)" fill-opacity="0.18" stroke="#F6C71E" stroke-width="1.8" stroke-linejoin="round"/>
                            <!-- Left handle -->
                            <path d="M17 14H13C11.9 14 11 14.9 11 16V19.5C11 23.64 14.36 27 18.5 27H20"
                                  stroke="#CF9A34" stroke-width="1.8" stroke-linecap="round" fill="none"/>
                            <!-- Right handle -->
                            <path d="M37 14H41C42.1 14 43 14.9 43 16V19.5C43 23.64 39.64 27 35.5 27H34"
                                  stroke="#CF9A34" stroke-width="1.8" stroke-linecap="round" fill="none"/>
                            <!-- Stem -->
                            <line x1="27" y1="39" x2="27" y2="44" stroke="#F6C71E" stroke-width="2" stroke-linecap="round"/>
                            <!-- Base -->
                            <line x1="20" y1="49" x2="34" y2="49" stroke="#F6C71E" stroke-width="2.2" stroke-linecap="round"/>
                            <line x1="22" y1="44" x2="32" y2="44" stroke="#F6C71E" stroke-width="1.8" stroke-linecap="round"/>
                            <!-- Star -->
                            <path d="M27 18L28.7 22.2H33.2L29.5 24.8L30.7 29L27 26.4L23.3 29L24.5 24.8L20.8 22.2H25.3L27 18Z"
                                  fill="#F6C71E" fill-opacity="0.55"/>
                            <defs>
                                <linearGradient id="tg" x1="17" y1="10" x2="37" y2="39">
                                    <stop stop-color="#F6C71E" stop-opacity="0.3"/>
                                    <stop offset="1" stop-color="#E8973F" stop-opacity="0.08"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                </div>

                <!-- ── Main Title ── -->
                <div class="text-center mb-2">
                    <h1 style="font-family: 'Montserrat', sans-serif;" class="font-black leading-none tracking-tight">
                        <span class="block text-4xl sm:text-5xl md:text-[3.4rem] title-primary">
                            1 BILLION+
                        </span>
                        <span class="block text-5xl sm:text-6xl md:text-[4.2rem] mt-1 title-emphasis">
                            VIEWS
                        </span>
                    </h1>
                </div>

                <!-- ── Subtitle ── -->
                <p class="text-center text-base md:text-lg font-bold uppercase mb-8"
                   style="color: #FFFFFF; letter-spacing: 0.2em;">
                    Proven Strategies
                </p>

                <!-- ── Decorative Divider ── -->
                <div class="flex items-center justify-center gap-3 mb-8">
                    <div class="w-14 h-px" style="background: linear-gradient(90deg, transparent, #CF9A34);"></div>
                    <div class="w-[7px] h-[7px] rounded-full"
                         style="background: #CF9A34; box-shadow: 0 0 10px rgba(207,154,52,0.55);"></div>
                    <div class="w-14 h-px" style="background: linear-gradient(90deg, #CF9A34, transparent);"></div>
                </div>

                <!-- ── Body Text ── -->
                <p class="text-center text-sm md:text-[15px] leading-[1.85] mb-8 max-w-md mx-auto"
                   style="color: rgba(255,255,255,0.8); font-weight: 400;">
                    And if you want to grow faster on YouTube, you should watch this
                    until the very end. Because these are the same exact
                    <span style="color:#F6C71E; font-weight:600;">strategies</span>
                    that I have used to generate over a
                    <span style="color:#E8973F; font-weight:700; text-shadow:0 0 14px rgba(232,151,63,0.3);">billion views</span>
                    on YouTube.
                </p>

                <!-- ── Chart Badge ── -->
                <div class="flex justify-center">
                    <div class="badge-shimmer inline-flex items-center gap-2.5 px-5 py-2.5 rounded-xl"
                         style="background: rgba(53,204,35,0.05); border: 1px solid rgba(53,204,35,0.14);">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" class="icon-glow-green">
                            <path d="M3 17L9 11L13 15L21 7" stroke="#35CC23" stroke-width="2"
                                  stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M17 7H21V11" stroke="#35CC23" stroke-width="2"
                                  stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span class="text-xs font-bold uppercase"
                              style="color:#35CC23; letter-spacing:0.15em;">
                            Explosive Growth
                        </span>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
