<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategy #1 - The First 24 Hours</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#200F00',
                        'brand-darker': '#150A01',
                        'brand-gold': '#F6C71E',
                        'brand-neon': '#CF9A34',
                        'brand-orange': '#E8973F',
                        'brand-deep-orange': '#D36708',
                        'brand-wood': '#542A06',
                        'brand-red': '#C21403',
                        'brand-green': '#35CC23',
                        'brand-gray': '#A9ADB1',
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                        'pop': ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes cardPop {
            0% {
                transform: scale(0.88) translateY(10px);
                opacity: 1;
            }
            60% {
                transform: scale(1.02) translateY(-2px);
                opacity: 1;
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow:
                    0 0 15px rgba(207, 154, 52, 0.25),
                    0 0 35px rgba(207, 154, 52, 0.12),
                    0 0 70px rgba(207, 154, 52, 0.06),
                    inset 0 1px 1px rgba(207, 154, 52, 0.1);
            }
            50% {
                box-shadow:
                    0 0 25px rgba(207, 154, 52, 0.4),
                    0 0 55px rgba(207, 154, 52, 0.2),
                    0 0 100px rgba(207, 154, 52, 0.1),
                    inset 0 1px 1px rgba(207, 154, 52, 0.15);
            }
        }

        @keyframes lightsweep {
            0% { transform: translateX(-150%) skewX(-15deg); }
            100% { transform: translateX(250%) skewX(-15deg); }
        }

        @keyframes titleGlow {
            0%, 100% {
                text-shadow:
                    0 0 8px rgba(246, 199, 30, 0.4),
                    0 0 20px rgba(246, 199, 30, 0.2);
            }
            50% {
                text-shadow:
                    0 0 14px rgba(246, 199, 30, 0.6),
                    0 0 30px rgba(246, 199, 30, 0.35),
                    0 0 50px rgba(246, 199, 30, 0.15);
            }
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        @keyframes fadeInUp {
            0% {
                opacity: 1;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes borderShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card-container {
            animation: cardPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .glow-border {
            animation: glowPulse 3s ease-in-out infinite;
        }

        .title-glow {
            animation: titleGlow 2.5s ease-in-out infinite;
        }

        .icon-float {
            animation: iconFloat 3s ease-in-out infinite;
        }

        .subtitle-enter {
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }

        .lightsweep-effect {
            overflow: hidden;
            position: relative;
        }

        .lightsweep-effect::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(207, 154, 52, 0.06) 40%,
                rgba(246, 199, 30, 0.1) 50%,
                rgba(207, 154, 52, 0.06) 60%,
                transparent 100%
            );
            animation: lightsweep 4.5s ease-in-out infinite;
            animation-delay: 1.2s;
            pointer-events: none;
        }

        .neon-border-shimmer {
            background: linear-gradient(
                90deg,
                rgba(207, 154, 52, 0.6),
                rgba(246, 199, 30, 0.9),
                rgba(232, 151, 63, 0.7),
                rgba(207, 154, 52, 0.6)
            );
            background-size: 300% 100%;
            animation: borderShimmer 4s linear infinite;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
        }

        .glass-bg {
            background: rgba(32, 15, 0, 0.82);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden p-4" style="background: radial-gradient(ellipse at 50% 45%, #1a1008 0%, #0d0704 45%, #050302 75%, #000000 100%);">

    <!-- Background atmosphere - simulating dimmed A-roll video -->
    <div class="fixed inset-0 pointer-events-none">
        <!-- Subtle warm ambient light from center (simulating speaker spotlight) -->
        <div class="absolute inset-0" style="background: radial-gradient(ellipse at 50% 55%, rgba(84, 42, 6, 0.15) 0%, transparent 55%);"></div>
        <!-- Subtle grain/noise overlay -->
        <div class="absolute inset-0" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 256 256%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noise%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noise)%22 opacity=%220.03%22/%3E%3C/svg%3E'); opacity: 0.4;"></div>
        <!-- Bottom fade -->
        <div class="absolute bottom-0 left-0 right-0 h-1/3" style="background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);"></div>
    </div>

    <!-- Main Card Container -->
    <div class="card-container relative z-10 w-full flex items-center justify-center" style="max-width: 600px;">

        <!-- Outer neon border wrapper -->
        <div class="glow-border w-full rounded-3xl p-[1.5px]" style="background: linear-gradient(135deg, rgba(207,154,52,0.7) 0%, rgba(207,154,52,0.3) 30%, rgba(207,154,52,0.5) 60%, rgba(246,199,30,0.6) 100%);">

            <!-- Inner card with glassmorphism -->
            <div class="glass-bg lightsweep-effect w-full rounded-3xl relative" style="border: 1px solid rgba(207, 154, 52, 0.15);">

                <!-- Card Content -->
                <div class="px-10 py-12 sm:px-14 sm:py-14 flex flex-col items-center text-center relative z-10">

                    <!-- Decorative top element -->
                    <div class="flex items-center justify-center gap-3 mb-8">
                        <div class="h-px w-10 sm:w-14" style="background: linear-gradient(90deg, transparent, rgba(207, 154, 52, 0.5));"></div>

                        <!-- Clock icon -->
                        <div class="icon-float flex items-center justify-center" style="animation-delay: 0.5s;">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="12" r="10" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round"/>
                                <polyline points="12,6 12,12 16,14" stroke="#F6C71E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>

                        <div class="h-px w-10 sm:w-14" style="background: linear-gradient(90deg, rgba(207, 154, 52, 0.5), transparent);"></div>
                    </div>

                    <!-- Number 1 Badge -->
                    <div class="icon-float mb-6 flex items-center justify-center" style="animation-delay: 0.3s;">
                        <div class="relative">
                            <!-- Outer ring -->
                            <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-full flex items-center justify-center relative" style="background: linear-gradient(135deg, rgba(207,154,52,0.2) 0%, rgba(32,15,0,0.6) 100%); border: 1.5px solid rgba(207, 154, 52, 0.4);">
                                <!-- Inner glow -->
                                <div class="absolute inset-0 rounded-full" style="box-shadow: inset 0 0 20px rgba(246, 199, 30, 0.15);"></div>
                                <!-- Number -->
                                <span class="relative font-montserrat font-900 text-5xl sm:text-6xl leading-none" style="color: #F6C71E; text-shadow: 0 0 15px rgba(246, 199, 30, 0.5), 0 0 30px rgba(246, 199, 30, 0.25);">1</span>
                            </div>
                            <!-- Subtle ring glow behind -->
                            <div class="absolute inset-[-6px] rounded-full" style="box-shadow: 0 0 20px rgba(207, 154, 52, 0.2);"></div>
                        </div>
                    </div>

                    <!-- Title: STRATEGY #1 -->
                    <h1 class="title-glow font-montserrat font-900 tracking-widest uppercase leading-none mb-3" style="color: #F6C71E; font-size: clamp(1.8rem, 5vw, 2.5rem); letter-spacing: 0.15em;">
                        STRATEGY #1
                    </h1>

                    <!-- Decorative separator -->
                    <div class="flex items-center gap-3 mb-4">
                        <div class="h-[1px] w-8 sm:w-12" style="background: linear-gradient(90deg, transparent, #CF9A34);"></div>
                        <div class="w-1.5 h-1.5 rounded-full" style="background: #CF9A34; box-shadow: 0 0 6px rgba(207, 154, 52, 0.6);"></div>
                        <div class="h-[1px] w-8 sm:w-12" style="background: linear-gradient(90deg, #CF9A34, transparent);"></div>
                    </div>

                    <!-- Subtitle: The First 24 Hours -->
                    <p class="subtitle-enter font-pop font-500 tracking-wide" style="color: rgba(255, 255, 255, 0.92); font-size: clamp(1rem, 3vw, 1.35rem); letter-spacing: 0.08em;">
                        The First 24 Hours
                    </p>

                    <!-- Bottom decorative dots -->
                    <div class="flex items-center gap-2 mt-8">
                        <div class="w-1 h-1 rounded-full" style="background: rgba(207, 154, 52, 0.3);"></div>
                        <div class="w-1.5 h-1.5 rounded-full" style="background: rgba(207, 154, 52, 0.5);"></div>
                        <div class="w-1 h-1 rounded-full" style="background: rgba(207, 154, 52, 0.3);"></div>
                    </div>
                </div>

                <!-- Corner accents -->
                <div class="absolute top-4 left-4 w-5 h-5" style="border-top: 1.5px solid rgba(207, 154, 52, 0.3); border-left: 1.5px solid rgba(207, 154, 52, 0.3); border-top-left-radius: 8px;"></div>
                <div class="absolute top-4 right-4 w-5 h-5" style="border-top: 1.5px solid rgba(207, 154, 52, 0.3); border-right: 1.5px solid rgba(207, 154, 52, 0.3); border-top-right-radius: 8px;"></div>
                <div class="absolute bottom-4 left-4 w-5 h-5" style="border-bottom: 1.5px solid rgba(207, 154, 52, 0.3); border-left: 1.5px solid rgba(207, 154, 52, 0.3); border-bottom-left-radius: 8px;"></div>
                <div class="absolute bottom-4 right-4 w-5 h-5" style="border-bottom: 1.5px solid rgba(207, 154, 52, 0.3); border-right: 1.5px solid rgba(207, 154, 52, 0.3); border-bottom-right-radius: 8px;"></div>
            </div>
        </div>
    </div>

</body>
</html>
