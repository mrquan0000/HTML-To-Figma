<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Formula — Premium Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#150A01',
                        'brand-card': '#200F00',
                        'brand-neon': '#CF9A34',
                        'brand-yellow': '#F6C71E',
                        'brand-green': '#35CC23',
                        'brand-orange': '#E8973F',
                        'brand-orange-deep': '#D36708',
                        'brand-gray': '#A9ADB1',
                        'brand-wood': '#542A06',
                        'brand-red': '#C21403',
                    },
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0500;
            margin: 0;
            padding: 0;
        }

        /* ── Neon Pulse ── */
        @keyframes neonPulse {
            0%, 100% {
                box-shadow:
                    0 0 6px  rgba(207,154,52,0.50),
                    0 0 18px rgba(207,154,52,0.25),
                    0 0 40px rgba(207,154,52,0.12),
                    inset 0 0 30px rgba(207,154,52,0.04);
            }
            50% {
                box-shadow:
                    0 0 10px rgba(207,154,52,0.65),
                    0 0 28px rgba(207,154,52,0.35),
                    0 0 60px rgba(207,154,52,0.18),
                    inset 0 0 40px rgba(207,154,52,0.06);
            }
        }

        /* ── Lightsweep ── */
        @keyframes lightsweep {
            0%   { transform: translateX(-120%); }
            100% { transform: translateX(220%); }
        }

        /* ── Glow Up (title) ── */
        @keyframes titleGlow {
            0%, 100% {
                text-shadow:
                    0 0 8px  rgba(246,199,30,0.5),
                    0 0 22px rgba(246,199,30,0.25);
            }
            50% {
                text-shadow:
                    0 0 14px rgba(246,199,30,0.7),
                    0 0 35px rgba(246,199,30,0.35);
            }
        }

        /* ── Green glow ── */
        @keyframes greenGlow {
            0%, 100% {
                text-shadow:
                    0 0 8px  rgba(53,204,35,0.45),
                    0 0 20px rgba(53,204,35,0.2);
            }
            50% {
                text-shadow:
                    0 0 14px rgba(53,204,35,0.65),
                    0 0 32px rgba(53,204,35,0.3);
            }
        }

        /* ── Dot pulse ── */
        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 6px rgba(207,154,52,0.5); }
            50%      { box-shadow: 0 0 14px rgba(207,154,52,0.8); }
        }

        /* ── Float ── */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-6px); }
        }

        /* ── Orb drift ── */
        @keyframes orbDrift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%      { transform: translate(15px, -10px) scale(1.05); }
            66%      { transform: translate(-10px, 8px) scale(0.97); }
        }

        /* ── Trophy shimmer ── */
        @keyframes shimmer {
            0%   { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

<!-- ═══════════════════════════════════════════
     VIDEO FRAME — Split Layout (Layout A)
     ═══════════════════════════════════════════ -->
<div class="w-full max-w-[1280px] aspect-video relative rounded-[28px] overflow-hidden"
     style="background: #150A01; border: 1px solid rgba(207,154,52,0.08);">

    <!-- ── Subtle grain overlay ── -->
    <div class="absolute inset-0 opacity-[0.03] pointer-events-none"
         style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 256 256%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.85%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/%3E%3C/svg%3E'); background-size: 128px 128px;">
    </div>

    <!-- ═══════════════════════════════════════
         LEFT HALF — Card Zone
         ═══════════════════════════════════════ -->
    <div class="absolute inset-y-0 left-0 w-1/2 flex items-center justify-center p-6 md:p-10">

        <!-- Ambient orb behind card -->
        <div class="absolute pointer-events-none"
             style="width: 420px; height: 420px; border-radius: 50%;
                    background: radial-gradient(circle, rgba(207,154,52,0.07) 0%, transparent 65%);
                    animation: orbDrift 8s ease-in-out infinite;">
        </div>

        <!-- ── THE CARD ── -->
        <div class="relative w-full max-w-[520px] rounded-[22px] p-7 md:p-9 border overflow-hidden"
             style="
                background: rgba(32,15,0,0.82);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                border-color: rgba(207,154,52,0.38);
                animation: neonPulse 3.5s ease-in-out infinite;
             ">

            <!-- Lightsweep shine -->
            <div class="absolute inset-0 overflow-hidden rounded-[22px] pointer-events-none">
                <div class="absolute inset-y-0 -w-full"
                     style="width: 60%; background: linear-gradient(105deg, transparent 0%, rgba(207,154,52,0.06) 40%, rgba(207,154,52,0.12) 50%, rgba(207,154,52,0.06) 60%, transparent 100%);
                            animation: lightsweep 5s ease-in-out infinite;">
                </div>
            </div>

            <!-- Inner glass sheen -->
            <div class="absolute inset-0 rounded-[22px] pointer-events-none"
                 style="background: linear-gradient(165deg, rgba(207,154,52,0.06) 0%, transparent 40%);">
            </div>

            <!-- ── Card Content ── -->
            <div class="relative z-10">

                <!-- Icon Row + Title -->
                <div class="flex items-center gap-4 mb-7">
                    <!-- Formula Icon -->
                    <div class="flex-shrink-0 w-14 h-14 rounded-[14px] flex items-center justify-center"
                         style="background: rgba(207,154,52,0.1); border: 1px solid rgba(207,154,52,0.25);">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M9 3V10.5L4.5 18C3.5 19.6 4.6 22 6.5 22H17.5C19.4 22 20.5 19.6 19.5 18L15 10.5V3" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M9 3H15" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M6 15.5H18" stroke="#F6C71E" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
                            <circle cx="11" cy="18.5" r="1.1" fill="#F6C71E" opacity="0.7"/>
                            <circle cx="14.5" cy="19.2" r="0.7" fill="#E8973F" opacity="0.5"/>
                            <circle cx="9" cy="17" r="0.5" fill="#F6C71E" opacity="0.4"/>
                        </svg>
                    </div>

                    <!-- Title Text -->
                    <div>
                        <h1 class="text-3xl md:text-[2.6rem] font-black tracking-[0.12em] leading-none"
                            style="color: #F6C71E; animation: titleGlow 3s ease-in-out infinite;">
                            GROWTH
                        </h1>
                        <h1 class="text-3xl md:text-[2.6rem] font-black tracking-[0.12em] leading-none mt-1"
                            style="color: #F6C71E; animation: titleGlow 3s ease-in-out infinite 0.3s;">
                            FORMULA
                        </h1>
                    </div>
                </div>

                <!-- Accent Divider -->
                <div class="h-px mb-7 rounded-full"
                     style="background: linear-gradient(90deg, #CF9A34 0%, rgba(207,154,52,0.15) 80%, transparent 100%);">
                </div>

                <!-- Bullet Points -->
                <div class="space-y-5 mb-7">
                    <!-- Bullet 1 -->
                    <div class="flex items-start gap-3.5">
                        <div class="flex-shrink-0 w-2.5 h-2.5 rounded-full mt-[10px]"
                             style="background: #CF9A34; animation: dotPulse 3s ease-in-out infinite;"></div>
                        <p class="text-lg md:text-xl font-semibold text-white/90 leading-snug tracking-wide">
                            Small improvements
                        </p>
                    </div>
                    <!-- Bullet 2 -->
                    <div class="flex items-start gap-3.5">
                        <div class="flex-shrink-0 w-2.5 h-2.5 rounded-full mt-[10px]"
                             style="background: #CF9A34; animation: dotPulse 3s ease-in-out infinite 0.5s;"></div>
                        <p class="text-lg md:text-xl font-semibold text-white/90 leading-snug tracking-wide">
                            Repeated consistently
                        </p>
                    </div>
                </div>

                <!-- Quote / Context Text -->
                <p class="text-[13px] md:text-sm leading-relaxed mb-7 font-medium"
                   style="color: rgba(169,173,177,0.55);">
                    Most creators never stay consistent long enough to become dangerous.
                </p>

                <!-- Green Divider -->
                <div class="h-px mb-7 rounded-full"
                     style="background: linear-gradient(90deg, rgba(53,204,35,0.4) 0%, rgba(53,204,35,0.06) 80%, transparent 100%);">
                </div>

                <!-- Trophy + Win Line -->
                <div class="flex items-center gap-4">
                    <!-- Trophy Icon -->
                    <div class="flex-shrink-0 w-13 h-13 rounded-[14px] flex items-center justify-center"
                         style="width:52px; height:52px; background: rgba(53,204,35,0.1); border: 1px solid rgba(53,204,35,0.22);">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M8 21H16" stroke="#35CC23" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M12 17V21" stroke="#35CC23" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M12 13C14.2091 13 16 11.2091 16 9V4H8V9C8 11.2091 9.79086 13 12 13Z" stroke="#35CC23" stroke-width="1.5" stroke-linejoin="round"/>
                            <path d="M16 6H18.5C19.3284 6 20 6.67157 20 7.5V8.5C20 10.1569 18.6569 11.5 17 11.5" stroke="#35CC23" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M8 6H5.5C4.67157 6 4 6.67157 4 7.5V8.5C4 10.1569 5.34315 11.5 7 11.5" stroke="#35CC23" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M10 4H14" stroke="#35CC23" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>

                    <div>
                        <p class="text-xl md:text-2xl font-extrabold tracking-wide"
                           style="color: #35CC23; animation: greenGlow 3s ease-in-out infinite;">
                            Keep learning = Win
                        </p>
                    </div>
                </div>

            </div>
            <!-- End Card Content -->
        </div>
        <!-- End THE CARD -->
    </div>
    <!-- End LEFT HALF -->

    <!-- ═══════════════════════════════════════
         RIGHT HALF — Speaker / A-Roll Zone
         ═══════════════════════════════════════ -->
    <div class="absolute inset-y-0 right-0 w-1/2 flex items-end justify-center overflow-hidden"
         style="background: linear-gradient(160deg, #150A01 0%, #1a0e03 40%, #150A01 100%);">

        <!-- Subtle warm ambient light on speaker area -->
        <div class="absolute top-1/3 left-1/2 -translate-x-1/2 pointer-events-none"
             style="width: 350px; height: 450px; border-radius: 50%;
                    background: radial-gradient(ellipse, rgba(84,42,6,0.18) 0%, transparent 65%);
                    animation: orbDrift 10s ease-in-out infinite 2s;">
        </div>

        <!-- Speaker Silhouette Placeholder -->
        <div class="relative z-10 flex flex-col items-center pb-8 md:pb-12">
            <div class="relative">
                <!-- Head -->
                <div class="w-20 h-20 rounded-full mx-auto mb-[-10px] relative z-10"
                     style="background: linear-gradient(180deg, rgba(84,42,6,0.35) 0%, rgba(32,15,0,0.5) 100%);
                            border: 1px solid rgba(207,154,52,0.06);">
                </div>
                <!-- Shoulders / Body -->
                <div class="w-44 h-52 rounded-t-[80px]"
                     style="background: linear-gradient(180deg, rgba(84,42,6,0.3) 0%, rgba(32,15,0,0.45) 100%);
                            border: 1px solid rgba(207,154,52,0.05);
                            border-bottom: none;">
                </div>
            </div>
            <p class="text-[11px] font-semibold tracking-[0.25em] uppercase mt-5"
               style="color: rgba(169,173,177,0.28);">
                Speaker &middot; A-Roll
            </p>
        </div>

        <!-- Subtle vertical light edge divider -->
        <div class="absolute inset-y-0 left-0 w-px"
             style="background: linear-gradient(180deg, transparent 10%, rgba(207,154,52,0.08) 40%, rgba(207,154,52,0.12) 50%, rgba(207,154,52,0.08) 60%, transparent 90%);">
        </div>
    </div>
    <!-- End RIGHT HALF -->

    <!-- ═══════════════════════════════════════
         FRAME DECORATION — Corner Accents
         ═══════════════════════════════════════ -->
    <!-- Top-left corner accent -->
    <div class="absolute top-4 left-4 w-8 h-8 pointer-events-none"
         style="border-top: 2px solid rgba(207,154,52,0.2); border-left: 2px solid rgba(207,154,52,0.2); border-radius: 4px 0 0 0;">
    </div>
    <!-- Top-right corner accent -->
    <div class="absolute top-4 right-4 w-8 h-8 pointer-events-none"
         style="border-top: 2px solid rgba(207,154,52,0.2); border-right: 2px solid rgba(207,154,52,0.2); border-radius: 0 4px 0 0;">
    </div>
    <!-- Bottom-left corner accent -->
    <div class="absolute bottom-4 left-4 w-8 h-8 pointer-events-none"
         style="border-bottom: 2px solid rgba(207,154,52,0.2); border-left: 2px solid rgba(207,154,52,0.2); border-radius: 0 0 0 4px;">
    </div>
    <!-- Bottom-right corner accent -->
    <div class="absolute bottom-4 right-4 w-8 h-8 pointer-events-none"
         style="border-bottom: 2px solid rgba(207,154,52,0.2); border-right: 2px solid rgba(207,154,52,0.2); border-radius: 0 0 4px 0;">
    </div>

</div>
<!-- End VIDEO FRAME -->

</body>
</html>
