<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consistency = Inevitable Growth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orangeLight: '#E8973F',
                            orangeDark: '#D36708',
                            bgGlow: '#200F00',
                            yellow: '#F6C71E',
                            grayGlass: '#A9ADB1',
                            bgBlack: '#150A01',
                            wood: '#542A06',
                            red: '#C21403',
                            neonGold: '#CF9A34',
                            green: '#35CC23',
                        }
                    },
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif'],
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #150A01;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Simulated A-roll video background */
        .video-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 50% 55%, rgba(232, 151, 63, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 40% 60% at 50% 50%, rgba(84, 42, 6, 0.25) 0%, transparent 60%),
                linear-gradient(180deg, #0a0501 0%, #150A01 30%, #1a0d02 60%, #0a0501 100%);
            filter: brightness(0.35) saturate(0.6);
            z-index: 0;
        }

        .video-bg::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -45%);
            width: 280px;
            height: 380px;
            background: radial-gradient(ellipse at center, rgba(207, 154, 52, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
        }

        /* Speaker silhouette simulation */
        .speaker-silhouette {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 320px;
            background: radial-gradient(ellipse at 50% 30%, rgba(32, 15, 0, 0.9) 0%, rgba(21, 10, 1, 0.5) 60%, transparent 100%);
            border-radius: 50% 50% 40% 40%;
            z-index: 1;
            filter: blur(2px);
        }

        /* Main card container */
        .card-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: 90%;
            max-width: 580px;
        }

        /* Glassmorphism card */
        .glass-card {
            position: relative;
            background: linear-gradient(135deg, rgba(32, 15, 0, 0.88) 0%, rgba(21, 10, 1, 0.92) 50%, rgba(32, 15, 0, 0.85) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
            border: 1.5px solid rgba(207, 154, 52, 0.35);
            padding: 40px 36px 36px;
            box-shadow:
                0 0 40px rgba(207, 154, 52, 0.12),
                0 0 80px rgba(207, 154, 52, 0.06),
                0 25px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(207, 154, 52, 0.15),
                inset 0 -1px 0 rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        /* Neon glow border animation */
        .glass-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                rgba(207, 154, 52, 0.4) 10%,
                transparent 20%,
                rgba(246, 199, 30, 0.2) 30%,
                transparent 40%,
                rgba(207, 154, 52, 0.35) 50%,
                transparent 60%,
                rgba(53, 204, 35, 0.15) 70%,
                transparent 80%,
                rgba(207, 154, 52, 0.3) 90%,
                transparent 100%
            );
            z-index: -1;
            animation: borderRotate 6s linear infinite;
            filter: blur(1px);
        }

        .glass-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(207, 154, 52, 0.05) 0%, transparent 40%, transparent 60%, rgba(53, 204, 35, 0.03) 100%);
            pointer-events: none;
        }

        @keyframes borderRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Lightsweep effect */
        .lightsweep {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(207, 154, 52, 0.04) 30%,
                rgba(246, 199, 30, 0.08) 50%,
                rgba(207, 154, 52, 0.04) 70%,
                transparent 100%
            );
            border-radius: 24px;
            animation: lightsweep 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes lightsweep {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }

        /* Glow pulse behind card */
        .glow-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110%;
            height: 120%;
            background: radial-gradient(ellipse at center, rgba(207, 154, 52, 0.1) 0%, rgba(207, 154, 52, 0.04) 40%, transparent 70%);
            border-radius: 50%;
            animation: glowPulse 3s ease-in-out infinite;
            z-index: -2;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
        }

        /* Decorative corner accents */
        .corner-accent {
            position: absolute;
            width: 32px;
            height: 32px;
            z-index: 2;
        }

        .corner-accent.top-left {
            top: 12px;
            left: 12px;
            border-top: 2px solid rgba(207, 154, 52, 0.5);
            border-left: 2px solid rgba(207, 154, 52, 0.5);
            border-top-left-radius: 8px;
        }

        .corner-accent.top-right {
            top: 12px;
            right: 12px;
            border-top: 2px solid rgba(207, 154, 52, 0.5);
            border-right: 2px solid rgba(207, 154, 52, 0.5);
            border-top-right-radius: 8px;
        }

        .corner-accent.bottom-left {
            bottom: 12px;
            left: 12px;
            border-bottom: 2px solid rgba(207, 154, 52, 0.5);
            border-left: 2px solid rgba(207, 154, 52, 0.5);
            border-bottom-left-radius: 8px;
        }

        .corner-accent.bottom-right {
            bottom: 12px;
            right: 12px;
            border-bottom: 2px solid rgba(207, 154, 52, 0.5);
            border-right: 2px solid rgba(207, 154, 52, 0.5);
            border-bottom-right-radius: 8px;
        }

        /* Title glow */
        .title-glow {
            text-shadow:
                0 0 20px rgba(246, 199, 30, 0.4),
                0 0 40px rgba(246, 199, 30, 0.15),
                0 0 60px rgba(207, 154, 52, 0.1);
        }

        /* Subtitle glow */
        .subtitle-glow {
            text-shadow:
                0 0 15px rgba(53, 204, 35, 0.35),
                0 0 30px rgba(53, 204, 35, 0.12);
        }

        /* Divider line with glow */
        .glow-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(207, 154, 52, 0.5), rgba(246, 199, 30, 0.6), rgba(207, 154, 52, 0.5), transparent);
            box-shadow: 0 0 8px rgba(207, 154, 52, 0.3);
        }

        /* Icon container glow */
        .icon-glow {
            filter: drop-shadow(0 0 8px rgba(207, 154, 52, 0.4));
        }

        /* Fade-in scale animation - starts visible for Figma compatibility */
        .card-entrance {
            animation: cardPopIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes cardPopIn {
            0% {
                transform: translate(-50%, -50%) scale(0.85);
                opacity: 0.8;
            }
            60% {
                transform: translate(-50%, -50%) scale(1.02);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        /* Ambient particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .particle-1 {
            width: 4px;
            height: 4px;
            background: rgba(207, 154, 52, 0.3);
            top: 15%;
            left: 20%;
            animation: float1 5s ease-in-out infinite;
        }

        .particle-2 {
            width: 3px;
            height: 3px;
            background: rgba(246, 199, 30, 0.2);
            top: 70%;
            right: 25%;
            animation: float2 6s ease-in-out infinite;
        }

        .particle-3 {
            width: 5px;
            height: 5px;
            background: rgba(53, 204, 35, 0.15);
            bottom: 20%;
            left: 15%;
            animation: float3 7s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            50% { transform: translateY(-12px) translateX(8px); opacity: 0.6; }
        }

        @keyframes float2 {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.2; }
            50% { transform: translateY(10px) translateX(-6px); opacity: 0.5; }
        }

        @keyframes float3 {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.2; }
            50% { transform: translateY(-8px) translateX(10px); opacity: 0.45; }
        }

        /* Quote marks styling */
        .quote-mark {
            font-size: 3rem;
            line-height: 1;
            font-family: Georgia, serif;
            color: rgba(207, 154, 52, 0.25);
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            .glass-card {
                padding: 28px 24px 28px;
                border-radius: 20px;
            }
            .corner-accent {
                width: 24px;
                height: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- Simulated dimmed A-roll video background -->
    <div class="video-bg"></div>
    <div class="speaker-silhouette"></div>

    <!-- Ambient floating particles -->
    <div class="particle particle-1"></div>
    <div class="particle particle-2"></div>
    <div class="particle particle-3"></div>

    <!-- Card container -->
    <div class="card-container card-entrance">

        <!-- Glow pulse behind card -->
        <div class="glow-pulse"></div>

        <!-- Glassmorphism card -->
        <div class="glass-card">

            <!-- Corner accents -->
            <div class="corner-accent top-left"></div>
            <div class="corner-accent top-right"></div>
            <div class="corner-accent bottom-left"></div>
            <div class="corner-accent bottom-right"></div>

            <!-- Lightsweep effect -->
            <div class="lightsweep"></div>

            <!-- Card content -->
            <div class="relative z-10">

                <!-- Top icons row -->
                <div class="flex items-center justify-center gap-4 mb-5">
                    <!-- Infinity icon -->
                    <div class="icon-glow flex items-center justify-center w-11 h-11 rounded-xl border border-opacity-30" style="border-color: rgba(207, 154, 52, 0.3); background: rgba(207, 154, 52, 0.08);">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M18.178 8.178C19.488 6.868 21.608 6.868 22.918 8.178C24.228 9.488 24.228 11.608 22.918 12.918L15.848 19.988C14.538 21.298 12.418 21.298 11.108 19.988L8.178 17.058" stroke="#CF9A34" stroke-width="2" stroke-linecap="round"/>
                            <path d="M5.828 15.822C4.518 14.512 2.398 14.512 1.088 15.822C-0.222 17.132 -0.222 19.252 1.088 20.562L5.828 15.822Z" stroke="#CF9A34" stroke-width="2" stroke-linecap="round" fill="none"/>
                            <path d="M8.178 8.178C6.868 6.868 4.748 6.868 3.438 8.178C2.128 9.488 2.128 11.608 3.438 12.918L5.828 15.308" stroke="#F6C71E" stroke-width="2" stroke-linecap="round"/>
                            <path d="M15.828 15.822C17.138 14.512 19.258 14.512 20.568 15.822C21.878 17.132 21.878 19.252 20.568 20.562" stroke="#F6C71E" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>

                    <!-- Divider dot -->
                    <div class="w-1.5 h-1.5 rounded-full" style="background: rgba(207, 154, 52, 0.5);"></div>

                    <!-- Growth chart icon -->
                    <div class="icon-glow flex items-center justify-center w-11 h-11 rounded-xl border border-opacity-30" style="border-color: rgba(53, 204, 35, 0.3); background: rgba(53, 204, 35, 0.08);">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <polyline points="22,7 13.5,15.5 8.5,10.5 2,17" stroke="#35CC23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <polyline points="16,7 22,7 22,13" stroke="#35CC23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="2" y1="20" x2="22" y2="20" stroke="rgba(53, 204, 35, 0.25)" stroke-width="1.5" stroke-linecap="round"/>
                            <line x1="2" y1="17" x2="22" y2="17" stroke="rgba(53, 204, 35, 0.1)" stroke-width="1" stroke-dasharray="2 3"/>
                        </svg>
                    </div>
                </div>

                <!-- Title -->
                <h1 class="font-montserrat font-900 text-center leading-tight tracking-wide title-glow mb-2" style="color: #F6C71E; font-size: clamp(1.35rem, 4vw, 1.85rem); letter-spacing: 0.04em;">
                    CONSISTENCY =
                    <br>
                    <span class="inline-block mt-1">INEVITABLE GROWTH</span>
                </h1>

                <!-- Subtitle -->
                <p class="font-montserrat font-700 text-center subtitle-glow mb-5" style="color: #35CC23; font-size: clamp(0.85rem, 2.5vw, 1.05rem); letter-spacing: 0.12em; text-transform: uppercase;">
                    Skills meet Ambition
                </p>

                <!-- Glow divider -->
                <div class="glow-divider mb-6 mx-auto" style="width: 70%;"></div>

                <!-- Quote content -->
                <div class="relative px-2">
                    <!-- Opening quote mark -->
                    <span class="quote-mark absolute -top-2 -left-1">"</span>

                    <blockquote class="font-poppins text-center leading-relaxed px-4" style="color: rgba(245, 240, 232, 0.88); font-size: clamp(0.9rem, 2.5vw, 1.05rem); font-weight: 400; line-height: 1.7;">
                        Long enough for your
                        <span class="font-semibold" style="color: #F6C71E; text-shadow: 0 0 10px rgba(246, 199, 30, 0.2);">skills</span>
                        to actually catch up to your
                        <span class="font-semibold" style="color: #E8973F; text-shadow: 0 0 10px rgba(232, 151, 63, 0.2);">ambition</span>
                        and your
                        <span class="font-semibold" style="color: #E8973F;">goals</span>.
                        Because if you do this
                        <span class="font-bold uppercase tracking-wider" style="color: #35CC23; text-shadow: 0 0 12px rgba(53, 204, 35, 0.25);">consistently</span>,
                        your
                        <span class="font-bold" style="color: #F6C71E; text-shadow: 0 0 12px rgba(246, 199, 30, 0.25);">growth</span>
                        becomes
                        <span class="font-bold uppercase tracking-wider" style="color: #F6C71E; text-shadow: 0 0 15px rgba(246, 199, 30, 0.3);">inevitable</span>.
                    </blockquote>

                    <!-- Closing quote mark -->
                    <span class="quote-mark absolute -bottom-4 -right-1">"</span>
                </div>

                <!-- Bottom decorative element -->
                <div class="flex items-center justify-center gap-3 mt-8">
                    <div class="h-px flex-1 max-w-16" style="background: linear-gradient(90deg, transparent, rgba(207, 154, 52, 0.3));"></div>
                    <div class="w-2 h-2 rounded-full" style="background: #CF9A34; box-shadow: 0 0 10px rgba(207, 154, 52, 0.5);"></div>
                    <div class="h-px flex-1 max-w-16" style="background: linear-gradient(90deg, rgba(207, 154, 52, 0.3), transparent);"></div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
