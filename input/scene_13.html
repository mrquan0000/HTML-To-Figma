<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Lesson Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orange: '#E8973F',
                            darkOrange: '#D36708',
                            darkBg: '#200F00',
                            yellow: '#F6C71E',
                            glass: '#A9ADB1',
                            black: '#150A01',
                            wood: '#542A06',
                            red: '#C21403',
                            neon: '#CF9A34',
                            green: '#35CC23',
                        }
                    },
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .card-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 16 / 9;
            background: #150A01;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 
                0 0 60px rgba(207, 154, 52, 0.15),
                0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .split-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .left-panel {
            width: 55%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }

        .right-panel {
            width: 45%;
            height: 100%;
            background: linear-gradient(135deg, #200F00 0%, #150A01 50%, #0D0600 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .right-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(207, 154, 52, 0.05) 0%, transparent 60%);
        }

        .speaker-silhouette {
            width: 70%;
            height: 85%;
            background: linear-gradient(180deg, rgba(84, 42, 6, 0.3) 0%, rgba(32, 15, 0, 0.6) 100%);
            border-radius: 50% 50% 0 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .speaker-silhouette::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, #150A01, transparent);
        }

        .speaker-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #542A06, #200F00);
            border: 2px solid rgba(207, 154, 52, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .key-lesson-card {
            width: 100%;
            max-width: 280px;
            background: linear-gradient(145deg, rgba(32, 15, 0, 0.85) 0%, rgba(21, 10, 1, 0.95) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid rgba(207, 154, 52, 0.6);
            border-radius: 20px;
            padding: 28px 24px;
            position: relative;
            box-shadow: 
                0 0 30px rgba(207, 154, 52, 0.2),
                0 0 60px rgba(207, 154, 52, 0.1),
                inset 0 1px 0 rgba(207, 154, 52, 0.15),
                0 20px 40px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .key-lesson-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 21px;
            background: linear-gradient(135deg, rgba(207, 154, 52, 0.4) 0%, rgba(232, 151, 63, 0.2) 50%, rgba(207, 154, 52, 0.4) 100%);
            z-index: -1;
            filter: blur(1px);
        }

        .key-lesson-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(207, 154, 52, 0.08) 25%, rgba(246, 199, 30, 0.12) 50%, rgba(207, 154, 52, 0.08) 75%, transparent 100%);
            animation: lightsweep 4s ease-in-out infinite;
            pointer-events: none;
            border-radius: 20px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .lightbulb-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #F6C71E, #E8973F);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(246, 199, 30, 0.3);
            animation: iconGlow 3s ease-in-out infinite;
        }

        .title-text {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 3px;
            color: #F6C71E;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(246, 199, 30, 0.4);
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, rgba(207, 154, 52, 0.6) 0%, rgba(207, 154, 52, 0.1) 100%);
            margin-bottom: 20px;
        }

        .bullet-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .bullet-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: fadeIn 0.6s ease-out forwards;
            animation-delay: 0.3s;
        }

        .bullet-item:nth-child(2) {
            animation-delay: 0.5s;
        }

        .bullet-dot {
            width: 8px;
            height: 8px;
            min-width: 8px;
            background: #CF9A34;
            border-radius: 50%;
            margin-top: 7px;
            box-shadow: 0 0 10px rgba(207, 154, 52, 0.5);
        }

        .bullet-text {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.5;
        }

        .keyword {
            color: #E8973F;
            font-weight: 700;
            text-shadow: 0 0 12px rgba(232, 151, 63, 0.4);
        }

        .presentation-icon {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            opacity: 0.15;
        }

        @keyframes slideIn {
            0% {
                transform: translateX(-30px);
                opacity: 1;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes lightsweep {
            0% {
                transform: translateX(-30%);
            }
            50% {
                transform: translateX(30%);
            }
            100% {
                transform: translateX(-30%);
            }
        }

        @keyframes iconGlow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(246, 199, 30, 0.3);
            }
            50% {
                box-shadow: 0 0 30px rgba(246, 199, 30, 0.5);
            }
        }

        .ambient-glow {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }

        .glow-1 {
            top: -60px;
            left: -60px;
            background: rgba(207, 154, 52, 0.08);
        }

        .glow-2 {
            bottom: -40px;
            right: -40px;
            background: rgba(232, 151, 63, 0.06);
        }

        .quote-mark {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 40px;
            color: rgba(207, 154, 52, 0.1);
            font-family: Georgia, serif;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <!-- Ambient Glow Effects -->
        <div class="ambient-glow glow-1"></div>
        <div class="ambient-glow glow-2"></div>
        
        <div class="split-layout">
            <!-- Left Panel - Key Lesson Card -->
            <div class="left-panel">
                <div class="key-lesson-card">
                    <span class="quote-mark">"</span>
                    
                    <!-- Header with Icon -->
                    <div class="card-header">
                        <div class="lightbulb-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M9 21H15M12 3C8.68629 3 6 5.68629 6 9C6 11.2208 7.2066 13.1599 9 14.1973V17H15V14.1973C16.7934 13.1599 18 11.2208 18 9C18 5.68629 15.3137 3 12 3Z" stroke="#150A01" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M9 17H15" stroke="#150A01" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <span class="title-text">KEY LESSON</span>
                    </div>

                    <!-- Divider -->
                    <div class="divider"></div>

                    <!-- Bullet Points -->
                    <ul class="bullet-list">
                        <li class="bullet-item">
                            <div class="bullet-dot"></div>
                            <span class="bullet-text">Don't give up too early</span>
                        </li>
                        <li class="bullet-item">
                            <div class="bullet-dot"></div>
                            <span class="bullet-text">Problem: <span class="keyword">Presentation</span>, not content</span>
                        </li>
                    </ul>

                    <!-- Subtle Presentation Icon -->
                    <svg class="presentation-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="3" width="20" height="14" rx="2" stroke="#CF9A34" stroke-width="1.5"/>
                        <path d="M8 21H16M12 17V21" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M7 8L10 11L7 14" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 14H17" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>

            <!-- Right Panel - Speaker Area -->
            <div class="right-panel">
                <div class="speaker-silhouette">
                    <div class="speaker-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="8" r="4" stroke="#CF9A34" stroke-width="1.5"/>
                            <path d="M4 20C4 16.6863 7.58172 14 12 14C16.4183 14 20 16.6863 20 20" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>
                
                <!-- Subtle grid pattern -->
                <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; opacity: 0.03; background-image: linear-gradient(rgba(207, 154, 52, 0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(207, 154, 52, 0.5) 1px, transparent 1px); background-size: 30px 30px;"></div>
            </div>
        </div>
    </div>
</body>
</html>
