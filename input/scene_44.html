<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategy #5 — Mindset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            warm: '#E8973F',
                            orange: '#D36708',
                            darkBg: '#200F00',
                            yellow: '#F6C71E',
                            glass: '#A9ADB1',
                            black: '#150A01',
                            wood: '#542A06',
                            red: '#C21403',
                            neon: '#CF9A34',
                            green: '#35CC23'
                        }
                    },
                    fontFamily: {
                        mont: ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; }

        /* Neon Glow Pulse — box-shadow only, no opacity change */
        @keyframes glowPulse {
            0%, 100% {
                box-shadow:
                    0 0 20px rgba(207,154,52,0.4),
                    0 0 40px rgba(207,154,52,0.2),
                    0 0 80px rgba(207,154,52,0.1),
                    inset 0 1px 0 rgba(207,154,52,0.15);
            }
            50% {
                box-shadow:
                    0 0 30px rgba(207,154,52,0.6),
                    0 0 60px rgba(207,154,52,0.3),
                    0 0 120px rgba(207,154,52,0.15),
                    inset 0 1px 0 rgba(207,154,52,0.25);
            }
        }

        /* Lightsweep — translateX only, no opacity */
        @keyframes lightsweep {
            0% { transform: translateX(-200%); }
            100% { transform: translateX(200%); }
        }

        /* Ambient ambient background pulse */
        @keyframes ambientPulse {
            0%, 100% { opacity: 0.08; }
            50% { opacity: 0.15; }
        }
    </style>
</head>
<body class="bg-brand-black min-h-screen flex items-center justify-center overflow-hidden">

    <!-- ============================================ -->
    <!-- VIDEO BACKGROUND SIMULATION (A-ROLL AREA)    -->
    <!-- ============================================ -->
    <div class="fixed inset-0 w-full h-full overflow-hidden">

        <!-- Simulated Speaker / A-Roll Dark Background -->
        <div class="absolute inset-0" style="background: radial-gradient(ellipse 60% 70% at 50% 45%, #2a1a0a 0%, #150A01 60%, #0a0500 100%);"></div>

        <!-- Subtle Ambient Warm Light (simulating studio lighting on speaker) -->
        <div class="absolute inset-0" style="background: radial-gradient(circle 300px at 50% 40%, rgba(232,151,63,0.08) 0%, transparent 70%); animation: ambientPulse 6s ease-in-out infinite;"></div>

        <!-- Additional warm rim light simulation -->
        <div class="absolute inset-0" style="background: radial-gradient(circle 200px at 35% 55%, rgba(207,154,52,0.04) 0%, transparent 60%);"></div>
        <div class="absolute inset-0" style="background: radial-gradient(circle 200px at 65% 55%, rgba(207,154,52,0.04) 0%, transparent 60%);"></div>

        <!-- Speaker Silhouette Suggestion (subtle shape) -->
        <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-[45%] w-[280px] h-[350px] rounded-full" style="background: radial-gradient(ellipse at 50% 30%, rgba(60,35,12,0.3) 0%, rgba(21,10,1,0.1) 60%, transparent 80%); filter: blur(40px);"></div>

        <!-- Dimmed Overlay for Card Contrast -->
        <div class="absolute inset-0 bg-black/40"></div>

        <!-- Vignette -->
        <div class="absolute inset-0" style="background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);"></div>

        <!-- Subtle Film Grain / Noise Texture -->
        <div class="absolute inset-0 opacity-[0.03]" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 256 256%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noise%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noise)%22/%3E%3C/svg%3E'); background-size: 128px 128px;"></div>
    </div>

    <!-- ============================================ -->
    <!-- CENTERED OVERLAY CARD (LAYOUT C)             -->
    <!-- ============================================ -->
    <div class="relative z-10 w-full max-w-[600px] mx-4 sm:mx-6">

        <div
            class="relative rounded-3xl p-[2px] overflow-hidden"
            style="animation: glowPulse 4s ease-in-out infinite;"
        >
            <!-- Neon Border Gradient Layer -->
            <div class="absolute inset-0 rounded-3xl" style="background: linear-gradient(135deg, #CF9A34 0%, #E8973F 25%, #D36708 50%, #CF9A34 75%, #F6C71E 100%); opacity: 0.85;"></div>

            <!-- Inner Card with Glassmorphism -->
            <div class="relative rounded-[22px] overflow-hidden" style="background: rgba(32,15,0,0.88); backdrop-filter: blur(24px) saturate(1.4); -webkit-backdrop-filter: blur(24px) saturate(1.4);">

                <!-- Lightsweep Overlay Effect -->
                <div class="absolute inset-0 overflow-hidden rounded-[22px] pointer-events-none" style="z-index: 5;">
                    <div
                        class="absolute top-0 h-full w-[120px]"
                        style="background: linear-gradient(90deg, transparent 0%, rgba(207,154,52,0.06) 30%, rgba(246,199,30,0.08) 50%, rgba(207,154,52,0.06) 70%, transparent 100%); animation: lightsweep 6s ease-in-out infinite; animation-delay: 1s;"
                    ></div>
                </div>

                <!-- Inner Top Glow -->
                <div class="absolute top-0 left-0 right-0 h-[1px]" style="background: linear-gradient(90deg, transparent 10%, rgba(207,154,52,0.5) 30%, rgba(246,199,30,0.6) 50%, rgba(207,154,52,0.5) 70%, transparent 90%);"></div>

                <!-- Card Content -->
                <div class="relative px-8 sm:px-10 pt-8 sm:pt-10 pb-8 sm:pb-10" style="z-index: 10;">

                    <!-- === TOP SECTION: Strategy Badge & Number === -->
                    <div class="flex items-center justify-between mb-6">

                        <!-- Left: "STRATEGY" Label + Hashtag Icon -->
                        <div class="flex items-center gap-3">
                            <!-- Hashtag / Diamond Icon -->
                            <div class="flex-shrink-0 w-9 h-9 rounded-lg flex items-center justify-center" style="background: rgba(207,154,52,0.12); border: 1px solid rgba(207,154,52,0.2);">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#CF9A34" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="4" y1="9" x2="20" y2="9"/>
                                    <line x1="4" y1="15" x2="20" y2="15"/>
                                    <line x1="10" y1="3" x2="8" y2="21"/>
                                    <line x1="16" y1="3" x2="14" y2="21"/>
                                </svg>
                            </div>
                            <!-- Strategy Label -->
                            <span class="font-mont text-[11px] sm:text-xs font-bold tracking-[0.35em] uppercase" style="color: #CF9A34;">Strategy</span>
                        </div>

                        <!-- Right: Large "5" Number Icon -->
                        <div class="flex items-center gap-3">
                            <!-- Brain Icon -->
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" style="opacity: 0.5;">
                                <path d="M12 2a5 5 0 0 1 5 5c0 .9-.2 1.7-.7 2.5A5 5 0 0 1 19 14a5 5 0 0 1-3 4.6V22h-8v-3.4A5 5 0 0 1 5 14a5 5 0 0 1 2.7-4.5A5 5 0 0 1 7 7a5 5 0 0 1 5-5z" stroke="#A9ADB1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M12 2v20M9 7h6M8 12h8" stroke="#A9ADB1" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                            <!-- Number 5 Badge -->
                            <div class="relative w-14 h-14 sm:w-16 sm:h-16 rounded-2xl flex items-center justify-center overflow-hidden" style="background: linear-gradient(135deg, rgba(246,199,30,0.15) 0%, rgba(232,151,63,0.1) 100%); border: 1.5px solid rgba(246,199,30,0.3); box-shadow: 0 0 20px rgba(246,199,30,0.1), inset 0 0 20px rgba(246,199,30,0.05);">
                                <span class="font-mont text-3xl sm:text-4xl font-black" style="color: #F6C71E; text-shadow: 0 0 20px rgba(246,199,30,0.4), 0 0 40px rgba(246,199,30,0.2);">5</span>
                            </div>
                        </div>
                    </div>

                    <!-- === DIVIDER === -->
                    <div class="mb-6 h-[1px]" style="background: linear-gradient(90deg, transparent 0%, rgba(207,154,52,0.3) 20%, rgba(207,154,52,0.4) 50%, rgba(207,154,52,0.3) 80%, transparent 100%);"></div>

                    <!-- === MAIN TITLE === -->
                    <div class="mb-2">
                        <h1 class="font-mont text-[42px] sm:text-[52px] font-black leading-[0.95] tracking-tight" style="color: #F6C71E; text-shadow: 0 0 30px rgba(246,199,30,0.35), 0 0 60px rgba(246,199,30,0.15);">
                            STRATEGY<span class="ml-2 text-[32px] sm:text-[40px]" style="color: #CF9A34;">#5</span>
                        </h1>
                    </div>

                    <!-- === SUBTITLE === -->
                    <div class="mb-7 flex items-center gap-3">
                        <!-- Brain Icon for Mindset -->
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                            <path d="M9.5 2a4.5 4.5 0 0 0-4.47 4.07A3.5 3.5 0 0 0 2 9.5a3.5 3.5 0 0 0 2.5 3.36V20a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-7.14A3.5 3.5 0 0 0 18 9.5a3.5 3.5 0 0 0-3.03-3.43A4.5 4.5 0 0 0 9.5 2z" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
                            <path d="M12 2v20M9.5 6h5M8 10h8M9 14h6" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                            <circle cx="12" cy="5" r="1.5" fill="#F6C71E" opacity="0.6"/>
                        </svg>
                        <h2 class="font-mont text-[28px] sm:text-[36px] font-semibold tracking-wide" style="color: #FFFFFF; text-shadow: 0 2px 10px rgba(0,0,0,0.4);">
                            Mindset
                        </h2>
                    </div>

                    <!-- === QUOTE SECTION === -->
                    <div class="relative rounded-2xl px-6 py-5 overflow-hidden" style="background: rgba(21,10,1,0.6); border: 1px solid rgba(207,154,52,0.15); backdrop-filter: blur(10px);">

                        <!-- Quote mark -->
                        <div class="absolute top-3 left-4 font-mont text-[48px] font-black leading-none" style="color: rgba(207,154,52,0.15);">"</div>

                        <!-- Quote text -->
                        <p class="relative font-mont text-[15px] sm:text-[17px] font-medium leading-[1.7] pl-2" style="color: rgba(255,255,255,0.85);">
                            And finally, we have <span class="font-bold" style="color: #F6C71E; text-shadow: 0 0 10px rgba(246,199,30,0.3);">strategy number five</span>, which is <span class="font-bold" style="color: #E8973F;">mindset</span>, because honestly, <span class="font-bold" style="color: #FFFFFF;">most people quit way too early</span>.
                        </p>

                        <!-- Closing quote mark -->
                        <div class="absolute bottom-1 right-5 font-mont text-[48px] font-black leading-none" style="color: rgba(207,154,52,0.15);">"</div>
                    </div>

                    <!-- === BOTTOM ACCENT DOTS === -->
                    <div class="flex items-center justify-center gap-2 mt-6">
                        <div class="w-1.5 h-1.5 rounded-full" style="background: rgba(169,173,177,0.3);"></div>
                        <div class="w-1.5 h-1.5 rounded-full" style="background: rgba(169,173,177,0.3);"></div>
                        <div class="w-1.5 h-1.5 rounded-full" style="background: rgba(169,173,177,0.3);"></div>
                        <div class="w-1.5 h-1.5 rounded-full" style="background: rgba(169,173,177,0.3);"></div>
                        <div class="w-2 h-2 rounded-full" style="background: #F6C71E; box-shadow: 0 0 8px rgba(246,199,30,0.5);"></div>
                    </div>

                </div>
                <!-- End Card Content -->

            </div>
            <!-- End Inner Card -->

        </div>
        <!-- End Border Wrapper -->

    </div>
    <!-- End Centered Card Container -->

</body>
</html>
