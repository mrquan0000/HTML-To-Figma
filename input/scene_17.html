<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategy #2 Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            warmOrange: '#E8973F',
                            deepOrange: '#D36708',
                            darkBg: '#200F00',
                            yellowAccent: '#F6C71E',
                            glassGray: '#A9ADB1',
                            deepBlack: '#150A01',
                            woodBrown: '#542A06',
                            redAccent: '#C21403',
                            neonGold: '#CF9A34',
                            greenPositive: '#35CC23',
                        }
                    },
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Animated glow border */
        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 
                    0 0 20px rgba(207, 154, 52, 0.4),
                    0 0 40px rgba(207, 154, 52, 0.2),
                    0 0 60px rgba(207, 154, 52, 0.1);
            }
            50% {
                box-shadow: 
                    0 0 30px rgba(207, 154, 52, 0.6),
                    0 0 60px rgba(207, 154, 52, 0.3),
                    0 0 90px rgba(207, 154, 52, 0.15);
            }
        }

        @keyframes subtleFloat {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        @keyframes lightsweep {
            0% {
                background-position: -200% center;
            }
            100% {
                background-position: 200% center;
            }
        }

        @keyframes borderGlow {
            0%, 100% {
                border-color: rgba(207, 154, 52, 0.6);
            }
            50% {
                border-color: rgba(207, 154, 52, 1);
            }
        }

        .card-glow {
            animation: glowPulse 3s ease-in-out infinite, subtleFloat 6s ease-in-out infinite;
        }

        .border-glow {
            animation: borderGlow 2s ease-in-out infinite;
        }

        .lightsweep-effect {
            background: linear-gradient(
                90deg, 
                transparent 0%, 
                rgba(207, 154, 52, 0.15) 45%, 
                rgba(246, 199, 30, 0.25) 50%, 
                rgba(207, 154, 52, 0.15) 55%, 
                transparent 100%
            );
            background-size: 200% 100%;
            animation: lightsweep 4s ease-in-out infinite;
        }

        /* Title glow effect */
        .title-glow {
            text-shadow: 
                0 0 10px rgba(246, 199, 30, 0.5),
                0 0 20px rgba(246, 199, 30, 0.3),
                0 0 40px rgba(246, 199, 30, 0.15);
        }

        /* Subtle neon text */
        .neon-text {
            text-shadow: 
                0 0 8px rgba(207, 154, 52, 0.4),
                0 0 16px rgba(207, 154, 52, 0.2);
        }

        /* Icon container glow */
        .icon-glow {
            box-shadow: 
                0 0 15px rgba(246, 199, 30, 0.3),
                0 0 30px rgba(246, 199, 30, 0.15),
                inset 0 0 15px rgba(246, 199, 30, 0.1);
        }

        /* Decorative accent line */
        .accent-line {
            background: linear-gradient(90deg, transparent, #CF9A34, #F6C71E, #CF9A34, transparent);
        }

        /* Video background overlay pattern */
        .video-overlay {
            background: 
                radial-gradient(ellipse at center, rgba(32, 15, 0, 0.7) 0%, rgba(21, 10, 1, 0.92) 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden" 
      style="background-color: #150A01;">
    
    <!-- Simulated dimmed video background -->
    <div class="fixed inset-0 z-0 video-overlay"></div>
    
    <!-- Background ambient particles -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute w-96 h-96 rounded-full opacity-10"
             style="background: radial-gradient(circle, #CF9A34 0%, transparent 70%); top: -100px; right: -100px;"></div>
        <div class="absolute w-80 h-80 rounded-full opacity-8"
             style="background: radial-gradient(circle, #542A06 0%, transparent 70%); bottom: -80px; left: -80px; opacity: 0.08;"></div>
    </div>

    <!-- Main Card Container -->
    <div class="relative z-10 w-full flex items-center justify-center" style="max-width: 600px;">
        
        <!-- Card Wrapper with glow effect -->
        <div class="card-glow border-glow w-full rounded-3xl border-2 border-opacity-60 relative overflow-hidden"
             style="
                background: linear-gradient(145deg, #200F00 0%, #150A01 50%, #200F00 100%);
                border-color: #CF9A34;
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
             ">
            
            <!-- Lightsweep overlay -->
            <div class="absolute inset-0 lightsweep-effect rounded-3xl pointer-events-none z-10"></div>
            
            <!-- Top decorative accent -->
            <div class="accent-line h-1 w-full opacity-80"></div>
            
            <!-- Card Content -->
            <div class="relative z-20 px-8 py-10 sm:px-10 sm:py-12">
                
                <!-- Icon Section -->
                <div class="flex items-center justify-center gap-5 mb-8">
                    
                    <!-- Number 2 Icon -->
                    <div class="icon-glow flex items-center justify-center w-16 h-16 rounded-2xl border border-brand-neonGold border-opacity-40"
                         style="background: linear-gradient(135deg, rgba(207, 154, 52, 0.15) 0%, rgba(32, 15, 0, 0.8) 100%);">
                        <svg class="w-8 h-8" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="20" cy="20" r="18" stroke="#CF9A34" stroke-width="2" opacity="0.4"/>
                            <text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle" 
                                  fill="#F6C71E" font-family="Montserrat" font-weight="800" font-size="20">2</text>
                        </svg>
                    </div>
                    
                    <!-- Target Icon -->
                    <div class="icon-glow flex items-center justify-center w-16 h-16 rounded-2xl border border-brand-neonGold border-opacity-40"
                         style="background: linear-gradient(135deg, rgba(207, 154, 52, 0.15) 0%, rgba(32, 15, 0, 0.8) 100%);">
                        <svg class="w-9 h-9" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="20" cy="20" r="17" stroke="#CF9A34" stroke-width="1.5" opacity="0.3"/>
                            <circle cx="20" cy="20" r="12" stroke="#CF9A34" stroke-width="1.5" opacity="0.5"/>
                            <circle cx="20" cy="20" r="7" stroke="#F6C71E" stroke-width="2" opacity="0.7"/>
                            <circle cx="20" cy="20" r="2.5" fill="#F6C71E"/>
                        </svg>
                    </div>
                </div>
                
                <!-- Title Section -->
                <div class="text-center mb-8">
                    <!-- Strategy Label -->
                    <div class="inline-flex items-center gap-2 mb-3">
                        <div class="w-8 h-px bg-brand-neonGold opacity-50"></div>
                        <span class="text-xs font-semibold tracking-[0.3em] uppercase"
                              style="color: #CF9A34;">Strategy</span>
                        <div class="w-8 h-px bg-brand-neonGold opacity-50"></div>
                    </div>
                    
                    <!-- Main Title -->
                    <h1 class="title-glow text-4xl sm:text-5xl font-black tracking-tight leading-none mb-4"
                        style="color: #F6C71E; letter-spacing: -0.02em;">
                        STRATEGY #2
                    </h1>
                    
                    <!-- Subtitle -->
                    <h2 class="text-xl sm:text-2xl font-semibold tracking-wide"
                        style="color: #FFFFFF; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">
                        Niche & Audience Avatar
                    </h2>
                </div>
                
                <!-- Divider -->
                <div class="accent-line h-px w-3/4 mx-auto mb-8 opacity-50 rounded-full"></div>
                
                <!-- Content Section -->
                <div class="glassmorphism-content rounded-2xl p-6 sm:p-7 border border-brand-neonGold border-opacity-20"
                     style="background: rgba(32, 15, 0, 0.5); backdrop-filter: blur(10px);">
                    
                    <!-- Opening quote mark -->
                    <div class="mb-4">
                        <svg class="w-8 h-8 opacity-30" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M7.5 17.5C7.5 14.5 9.5 12.5 12.5 11.5L13.5 13C11.5 14 10.5 15.5 10.5 17.5H13.5V22.5H7.5V17.5ZM18.5 17.5C18.5 14.5 20.5 12.5 23.5 11.5L24.5 13C22.5 14 21.5 15.5 21.5 17.5H24.5V22.5H18.5V17.5Z" fill="#CF9A34"/>
                        </svg>
                    </div>
                    
                    <p class="text-base sm:text-lg leading-relaxed font-medium"
                       style="color: #A9ADB1;">
                        <span class="neon-text font-bold" style="color: #F6C71E;">Which is choosing the right niche and audience avatar.</span> 
                        Because honestly, this is where 
                        <span class="font-bold" style="color: #E8973F;">most creators completely kill their channel</span> 
                        before it even starts.
                    </p>
                    
                    <!-- Closing quote mark -->
                    <div class="mt-3 flex justify-end">
                        <svg class="w-8 h-8 opacity-30 rotate-180" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M7.5 17.5C7.5 14.5 9.5 12.5 12.5 11.5L13.5 13C11.5 14 10.5 15.5 10.5 17.5H13.5V22.5H7.5V17.5ZM18.5 17.5C18.5 14.5 20.5 12.5 23.5 11.5L24.5 13C22.5 14 21.5 15.5 21.5 17.5H24.5V22.5H18.5V17.5Z" fill="#CF9A34"/>
                        </svg>
                    </div>
                </div>
                
                <!-- Bottom decorative dots -->
                <div class="flex items-center justify-center gap-2 mt-8">
                    <div class="w-2 h-2 rounded-full" style="background: #CF9A34; opacity: 0.3;"></div>
                    <div class="w-2 h-2 rounded-full" style="background: #F6C71E; opacity: 0.6;"></div>
                    <div class="w-2 h-2 rounded-full" style="background: #CF9A34; opacity: 0.3;"></div>
                </div>
            </div>
            
            <!-- Bottom decorative accent -->
            <div class="accent-line h-1 w-full opacity-80"></div>
        </div>
    </div>
</body>
</html>
