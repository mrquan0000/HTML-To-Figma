<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 Strategies to Grow Fast - Overlay Pop Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orange: '#E8973F',
                            darkOrange: '#D36708',
                            bgWarm: '#200F00',
                            yellow: '#F6C71E',
                            gray: '#A9ADB1',
                            bgDeep: '#150A01',
                            wood: '#542A06',
                            red: '#C21403',
                            neonGold: '#CF9A34',
                            green: '#35CC23',
                        }
                    },
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #000000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Simulated A-roll speaker silhouette background */
        .a-roll-bg {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 320px 420px at 50% 55%, rgba(232, 151, 63, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 200px 280px at 50% 50%, rgba(32, 15, 0, 0.9) 0%, transparent 100%),
                linear-gradient(180deg, #150A01 0%, #200F00 40%, #150A01 100%);
            filter: brightness(0.55);
        }

        /* Speaker silhouette mockup */
        .speaker-silhouette {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 400px;
            background: radial-gradient(ellipse at 50% 25%, rgba(45, 25, 8, 0.8) 0%, transparent 70%);
            opacity: 0.5;
        }

        /* Main overlay card */
        .overlay-card {
            position: relative;
            background: linear-gradient(145deg, rgba(32, 15, 0, 0.85) 0%, rgba(21, 10, 1, 0.92) 100%);
            border: 1.5px solid rgba(207, 154, 52, 0.45);
            border-radius: 24px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            max-width: 600px;
            width: 90%;
            animation: cardPop 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .overlay-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            background: linear-gradient(135deg, rgba(207, 154, 52, 0.3) 0%, rgba(207, 154, 52, 0.05) 40%, rgba(246, 199, 30, 0.15) 70%, rgba(207, 154, 52, 0.25) 100%);
            z-index: -1;
            animation: glowPulse 3s ease-in-out infinite;
        }

        .overlay-card::after {
            content: '';
            position: absolute;
            inset: -20px;
            border-radius: 40px;
            background: radial-gradient(ellipse at center, rgba(207, 154, 52, 0.12) 0%, transparent 70%);
            z-index: -2;
            animation: glowPulse 3s ease-in-out infinite;
            filter: blur(15px);
        }

        /* Glow border animation */
        .glow-border {
            position: absolute;
            inset: -1px;
            border-radius: 25px;
            border: 1.5px solid transparent;
            background: linear-gradient(135deg, rgba(207, 154, 52, 0.6), rgba(246, 199, 30, 0.2), rgba(207, 154, 52, 0.5)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderShimmer 4s linear infinite;
            z-index: 1;
        }

        /* Title glow effect */
        .title-glow {
            text-shadow: 
                0 0 20px rgba(246, 199, 30, 0.5),
                0 0 40px rgba(246, 199, 30, 0.25),
                0 0 80px rgba(207, 154, 52, 0.15);
            animation: titleGlow 3s ease-in-out infinite;
        }

        /* Neon line accent */
        .neon-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #CF9A34, #F6C71E, #CF9A34, transparent);
            border-radius: 1px;
            box-shadow: 0 0 12px rgba(207, 154, 52, 0.4), 0 0 24px rgba(207, 154, 52, 0.15);
            animation: lineGlow 3s ease-in-out infinite;
        }

        /* Icon glow */
        .icon-glow {
            filter: drop-shadow(0 0 8px rgba(246, 199, 30, 0.4));
            animation: iconFloat 4s ease-in-out infinite;
        }

        .icon-glow-delay {
            filter: drop-shadow(0 0 8px rgba(207, 154, 52, 0.4));
            animation: iconFloat 4s ease-in-out 1s infinite;
        }

        /* Lightsweep effect on card */
        .lightsweep {
            position: absolute;
            inset: 0;
            border-radius: 24px;
            overflow: hidden;
            z-index: 2;
            pointer-events: none;
        }

        .lightsweep::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                105deg,
                transparent 40%,
                rgba(207, 154, 52, 0.06) 45%,
                rgba(246, 199, 30, 0.1) 50%,
                rgba(207, 154, 52, 0.06) 55%,
                transparent 60%
            );
            animation: lightsweepMove 5s ease-in-out infinite;
        }

        /* Number badge */
        .number-badge {
            background: linear-gradient(135deg, #F6C71E, #E8973F);
            box-shadow: 0 4px 20px rgba(246, 199, 30, 0.35), 0 0 40px rgba(207, 154, 52, 0.15);
        }

        /* Subtle grain texture */
        .grain-overlay {
            position: absolute;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* Floating particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(207, 154, 52, 0.3);
            filter: blur(1px);
            animation: particleFloat 6s ease-in-out infinite;
        }

        .particle:nth-child(1) { width: 3px; height: 3px; top: 10%; left: 15%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 2px; height: 2px; top: 20%; right: 20%; animation-delay: 1s; }
        .particle:nth-child(3) { width: 4px; height: 4px; bottom: 15%; left: 25%; animation-delay: 2s; }
        .particle:nth-child(4) { width: 2px; height: 2px; bottom: 25%; right: 15%; animation-delay: 0.5s; }
        .particle:nth-child(5) { width: 3px; height: 3px; top: 40%; left: 8%; animation-delay: 1.5s; }

        /* Animations */
        @keyframes cardPop {
            0% { transform: scale(0.88); opacity: 1; }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes titleGlow {
            0%, 100% { 
                text-shadow: 
                    0 0 20px rgba(246, 199, 30, 0.5),
                    0 0 40px rgba(246, 199, 30, 0.25),
                    0 0 80px rgba(207, 154, 52, 0.15);
            }
            50% { 
                text-shadow: 
                    0 0 30px rgba(246, 199, 30, 0.7),
                    0 0 60px rgba(246, 199, 30, 0.35),
                    0 0 100px rgba(207, 154, 52, 0.2);
            }
        }

        @keyframes borderShimmer {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        @keyframes lightsweepMove {
            0% { transform: translateX(-80%) rotate(25deg); }
            100% { transform: translateX(80%) rotate(25deg); }
        }

        @keyframes lineGlow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.65; }
        }

        @keyframes particleFloat {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 1; }
            25% { transform: translateY(-15px) translateX(5px); opacity: 0.6; }
            50% { transform: translateY(-8px) translateX(-3px); opacity: 1; }
            75% { transform: translateY(-20px) translateX(8px); opacity: 0.4; }
        }
    </style>
</head>
<body class="flex items-center justify-center w-screen h-screen bg-brand-bgDeep font-montserrat overflow-hidden">

    <!-- Background A-roll simulation -->
    <div class="a-roll-bg"></div>
    <div class="speaker-silhouette"></div>

    <!-- Floating particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <!-- Grain texture overlay -->
    <div class="grain-overlay"></div>

    <!-- ========== MAIN OVERLAY CARD ========== -->
    <div class="overlay-card relative z-10 flex flex-col items-center px-8 py-10 sm:px-12 sm:py-12">

        <!-- Animated glow border -->
        <div class="glow-border"></div>

        <!-- Lightsweep effect -->
        <div class="lightsweep"></div>

        <!-- Top icon row -->
        <div class="flex items-center gap-4 mb-6">

            <!-- Strategy icon (chess/strategy) -->
            <div class="icon-glow flex items-center justify-center w-12 h-12 sm:w-14 sm:h-14 rounded-2xl bg-gradient-to-br from-brand-neonGold/15 to-brand-yellow/5 border border-brand-neonGold/20">
                <svg class="w-6 h-6 sm:w-7 sm:h-7" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#F6C71E" stroke="#CF9A34" stroke-width="0.5"/>
                    <circle cx="12" cy="12" r="3" fill="none" stroke="#F6C71E" stroke-width="1.5" stroke-dasharray="2 2"/>
                    <path d="M12 5V9M12 15V19M5 12H9M15 12H19" stroke="#CF9A34" stroke-width="0.8" stroke-linecap="round"/>
                </svg>
            </div>

            <!-- Decorative separator -->
            <div class="w-8 h-[1px] bg-gradient-to-r from-brand-neonGold/40 to-transparent"></div>

            <!-- Rocket icon -->
            <div class="icon-glow-delay flex items-center justify-center w-12 h-12 sm:w-14 sm:h-14 rounded-2xl bg-gradient-to-br from-brand-neonGold/15 to-brand-yellow/5 border border-brand-neonGold/20">
                <svg class="w-6 h-6 sm:w-7 sm:h-7" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13.13 4.07C14.75 3.16 16.76 3.33 18.21 4.78C19.66 6.23 19.83 8.24 18.93 9.87L13.13 4.07Z" fill="#CF9A34" fill-opacity="0.3"/>
                    <path d="M4.89 16.72C4.9 16.87 4.95 17.01 5.05 17.13C7.19 19.67 10.71 20.71 13.84 19.51L10.48 16.15L4.89 16.72Z" fill="#F6C71E" fill-opacity="0.3"/>
                    <path d="M12.58 7.94L7.94 12.58C7.55 12.97 7.55 13.6 7.94 13.99C8.33 14.38 8.96 14.38 9.35 13.99L13.99 9.35C14.38 8.96 14.38 8.33 13.99 7.94C13.6 7.55 12.97 7.55 12.58 7.94Z" fill="#F6C71E"/>
                    <path d="M19.51 13.84C20.71 10.71 19.67 7.19 17.13 5.05L16.72 4.89L16.15 10.48L13.84 19.51C16.97 20.71 20.49 19.67 22.63 17.13C22.73 17.01 22.78 16.87 22.79 16.72L19.51 13.84Z" fill="#CF9A34" fill-opacity="0.25"/>
                    <circle cx="16.5" cy="7.5" r="1.5" fill="#F6C71E"/>
                    <path d="M6 18L2 22" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>
        </div>

        <!-- Number badge -->
        <div class="number-badge flex items-center justify-center w-16 h-16 sm:w-20 sm:h-20 rounded-full mb-6">
            <span class="text-3xl sm:text-4xl font-black text-brand-bgDeep tracking-tight">5</span>
        </div>

        <!-- Main title -->
        <h1 class="title-glow text-center text-2xl sm:text-3xl md:text-4xl font-black text-brand-yellow leading-tight tracking-wide uppercase mb-2">
            Strategies
        </h1>
        <h2 class="title-glow text-center text-lg sm:text-xl md:text-2xl font-bold text-brand-yellow/80 tracking-widest uppercase mb-6">
            To Grow Fast
        </h2>

        <!-- Neon divider line -->
        <div class="neon-line w-48 sm:w-64 mb-7"></div>

        <!-- Body text -->
        <p class="text-center text-sm sm:text-base text-brand-gray/90 leading-relaxed font-medium max-w-md">
            So in this video right here, I'm going to break down the 
            <span class="text-brand-yellow font-bold">five biggest strategies</span> 
            that have helped me grow this channel 
            <span class="text-brand-neonGold font-semibold">this fast</span>.
        </p>

        <!-- Bottom accent dots -->
        <div class="flex items-center gap-2 mt-8">
            <span class="w-1.5 h-1.5 rounded-full bg-brand-neonGold/40"></span>
            <span class="w-2 h-2 rounded-full bg-brand-yellow/60"></span>
            <span class="w-2.5 h-2.5 rounded-full bg-brand-yellow" style="box-shadow: 0 0 8px rgba(246, 199, 30, 0.5);"></span>
            <span class="w-2 h-2 rounded-full bg-brand-yellow/60"></span>
            <span class="w-1.5 h-1.5 rounded-full bg-brand-neonGold/40"></span>
        </div>
    </div>

    <!-- Ambient background glow orbs -->
    <div class="absolute top-1/4 left-1/4 w-64 h-64 rounded-full opacity-20" 
         style="background: radial-gradient(circle, rgba(207, 154, 52, 0.15) 0%, transparent 70%); filter: blur(60px);">
    </div>
    <div class="absolute bottom-1/4 right-1/4 w-48 h-48 rounded-full opacity-15" 
         style="background: radial-gradient(circle, rgba(232, 151, 63, 0.12) 0%, transparent 70%); filter: blur(50px);">
    </div>

</body>
</html>
