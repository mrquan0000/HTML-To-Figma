<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caleb - The Impulsive YouTube Channel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0501;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ── Dimmed A-Roll Background ─────────────────────── */
        .bg-stage {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 380px 480px at 50% 52%, rgba(84, 42, 6, 0.14) 0%, transparent 100%),
                radial-gradient(ellipse 260px 340px at 50% 65%, rgba(32, 15, 0, 0.35) 0%, transparent 100%),
                #0a0501;
        }
        .bg-stage::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 48%, transparent 35%, rgba(0, 0, 0, 0.6) 100%);
        }

        /* Speaker ambient glow (A-roll center) */
        .speaker-glow {
            position: absolute;
            width: 320px;
            height: 460px;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(ellipse at 50% 30%, rgba(84, 42, 6, 0.12) 0%, transparent 70%);
            border-radius: 50%;
        }

        /* Speaker silhouette */
        .speaker-silhouette {
            position: absolute;
            width: 240px;
            height: 360px;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(ellipse at 50% 35%, rgba(84, 42, 6, 0.06) 0%, transparent 65%);
            border-radius: 50% 50% 40% 40%;
        }

        /* ── Glass Card ───────────────────────────────────── */
        .glass-card {
            background: rgba(32, 15, 0, 0.88);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1.5px solid rgba(207, 154, 52, 0.45);
            border-radius: 22px;
            position: relative;
            overflow: hidden;
        }

        /* Neon glow border */
        .glass-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 23px;
            padding: 1.5px;
            background: linear-gradient(135deg, rgba(207, 154, 52, 0.6) 0%, rgba(207, 154, 52, 0.15) 40%, rgba(232, 151, 63, 0.5) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* Lightsweep */
        .glass-card::after {
            content: '';
            position: absolute;
            top: -20%;
            left: -120%;
            width: 60%;
            height: 140%;
            background: linear-gradient(105deg, transparent 30%, rgba(207, 154, 52, 0.05) 50%, transparent 70%);
            animation: lightsweep 5s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes lightsweep {
            0%, 100% { left: -120%; }
            50% { left: 140%; }
        }

        /* ── Glow Pulse on Card ───────────────────────────── */
        .glow-pulse {
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow:
                    0 0 15px rgba(207, 154, 52, 0.12),
                    0 0 40px rgba(207, 154, 52, 0.06),
                    0 20px 60px rgba(0, 0, 0, 0.55),
                    inset 0 1px 0 rgba(207, 154, 52, 0.08);
            }
            50% {
                box-shadow:
                    0 0 25px rgba(207, 154, 52, 0.22),
                    0 0 60px rgba(207, 154, 52, 0.12),
                    0 20px 60px rgba(0, 0, 0, 0.55),
                    inset 0 1px 0 rgba(207, 154, 52, 0.12);
            }
        }

        /* ── Slide Up Animation ───────────────────────────── */
        .slide-up {
            animation: slideUp 0.9s cubic-bezier(0.34, 1.3, 0.64, 1) forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(24px); opacity: 0.85; }
            to   { transform: translateY(0); opacity: 1; }
        }

        /* ── Name Glow ────────────────────────────────────── */
        .name-glow {
            color: #F6C71E;
            text-shadow:
                0 0 18px rgba(246, 199, 30, 0.5),
                0 0 40px rgba(232, 151, 63, 0.3),
                0 0 80px rgba(232, 151, 63, 0.12);
        }

        /* ── Subscriber Emphasis Glow ─────────────────────── */
        .subscriber-glow {
            color: #E8973F;
            text-shadow:
                0 0 22px rgba(232, 151, 63, 0.65),
                0 0 45px rgba(232, 151, 63, 0.35),
                0 0 80px rgba(232, 151, 63, 0.15);
        }

        /* ── Icon Effects ─────────────────────────────────── */
        .icon-glow-gold {
            filter: drop-shadow(0 0 12px rgba(246, 199, 30, 0.5)) drop-shadow(0 0 25px rgba(232, 151, 63, 0.2));
        }
        .icon-glow-red {
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.35)) drop-shadow(0 0 20px rgba(255, 0, 0, 0.15));
        }

        /* ── Subtle Float ─────────────────────────────────── */
        .float-slow {
            animation: floatSlow 5s ease-in-out infinite;
        }
        @keyframes floatSlow {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-4px); }
        }

        /* ── Subscriber Badge Shimmer ─────────────────────── */
        .sub-shimmer {
            position: relative;
            overflow: hidden;
        }
        .sub-shimmer::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 80%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(232, 151, 63, 0.08), transparent);
            animation: shimmer 3.5s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { left: -100%; }
            50%      { left: 120%; }
        }

        /* ── Avatar ring pulse ────────────────────────────── */
        .avatar-ring {
            animation: ringPulse 3s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%, 100% {
                box-shadow:
                    0 0 0 0 rgba(207, 154, 52, 0.3),
                    0 0 12px rgba(207, 154, 52, 0.15);
            }
            50% {
                box-shadow:
                    0 0 0 5px rgba(207, 154, 52, 0.05),
                    0 0 20px rgba(207, 154, 52, 0.25);
            }
        }
    </style>
</head>
<body>

    <!-- ═══ Dimmed A-Roll Background ═══ -->
    <div class="bg-stage">
        <div class="speaker-glow"></div>
        <div class="speaker-silhouette"></div>
    </div>

    <!-- ═══ Card Container (Bottom-Left Position) ═══ -->
    <div class="fixed bottom-6 left-6 z-10 w-full max-w-[420px] slide-up glow-pulse">
        <div class="glass-card px-7 py-6 md:px-9 md:py-7">

            <!-- Inner content (above pseudo-elements) -->
            <div class="relative z-10">

                <!-- ── Top Row: Avatar + Name ── -->
                <div class="flex items-center gap-4 mb-4">

                    <!-- User Profile Icon -->
                    <div class="flex-shrink-0 avatar-ring rounded-full p-[3px]"
                         style="background: linear-gradient(135deg, #CF9A34, #F6C71E, #E8973F);">
                        <div class="w-[52px] h-[52px] rounded-full flex items-center justify-center"
                             style="background: #200F00;">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" class="icon-glow-gold">
                                <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z"
                                      stroke="#F6C71E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M20 21C20 17.134 16.4183 14 12 14C7.58172 14 4 17.134 4 21"
                                      stroke="#F6C71E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                    </div>

                    <!-- Name & Role -->
                    <div class="flex-1 min-w-0">
                        <h2 class="name-glow text-3xl md:text-[2rem] font-black tracking-tight leading-none"
                            style="font-family: 'Montserrat', sans-serif;">
                            CALEB
                        </h2>
                        <p class="text-xs md:text-sm font-medium mt-1.5 tracking-wide"
                           style="color: rgba(255, 255, 255, 0.75);">
                            Co-owner &amp; Content Producer
                        </p>
                    </div>
                </div>

                <!-- ── Decorative Divider ── -->
                <div class="flex items-center gap-3 mb-4">
                    <div class="flex-1 h-px" style="background: linear-gradient(90deg, transparent, rgba(207, 154, 52, 0.25));"></div>
                    <div class="w-[5px] h-[5px] rounded-full"
                         style="background: #CF9A34; box-shadow: 0 0 8px rgba(207,154,52,0.5);"></div>
                    <div class="flex-1 h-px" style="background: linear-gradient(90deg, rgba(207, 154, 52, 0.25), transparent);"></div>
                </div>

                <!-- ── Bottom Row: YouTube Channel Info ── -->
                <div class="flex items-center gap-3.5">

                    <!-- YouTube Logo -->
                    <div class="flex-shrink-0">
                        <div class="w-[38px] h-[38px] rounded-xl flex items-center justify-center float-slow"
                             style="background: rgba(255, 0, 0, 0.08); border: 1px solid rgba(255, 0, 0, 0.15);">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="icon-glow-red">
                                <path d="M22.54 6.42C22.4212 5.94541 22.1793 5.51057 21.8387 5.15941C21.498 4.80824 21.0708 4.55318 20.6 4.42C18.88 4 12 4 12 4C12 4 5.12 4 3.4 4.46C2.92925 4.59318 2.50198 4.84824 2.16135 5.19941C1.82072 5.55057 1.57879 5.98541 1.46 6.46C1.14521 8.20556 0.991243 9.97631 1 11.75C0.988743 13.537 1.14277 15.3213 1.46 17.08C1.59096 17.5398 1.83831 17.9581 2.17814 18.2945C2.51798 18.6308 2.93882 18.8738 3.4 19C5.12 19.46 12 19.46 12 19.46C12 19.46 18.88 19.46 20.6 19C21.0708 18.8668 21.498 18.6118 21.8387 18.2606C22.1793 17.9094 22.4212 17.4746 22.54 17C22.8524 15.2676 23.0064 13.511 23 11.75C23.0113 9.96295 22.8573 8.1787 22.54 6.42Z"
                                      fill="#FF0000" fill-opacity="0.9"/>
                                <path d="M9.75 15.02L15.5 11.75L9.75 8.48V15.02Z"
                                      fill="#FFFFFF"/>
                            </svg>
                        </div>
                    </div>

                    <!-- Channel Name & Subscribers -->
                    <div class="flex-1 min-w-0">
                        <p class="text-sm md:text-[15px] font-bold leading-tight truncate"
                           style="color: #FFFFFF;">
                            The Impulsive YouTube Channel
                        </p>
                        <div class="sub-shimmer inline-flex mt-1.5">
                            <p class="text-xs md:text-[13px] font-extrabold tracking-wide subscriber-glow">
                                4.8M+ Subscribers
                            </p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
