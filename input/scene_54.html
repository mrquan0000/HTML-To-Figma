<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comment Below Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-orange': '#E8973F',
                        'brand-dark-orange': '#D36708',
                        'brand-dark': '#200F00',
                        'brand-yellow': '#F6C71E',
                        'brand-gray': '#A9ADB1',
                        'brand-black': '#150A01',
                        'brand-wood': '#542A06',
                        'brand-red': '#C21403',
                        'brand-gold': '#CF9A34',
                        'brand-green': '#35CC23',
                    },
                    fontFamily: {
                        'inter': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #150A01;
            overflow: hidden;
        }

        /* Simulated video background with gradient overlay */
        .video-bg {
            background: linear-gradient(135deg, #0a0603 0%, #1a0d02 30%, #200F00 50%, #0d0700 100%);
            position: relative;
        }

        .video-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(32, 15, 0, 0.3) 0%, rgba(21, 10, 1, 0.7) 70%);
            pointer-events: none;
        }

        /* Speaker silhouette placeholder */
        .speaker-silhouette {
            background: radial-gradient(ellipse at center, rgba(232, 151, 63, 0.08) 0%, transparent 60%);
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(32, 15, 0, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1.5px solid rgba(207, 154, 52, 0.5);
            box-shadow:
                0 0 30px rgba(207, 154, 52, 0.15),
                0 0 60px rgba(207, 154, 52, 0.08),
                0 8px 32px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(207, 154, 52, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* Lightsweep effect */
        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                115deg,
                transparent 40%,
                rgba(207, 154, 52, 0.06) 45%,
                rgba(246, 199, 30, 0.08) 50%,
                rgba(207, 154, 52, 0.06) 55%,
                transparent 60%
            );
            animation: lightsweep 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes lightsweep {
            0%, 100% { transform: translateX(-30%) translateY(-10%); }
            50% { transform: translateX(30%) translateY(10%); }
        }

        /* Neon glow border animation */
        .neon-border {
            position: relative;
        }

        .neon-border::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(207, 154, 52, 0.4), rgba(246, 199, 30, 0.2), rgba(207, 154, 52, 0.4));
            z-index: -1;
            filter: blur(12px);
            opacity: 0.7;
            animation: glow-pulse 3s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.9; }
        }

        /* Slide up animation */
        .slide-up {
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            0% { transform: translateY(60px); opacity: 0.7; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Icon glow */
        .icon-glow {
            filter: drop-shadow(0 0 8px rgba(246, 199, 30, 0.5));
        }

        /* Text glow for title */
        .text-glow {
            text-shadow: 0 0 20px rgba(246, 199, 30, 0.4), 0 0 40px rgba(246, 199, 30, 0.2);
        }

        /* Corner accent dots */
        .corner-accent {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #CF9A34;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(207, 154, 52, 0.6);
        }

        /* Floating particles */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(207, 154, 52, 0.3);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-20px) scale(1.5); opacity: 0.6; }
        }

        /* Chat icon pulse */
        .icon-bounce {
            animation: iconBounce 2s ease-in-out infinite;
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* Accent line */
        .accent-line {
            background: linear-gradient(90deg, transparent, #CF9A34, transparent);
            height: 1px;
        }

        /* Inner glass effect for text area */
        .inner-glass {
            background: rgba(207, 154, 52, 0.03);
            border: 1px solid rgba(207, 154, 52, 0.08);
            border-radius: 12px;
        }
    </style>
</head>
<body class="w-full h-screen video-bg flex items-center justify-center">
    
    <!-- Simulated Speaker (A-Roll) Silhouette -->
    <div class="absolute inset-0 speaker-silhouette"></div>
    
    <!-- Subtle ambient light on speaker area -->
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-64 h-80 rounded-full opacity-100"
         style="background: radial-gradient(ellipse, rgba(232, 151, 63, 0.06) 0%, transparent 70%);">
    </div>

    <!-- Floating particles for ambiance -->
    <div class="particle" style="top: 20%; left: 15%; animation-delay: 0s;"></div>
    <div class="particle" style="top: 40%; left: 75%; animation-delay: 1s;"></div>
    <div class="particle" style="top: 60%; left: 45%; animation-delay: 2s;"></div>
    <div class="particle" style="top: 30%; left: 60%; animation-delay: 3s;"></div>
    <div class="particle" style="top: 70%; left: 25%; animation-delay: 4s;"></div>

    <!-- Main Card - Bottom Left Position -->
    <div class="absolute bottom-6 left-6 sm:bottom-8 sm:left-8 w-full max-w-[600px] slide-up">
        
        <!-- Glass Card -->
        <div class="glass-card neon-border rounded-3xl p-6 sm:p-8">
            
            <!-- Corner accents -->
            <div class="corner-accent top-4 left-4"></div>
            <div class="corner-accent top-4 right-4"></div>
            <div class="corner-accent bottom-4 left-4"></div>
            <div class="corner-accent bottom-4 right-4"></div>

            <!-- Header with Icon -->
            <div class="flex items-center gap-3 mb-5">
                <!-- Comment Icon -->
                <div class="icon-bounce flex-shrink-0">
                    <svg class="w-10 h-10 icon-glow" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="2" width="36" height="36" rx="10" stroke="#CF9A34" stroke-width="1.5" fill="rgba(207, 154, 52, 0.1)"/>
                        <path d="M12 15H28M12 20H24M12 25H20" stroke="#F6C71E" stroke-width="1.5" stroke-linecap="round"/>
                        <circle cx="32" cy="10" r="5" fill="#E8973F" stroke="#200F00" stroke-width="1.5"/>
                        <text x="32" y="13" text-anchor="middle" fill="#200F00" font-size="7" font-weight="bold">3</text>
                    </svg>
                </div>
                
                <!-- Chat Icon -->
                <div class="icon-bounce flex-shrink-0" style="animation-delay: 0.3s;">
                    <svg class="w-10 h-10 icon-glow" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 8C6 6.89543 6.89543 6 8 6H32C33.1046 6 34 6.89543 34 8V26C34 27.1046 33.1046 28 32 28H18L10 34V28H8C6.89543 28 6 27.1046 6 26V8Z" stroke="#CF9A34" stroke-width="1.5" fill="rgba(207, 154, 52, 0.08)"/>
                        <circle cx="14" cy="17" r="1.5" fill="#F6C71E"/>
                        <circle cx="20" cy="17" r="1.5" fill="#F6C71E"/>
                        <circle cx="26" cy="17" r="1.5" fill="#F6C71E"/>
                    </svg>
                </div>
            </div>

            <!-- Title -->
            <h1 class="text-glow font-black text-3xl sm:text-4xl tracking-wider uppercase mb-3" 
                style="color: #F6C71E; letter-spacing: 0.15em;">
                COMMENT BELOW!
            </h1>

            <!-- Accent Line -->
            <div class="accent-line w-full mb-4 opacity-60"></div>

            <!-- Subtitle Question -->
            <p class="text-lg sm:text-xl font-bold mb-4 tracking-wide" style="color: #FFFFFF;">
                Which strategy helped you most?
            </p>

            <!-- Body Text in inner glass container -->
            <div class="inner-glass p-4 sm:p-5">
                <p class="text-sm sm:text-base font-medium leading-relaxed" style="color: rgba(255, 255, 255, 0.85);">
                    <span style="color: #E8973F; font-weight: 700;">that are helping creators like you</span> grow so much faster.
                </p>
                <p class="text-sm sm:text-base font-medium leading-relaxed mt-2" style="color: rgba(255, 255, 255, 0.85);">
                    Also, I want you to <span style="color: #F6C71E; font-weight: 700;">comment</span> which strategy <span style="color: #35CC23; font-weight: 700;">actually helped you the most.</span>
                </p>
            </div>

            <!-- Bottom decorative bar -->
            <div class="flex items-center justify-between mt-5 pt-4" style="border-top: 1px solid rgba(207, 154, 52, 0.15);">
                <!-- Left dot indicators -->
                <div class="flex gap-1.5">
                    <div class="w-2 h-2 rounded-full" style="background: #F6C71E; box-shadow: 0 0 6px rgba(246, 199, 30, 0.5);"></div>
                    <div class="w-2 h-2 rounded-full" style="background: #E8973F; box-shadow: 0 0 6px rgba(232, 151, 63, 0.5);"></div>
                    <div class="w-2 h-2 rounded-full" style="background: #CF9A34; box-shadow: 0 0 6px rgba(207, 154, 52, 0.5);"></div>
                </div>
                
                <!-- Arrow indicator -->
                <div class="flex items-center gap-2">
                    <span class="text-xs font-semibold uppercase tracking-widest" style="color: rgba(207, 154, 52, 0.6);">Share your thoughts</span>
                    <svg class="w-4 h-4 icon-bounce" style="animation-delay: 0.5s;" viewBox="0 0 16 16" fill="none">
                        <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>

        </div>
    </div>

    <!-- Subtle bottom vignette -->
    <div class="absolute bottom-0 left-0 right-0 h-32 pointer-events-none"
         style="background: linear-gradient(to top, rgba(21, 10, 1, 0.4), transparent);">
    </div>

</body>
</html>
