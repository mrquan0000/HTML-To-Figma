<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail & Title Change</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mont: ['Montserrat', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #150A01;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: linear-gradient(145deg, rgba(32,15,0,0.92) 0%, rgba(21,10,1,0.96) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1.5px solid rgba(207,154,52,0.45);
            box-shadow:
                0 0 20px rgba(207,154,52,0.22),
                0 0 60px rgba(207,154,52,0.08),
                0 25px 60px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(207,154,52,0.12),
                inset 0 0 30px rgba(207,154,52,0.03);
        }

        /* Neon Glow Pulse */
        .neon-glow {
            animation: neonPulse 4s ease-in-out infinite;
        }
        @keyframes neonPulse {
            0%, 100% {
                box-shadow:
                    0 0 20px rgba(207,154,52,0.22),
                    0 0 60px rgba(207,154,52,0.08),
                    0 25px 60px rgba(0,0,0,0.5),
                    inset 0 1px 0 rgba(207,154,52,0.12),
                    inset 0 0 30px rgba(207,154,52,0.03);
            }
            50% {
                box-shadow:
                    0 0 35px rgba(207,154,52,0.35),
                    0 0 80px rgba(207,154,52,0.14),
                    0 25px 60px rgba(0,0,0,0.5),
                    inset 0 1px 0 rgba(207,154,52,0.2),
                    inset 0 0 40px rgba(207,154,52,0.06);
            }
        }

        /* Title Glow */
        .title-glow {
            text-shadow:
                0 0 12px rgba(246,199,30,0.45),
                0 0 30px rgba(246,199,30,0.15);
        }

        /* Green Glow */
        .green-glow {
            text-shadow:
                0 0 10px rgba(53,204,35,0.4),
                0 0 25px rgba(53,204,35,0.12);
        }

        /* Orange Glow */
        .orange-glow {
            text-shadow:
                0 0 10px rgba(232,151,63,0.4),
                0 0 25px rgba(232,151,63,0.12);
        }

        /* Lightsweep Effect */
        .lightsweep {
            position: relative;
            overflow: hidden;
        }
        .lightsweep::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(207,154,52,0.06), rgba(255,255,255,0.03), transparent);
            animation: sweep 5s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes sweep {
            0%, 15% { left: -120%; }
            60%, 100% { left: 140%; }
        }

        /* Bullet entrance — starts fully visible */
        .bullet-item {
            animation: bulletSlide 0.7s ease-out both;
        }
        @keyframes bulletSlide {
            0% {
                transform: translateX(-14px);
                opacity: 1;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .bullet-1 { animation-delay: 0.2s; }
        .bullet-2 { animation-delay: 0.55s; }
        .bullet-3 { animation-delay: 0.9s; }
        .bullet-4 { animation-delay: 1.25s; }

        /* Dot pulse */
        .dot-pulse {
            animation: dotPulse 2.5s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 6px currentColor; }
            50% { box-shadow: 0 0 14px currentColor, 0 0 24px currentColor; }
        }

        /* Accent bar glow */
        .bar-glow {
            animation: barGlow 3s ease-in-out infinite alternate;
        }
        @keyframes barGlow {
            0% { box-shadow: 0 0 6px rgba(232,151,63,0.25); }
            100% { box-shadow: 0 0 18px rgba(232,151,63,0.5); }
        }

        /* Ambient background glow */
        .ambient-glow {
            background: radial-gradient(ellipse at 30% 50%, rgba(207,154,52,0.07) 0%, rgba(207,154,52,0.02) 40%, transparent 70%);
        }

        /* Corner accent lines */
        .corner-accent {
            border-color: rgba(207,154,52,0.5);
            filter: drop-shadow(0 0 3px rgba(207,154,52,0.3));
        }

        /* Check icon glow */
        .check-glow {
            filter: drop-shadow(0 0 6px rgba(53,204,35,0.4));
        }

        /* Arrow connector pulse */
        .connector-pulse {
            animation: connectorPulse 2s ease-in-out infinite;
        }
        @keyframes connectorPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background-color: #150A01;">

    <!-- Ambient Background Glow -->
    <div class="fixed inset-0 ambient-glow pointer-events-none"></div>

    <!-- Card Container — max 600px, centered -->
    <div class="w-full max-w-[600px] relative z-10">

        <!-- Outer Ambient Halo -->
        <div class="absolute -inset-6 rounded-3xl pointer-events-none" style="background: radial-gradient(ellipse at center, rgba(207,154,52,0.06) 0%, transparent 70%);"></div>

        <!-- Main Glass Card -->
        <div class="glass-card neon-glow lightsweep rounded-2xl p-7 sm:p-9 md:p-10 relative z-10">

            <!-- Decorative Corner Accents -->
            <div class="absolute top-3 left-3 w-6 h-6 border-t-2 border-l-2 rounded-tl-xl corner-accent"></div>
            <div class="absolute top-3 right-3 w-6 h-6 border-t-2 border-r-2 rounded-tr-xl corner-accent"></div>
            <div class="absolute bottom-3 left-3 w-6 h-6 border-b-2 border-l-2 rounded-bl-xl corner-accent"></div>
            <div class="absolute bottom-3 right-3 w-6 h-6 border-b-2 border-r-2 rounded-br-xl corner-accent"></div>

            <!-- Top Badge Bar -->
            <div class="flex items-center gap-2.5 mb-6">
                <!-- Thumbnail Icon -->
                <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background: rgba(207,154,52,0.12); border: 1px solid rgba(207,154,52,0.25);">
                    <svg class="w-4.5 h-4.5" style="color: #CF9A34; width: 18px; height: 18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21,15 16,10 5,21"/>
                    </svg>
                </div>
                <!-- Text Edit Icon -->
                <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background: rgba(207,154,52,0.12); border: 1px solid rgba(207,154,52,0.25);">
                    <svg class="w-4.5 h-4.5" style="color: #CF9A34; width: 18px; height: 18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                </div>
                <!-- Category Label -->
                <span class="text-xs font-semibold tracking-widest uppercase ml-2" style="color: #A9ADB1; letter-spacing: 0.15em;">Visual Update</span>
            </div>

            <!-- Title -->
            <h1 class="title-glow font-black text-2xl sm:text-[1.75rem] md:text-[2rem] tracking-wide uppercase mb-2 leading-tight" style="color: #F6C71E; letter-spacing: 0.06em;">
                THUMBNAIL &<br>TITLE CHANGE
            </h1>

            <!-- Subtle divider -->
            <div class="flex items-center gap-3 my-6">
                <div class="h-px flex-1 rounded-full" style="background: linear-gradient(90deg, rgba(207,154,52,0.4), rgba(207,154,52,0.08));"></div>
                <div class="w-1.5 h-1.5 rounded-full" style="background: #CF9A34; box-shadow: 0 0 6px rgba(207,154,52,0.5);"></div>
                <div class="h-px flex-1 rounded-full" style="background: linear-gradient(90deg, rgba(207,154,52,0.08), rgba(207,154,52,0.4));"></div>
            </div>

            <!-- Bullet Points Section -->
            <div class="space-y-5">

                <!-- Bullet 1: Original Thumbnail -->
                <div class="bullet-item bullet-1 flex items-start gap-4 group">
                    <div class="mt-2 flex-shrink-0">
                        <div class="w-2.5 h-2.5 rounded-full dot-pulse" style="background: #CF9A34; color: rgba(207,154,52,0.6);"></div>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-semibold uppercase tracking-wider mb-1.5" style="color: #A9ADB1; letter-spacing: 0.08em;">
                            Original Thumbnail
                        </p>
                        <div class="flex items-baseline gap-2 flex-wrap">
                            <span class="text-lg sm:text-xl font-extrabold" style="color: #FFFFFF;">"anti-edit"</span>
                            <span class="text-xs font-medium px-2.5 py-0.5 rounded-full" style="background: rgba(194,20,3,0.15); color: #C21403; border: 1px solid rgba(194,20,3,0.25);">
                                Vague, Confusing
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Arrow Connector -->
                <div class="bullet-item bullet-2 flex items-center justify-start pl-1 connector-pulse">
                    <div class="flex items-center gap-2">
                        <svg style="width: 16px; height: 16px; color: #542A06;" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-5h2v2h-2v-2zm0-8h2v6h-2V7z"/>
                        </svg>
                        <div class="flex items-center gap-1.5">
                            <div class="h-px w-6" style="background: linear-gradient(90deg, #542A06, rgba(84,42,6,0.3));"></div>
                            <span class="text-xs font-bold uppercase tracking-widest" style="color: #542A06; letter-spacing: 0.2em;">Changed To</span>
                            <div class="h-px w-6" style="background: linear-gradient(90deg, rgba(84,42,6,0.3), #542A06);"></div>
                        </div>
                    </div>
                </div>

                <!-- Bullet 2: New Thumbnail -->
                <div class="bullet-item bullet-3 flex items-start gap-4 group">
                    <div class="mt-2 flex-shrink-0">
                        <div class="w-2.5 h-2.5 rounded-full dot-pulse" style="background: #35CC23; color: rgba(53,204,35,0.6);"></div>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-semibold uppercase tracking-wider mb-1.5" style="color: #A9ADB1; letter-spacing: 0.08em;">
                            New Thumbnail
                        </p>
                        <div class="flex items-baseline gap-2 flex-wrap">
                            <span class="green-glow text-lg sm:text-xl font-extrabold" style="color: #35CC23;">"no editing"</span>
                            <span class="text-xs font-medium px-2.5 py-0.5 rounded-full" style="background: rgba(53,204,35,0.12); color: #35CC23; border: 1px solid rgba(53,204,35,0.25);">
                                Clearer
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Result Section -->
            <div class="bullet-item bullet-4 mt-7 pt-6 relative" style="border-top: 1px solid rgba(207,154,52,0.15);">
                <!-- Decorative top gradient line -->
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-24 h-px" style="background: linear-gradient(90deg, transparent, #CF9A34, transparent);"></div>

                <div class="flex items-center gap-4">
                    <!-- Animated accent bar -->
                    <div class="bar-glow w-1 h-10 rounded-full flex-shrink-0" style="background: linear-gradient(180deg, #E8973F, #D36708);"></div>

                    <div class="flex-1">
                        <span class="text-xs font-bold uppercase tracking-widest" style="color: #CF9A34; letter-spacing: 0.18em;">
                            Result
                        </span>
                        <p class="orange-glow text-xl sm:text-2xl font-extrabold mt-1" style="color: #E8973F;">
                            Improved Clarity
                        </p>
                    </div>

                    <!-- Success Check Icon -->
                    <div class="check-glow flex-shrink-0">
                        <svg style="width: 36px; height: 36px; color: #35CC23;" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Bottom decorative dots -->
            <div class="flex items-center justify-center gap-1.5 mt-7">
                <div class="w-1 h-1 rounded-full" style="background: rgba(207,154,52,0.3);"></div>
                <div class="w-1.5 h-1.5 rounded-full" style="background: #CF9A34; box-shadow: 0 0 4px rgba(207,154,52,0.4);"></div>
                <div class="w-1 h-1 rounded-full" style="background: rgba(207,154,52,0.3);"></div>
            </div>
        </div>
    </div>
</body>
</html>
