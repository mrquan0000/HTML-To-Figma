<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategy #4 - Mastering Hooks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orangeLight: '#E8973F',
                            orangeDark: '#D36708',
                            bgDark: '#200F00',
                            yellow: '#F6C71E',
                            glassGray: '#A9ADB1',
                            bgBlack: '#150A01',
                            wood: '#542A06',
                            red: '#C21403',
                            goldNeon: '#CF9A34',
                            green: '#35CC23',
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #150A01;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Simulated dimmed A-roll video background */
        .a-roll-background {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse at center 40%, rgba(207, 154, 52, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 60%, rgba(232, 151, 63, 0.04) 0%, transparent 50%),
                linear-gradient(180deg, #150A01 0%, #200F00 40%, #150A01 100%);
            z-index: 1;
        }

        /* Speaker silhouette simulation */
        .speaker-silhouette {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 340px;
            height: 50%;
            background: radial-gradient(ellipse at center top, rgba(84, 42, 6, 0.25) 0%, transparent 70%);
            z-index: 2;
            pointer-events: none;
        }

        /* Main card container */
        .card-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 560px;
            padding: 0 20px;
        }

        /* Glow backdrop */
        .glow-backdrop {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 420px;
            background: radial-gradient(ellipse at center, rgba(207, 154, 52, 0.18) 0%, rgba(207, 154, 52, 0.06) 40%, transparent 70%);
            z-index: -1;
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0.7;
                transform: translate(-50%, -50%) scale(1.08);
            }
        }

        /* The main card */
        .strategy-card {
            background: rgba(32, 15, 0, 0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1.5px solid rgba(207, 154, 52, 0.45);
            border-radius: 24px;
            padding: 40px 36px 36px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 30px rgba(207, 154, 52, 0.15),
                0 0 60px rgba(207, 154, 52, 0.08),
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(207, 154, 52, 0.15);
            animation: cardPopIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                       borderGlow 3s ease-in-out 0.6s infinite;
            transform: scale(0.92);
        }

        @keyframes cardPopIn {
            0% {
                transform: scale(0.92);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes borderGlow {
            0%, 100% {
                border-color: rgba(207, 154, 52, 0.45);
                box-shadow:
                    0 0 30px rgba(207, 154, 52, 0.15),
                    0 0 60px rgba(207, 154, 52, 0.08),
                    0 20px 60px rgba(0, 0, 0, 0.5),
                    inset 0 1px 0 rgba(207, 154, 52, 0.15);
            }
            50% {
                border-color: rgba(207, 154, 52, 0.7);
                box-shadow:
                    0 0 40px rgba(207, 154, 52, 0.25),
                    0 0 80px rgba(207, 154, 52, 0.12),
                    0 20px 60px rgba(0, 0, 0, 0.5),
                    inset 0 1px 0 rgba(207, 154, 52, 0.25);
            }
        }

        /* Glassmorphism overlay gradient on card */
        .strategy-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(207, 154, 52, 0.06) 0%, transparent 100%);
            border-radius: 24px 24px 0 0;
            pointer-events: none;
        }

        /* Light sweep effect */
        .strategy-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(207, 154, 52, 0.04) 40%,
                rgba(246, 199, 30, 0.06) 50%,
                rgba(207, 154, 52, 0.04) 60%,
                transparent 100%
            );
            animation: lightsweep 4s ease-in-out 1s infinite;
            pointer-events: none;
        }

        @keyframes lightsweep {
            0% {
                left: -100%;
            }
            100% {
                left: 200%;
            }
        }

        /* Number 4 icon styling */
        .number-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #CF9A34 0%, #E8973F 50%, #D36708 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 4px 16px rgba(207, 154, 52, 0.35),
                0 0 24px rgba(207, 154, 52, 0.15);
            flex-shrink: 0;
        }

        .number-icon span {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 28px;
            color: #200F00;
            line-height: 1;
        }

        /* Hook icon styling */
        .hook-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Quote styling */
        .quote-section {
            position: relative;
            padding-left: 20px;
        }

        .quote-section::before {
            content: '';
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 4px;
            width: 3px;
            background: linear-gradient(180deg, #CF9A34 0%, #D36708 100%);
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(207, 154, 52, 0.4);
        }

        /* Decorative elements */
        .corner-glow-tl {
            position: absolute;
            top: -1px;
            left: -1px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at top left, rgba(207, 154, 52, 0.2) 0%, transparent 70%);
            border-radius: 24px 0 0 0;
            pointer-events: none;
        }

        .corner-glow-br {
            position: absolute;
            bottom: -1px;
            right: -1px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at bottom right, rgba(207, 154, 52, 0.15) 0%, transparent 70%);
            border-radius: 0 0 24px 0;
            pointer-events: none;
        }

        /* Decorative dot grid */
        .dot-pattern {
            position: absolute;
            top: 16px;
            right: 16px;
            display: grid;
            grid-template-columns: repeat(3, 6px);
            gap: 6px;
            opacity: 0.2;
        }

        .dot-pattern span {
            width: 3px;
            height: 3px;
            background: #CF9A34;
            border-radius: 50%;
        }

        /* Subtle noise texture overlay */
        .noise-overlay {
            position: absolute;
            inset: 0;
            border-radius: 24px;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* Ambient particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
        }

        .particle-1 {
            width: 4px;
            height: 4px;
            background: rgba(207, 154, 52, 0.4);
            top: 15%;
            left: 20%;
            animation: floatParticle 6s ease-in-out infinite;
            box-shadow: 0 0 8px rgba(207, 154, 52, 0.3);
        }

        .particle-2 {
            width: 3px;
            height: 3px;
            background: rgba(246, 199, 30, 0.35);
            top: 25%;
            right: 25%;
            animation: floatParticle 5s ease-in-out 1s infinite;
            box-shadow: 0 0 6px rgba(246, 199, 30, 0.25);
        }

        .particle-3 {
            width: 5px;
            height: 5px;
            background: rgba(207, 154, 52, 0.3);
            bottom: 20%;
            right: 15%;
            animation: floatParticle 7s ease-in-out 0.5s infinite;
            box-shadow: 0 0 10px rgba(207, 154, 52, 0.2);
        }

        .particle-4 {
            width: 3px;
            height: 3px;
            background: rgba(232, 151, 63, 0.3);
            bottom: 30%;
            left: 18%;
            animation: floatParticle 5.5s ease-in-out 2s infinite;
            box-shadow: 0 0 6px rgba(232, 151, 63, 0.2);
        }

        @keyframes floatParticle {
            0%, 100% {
                transform: translateY(0px) translateX(0px);
            }
            25% {
                transform: translateY(-12px) translateX(6px);
            }
            50% {
                transform: translateY(-6px) translateX(-4px);
            }
            75% {
                transform: translateY(-18px) translateX(3px);
            }
        }

        /* Glow text for title */
        .title-glow {
            text-shadow:
                0 0 20px rgba(246, 199, 30, 0.4),
                0 0 40px rgba(246, 199, 30, 0.15);
        }

        /* Subtle line separator */
        .separator-line {
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(207, 154, 52, 0.3) 50%, transparent 100%);
        }
    </style>
</head>
<body>

    <!-- Simulated dimmed A-roll background -->
    <div class="a-roll-background"></div>
    <div class="speaker-silhouette"></div>

    <!-- Ambient particles -->
    <div class="particle particle-1"></div>
    <div class="particle particle-2"></div>
    <div class="particle particle-3"></div>
    <div class="particle particle-4"></div>

    <!-- Card Container -->
    <div class="card-container">
        <!-- Glow backdrop behind card -->
        <div class="glow-backdrop"></div>

        <!-- Main Strategy Card -->
        <div class="strategy-card">
            <!-- Decorative elements -->
            <div class="corner-glow-tl"></div>
            <div class="corner-glow-br"></div>
            <div class="noise-overlay"></div>

            <!-- Dot pattern -->
            <div class="dot-pattern">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </div>

            <!-- Card Content -->
            <div class="relative z-10">
                <!-- Top Row: Icon + Label -->
                <div class="flex items-center gap-4 mb-6">
                    <!-- Number 4 Icon -->
                    <div class="number-icon">
                        <span>4</span>
                    </div>

                    <!-- Strategy Label -->
                    <div>
                        <p class="text-xs font-semibold tracking-[0.25em] uppercase" style="color: #CF9A34; font-family: 'Montserrat', sans-serif;">
                            STRATEGY #4
                        </p>
                        <div class="flex items-center gap-2 mt-1">
                            <!-- Hook Icon SVG -->
                            <div class="hook-icon">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M18.5 2.5C18.5 2.5 21 5 21 8.5C21 12 18.5 14 16 14H13C11.3431 14 10 12.6569 10 11V5" stroke="#CF9A34" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M10 5V3" stroke="#CF9A34" stroke-width="2" stroke-linecap="round"/>
                                    <path d="M10 11V21" stroke="#E8973F" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                            </div>
                            <h2 class="text-2xl font-bold tracking-tight" style="color: #FFFFFF; font-family: 'Montserrat', sans-serif;">
                                Mastering Hooks
                            </h2>
                        </div>
                    </div>
                </div>

                <!-- Separator -->
                <div class="separator-line mb-6"></div>

                <!-- Quote Section -->
                <div class="quote-section">
                    <!-- Quote mark -->
                    <svg class="mb-3" width="28" height="20" viewBox="0 0 28 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M0 20V12C0 5.37 3.73 0.9 11.2 0L12.6 2.3C8.97 3.77 6.93 6.13 6.5 9.4H11.2V20H0ZM15.4 20V12C15.4 5.37 19.13 0.9 26.6 0L28 2.3C24.37 3.77 22.33 6.13 21.9 9.4H26.6V20H15.4Z" fill="#CF9A34" fill-opacity="0.3"/>
                    </svg>

                    <p class="text-base leading-relaxed font-medium" style="color: #A9ADB1; font-family: 'Inter', sans-serif;">
                        <span style="color: #F6C71E; font-weight: 700;">People were clicking,</span> but they weren't staying. And that's actually where 
                        <span style="color: #F6C71E; font-weight: 700;">strategy number four</span> changed everything for me.
                    </p>
                </div>

                <!-- Bottom accent bar -->
                <div class="mt-6 flex items-center gap-3">
                    <div class="h-1 flex-1 rounded-full" style="background: linear-gradient(90deg, #CF9A34 0%, rgba(207,154,52,0.1) 100%);"></div>
                    <div class="flex gap-1.5">
                        <div class="w-2 h-2 rounded-full" style="background: #CF9A34; box-shadow: 0 0 8px rgba(207,154,52,0.5);"></div>
                        <div class="w-2 h-2 rounded-full" style="background: rgba(207,154,52,0.3);"></div>
                        <div class="w-2 h-2 rounded-full" style="background: rgba(207,154,52,0.3);"></div>
                        <div class="w-2 h-2 rounded-full" style="background: rgba(207,154,52,0.3);"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
