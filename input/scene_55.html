<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don't Quit Too Early</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#200F00',
                        'brand-darker': '#150A01',
                        'brand-gold': '#F6C71E',
                        'brand-neon': '#CF9A34',
                        'brand-orange': '#E8973F',
                        'brand-orange-dark': '#D36708',
                        'brand-green': '#35CC23',
                        'brand-gray': '#A9ADB1',
                        'brand-wood': '#542A06',
                        'brand-red': '#C21403',
                    },
                    fontFamily: {
                        'display': ['Montserrat', 'sans-serif'],

                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #080400;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── Animated Neon Glow Border ── */
        @keyframes neonPulse {
            0%, 100% {
                box-shadow:
                    0 0 15px rgba(207,154,52,0.25),
                    0 0 35px rgba(207,154,52,0.12),
                    0 0 70px rgba(207,154,52,0.06),
                    inset 0 1px 0 rgba(207,154,52,0.12);
            }
            50% {
                box-shadow:
                    0 0 22px rgba(207,154,52,0.45),
                    0 0 50px rgba(207,154,52,0.22),
                    0 0 90px rgba(207,154,52,0.10),
                    inset 0 1px 0 rgba(207,154,52,0.22);
            }
        }

        /* ── Title Gold Glow ── */
        @keyframes goldGlow {
            0%, 100% {
                text-shadow:
                    0 0 8px rgba(246,199,30,0.35),
                    0 0 18px rgba(246,199,30,0.15);
            }
            50% {
                text-shadow:
                    0 0 14px rgba(246,199,30,0.55),
                    0 0 30px rgba(246,199,30,0.28),
                    0 0 55px rgba(246,199,30,0.10);
            }
        }

        /* ── Green Subtitle Glow ── */
        @keyframes greenGlow {
            0%, 100% {
                text-shadow:
                    0 0 8px rgba(53,204,35,0.35),
                    0 0 16px rgba(53,204,35,0.15);
            }
            50% {
                text-shadow:
                    0 0 12px rgba(53,204,35,0.55),
                    0 0 26px rgba(53,204,35,0.25);
            }
        }

        /* ── Pop-in (no opacity:0, scale only) ── */
        @keyframes popIn {
            0%   { transform: scale(0.86); }
            55%  { transform: scale(1.035); }
            100% { transform: scale(1); }
        }

        /* ── Lightsweep ── */
        @keyframes sweep {
            0%   { transform: translateX(-160%) skewX(-14deg); }
            100% { transform: translateX(260%) skewX(-14deg); }
        }

        /* ── Ambient Background Pulse ── */
        @keyframes ambientPulse {
            0%, 100% { opacity: 0.22; transform: scale(1); }
            50%      { opacity: 0.38; transform: scale(1.06); }
        }

        /* ── Icon Float ── */
        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) rotate(3deg); }
            50%      { transform: translateY(-4px) rotate(3deg); }
        }

        /* ── Badge Pulse ── */
        @keyframes badgePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(53,204,35,0.15); }
            50%      { box-shadow: 0 0 12px 2px rgba(53,204,35,0.12); }
        }

        .card-pop       { animation: popIn 1s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        .glass-card      {

            backdrop-filter: blur(28px) saturate(1.25);
