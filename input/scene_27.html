<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Channel Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            amber: '#E8973F',
                            deepOrange: '#D36708',
                            darkGlow: '#200F00',
                            gold: '#F6C71E',
                            glass: '#A9ADB1',
                            obsidian: '#150A01',
                            wood: '#542A06',
                            red: '#C21403',
                            neonGold: '#CF9A34',
                            green: '#35CC23',
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ── Split Grid Container ── */
        .split-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            max-width: 1100px;
            height: 520px;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
        }

        /* ── Left Panel (Dark Background) ── */
        .left-panel {
            background: #150A01;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 32px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle ambient glow in background */
        .left-panel::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(207, 154, 52, 0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* ── Right Panel (Speaker Placeholder) ── */
        .right-panel {
            background: linear-gradient(135deg, #0d0600 0%, #1a0d02 50%, #0d0600 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .right-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse at 50% 40%, rgba(207, 154, 52, 0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        .speaker-silhouette {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            opacity: 0.5;
        }

        .speaker-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a1500, #3d2000);
            border: 2px solid rgba(207, 154, 52, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .speaker-avatar svg {
            width: 48px;
            height: 48px;
            opacity: 0.4;
        }

        .speaker-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #A9ADB1;
            opacity: 0.4;
        }

        /* ── Glassmorphism Card ── */
        .glass-card {
            background: rgba(32, 15, 0, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1.5px solid rgba(207, 154, 52, 0.35);
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            position: relative;
            overflow: hidden;
            animation: slideInLeft 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateX(-60px);
        }

        /* Neon glow border effect */
        .glass-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            background: linear-gradient(
                135deg,
                rgba(207, 154, 52, 0.5) 0%,
                rgba(207, 154, 52, 0.1) 25%,
                rgba(207, 154, 52, 0.05) 50%,
                rgba(207, 154, 52, 0.15) 75%,
                rgba(207, 154, 52, 0.4) 100%
            );
            z-index: -1;
            animation: borderPulse 3s ease-in-out infinite;
        }

        /* Outer glow */
        .glass-card::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 28px;
            background: transparent;
            box-shadow: 
                0 0 30px rgba(207, 154, 52, 0.12),
                0 0 60px rgba(207, 154, 52, 0.06),
                inset 0 0 30px rgba(207, 154, 52, 0.03);
            z-index: -2;
            pointer-events: none;
        }

        /* Lightsweep effect */
        .lightsweep {
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(207, 154, 52, 0.04) 40%,
                rgba(207, 154, 52, 0.08) 50%,
                rgba(207, 154, 52, 0.04) 60%,
                transparent 100%
            );
            animation: lightsweep 4s ease-in-out 1.5s infinite;
            pointer-events: none;
        }

        /* ── Typography ── */
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
            opacity: 0;
            transform: translateY(12px);
        }

        .card-header .icon-wrapper {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(207, 154, 52, 0.12);
            border: 1px solid rgba(207, 154, 52, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .card-header .icon-wrapper svg {
            width: 18px;
            height: 18px;
            color: #CF9A34;
        }

        .card-title {
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            color: #F6C71E;
            text-shadow: 0 0 20px rgba(246, 199, 30, 0.25);
            line-height: 1.2;
        }

        .card-divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(
                90deg,
                rgba(207, 154, 52, 0.4) 0%,
                rgba(207, 154, 52, 0.1) 50%,
                transparent 100%
            );
            margin-bottom: 24px;
            animation: expandWidth 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
            opacity: 0;
            transform-origin: left;
            transform: scaleX(0);
        }

        /* ── Bullet Points ── */
        .bullet-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bullet-item {
            display: flex;
            align-items: center;
            gap: 16px;
            animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(16px);
        }

        .bullet-item:nth-child(1) { animation-delay: 0.7s; }
        .bullet-item:nth-child(2) { animation-delay: 0.9s; }
        .bullet-item:nth-child(3) { animation-delay: 1.1s; }

        .bullet-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        .bullet-item:nth-child(1) .bullet-icon {
            background: rgba(232, 151, 63, 0.1);
            border: 1px solid rgba(232, 151, 63, 0.2);
        }

        .bullet-item:nth-child(2) .bullet-icon {
            background: rgba(53, 204, 35, 0.08);
            border: 1px solid rgba(53, 204, 35, 0.15);
        }

        .bullet-item:nth-child(3) .bullet-icon {
            background: rgba(246, 199, 30, 0.08);
            border: 1px solid rgba(246, 199, 30, 0.15);
        }

        .bullet-icon svg {
            width: 20px;
            height: 20px;
        }

        .bullet-content {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .bullet-number {
            font-size: 28px;
            font-weight: 900;
            line-height: 1;
            color: #E8973F;
            text-shadow: 
                0 0 16px rgba(232, 151, 63, 0.35),
                0 0 40px rgba(232, 151, 63, 0.12);
            letter-spacing: -0.5px;
        }

        .bullet-label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
        }

        /* Special styling for the time metric */
        .bullet-item:first-child .bullet-number {
            color: #E8973F;
        }

        /* ── Footer Quote ── */
        .card-footer {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid rgba(207, 154, 52, 0.1);
            animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 1.3s forwards;
            opacity: 0;
            transform: translateY(12px);
        }

        .card-footer-text {
            font-size: 12.5px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.6;
            font-style: italic;
        }

        /* ── Animations ── */
        @keyframes slideInLeft {
            0% {
                opacity: 0;
                transform: translateX(-60px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(16px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes expandWidth {
            0% {
                opacity: 0;
                transform: scaleX(0);
            }
            100% {
                opacity: 1;
                transform: scaleX(1);
            }
        }

        @keyframes lightsweep {
            0% {
                left: -100%;
            }
            50% {
                left: 150%;
            }
            100% {
                left: 150%;
            }
        }

        @keyframes borderPulse {
            0%, 100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        @keyframes glowPulse {
            0%, 100% {
                text-shadow: 
                    0 0 16px rgba(232, 151, 63, 0.35),
                    0 0 40px rgba(232, 151, 63, 0.12);
            }
            50% {
                text-shadow: 
                    0 0 24px rgba(232, 151, 63, 0.5),
                    0 0 60px rgba(232, 151, 63, 0.2);
            }
        }

        .bullet-number {
            animation: glowPulse 3s ease-in-out infinite;
        }

        .bullet-item:nth-child(1) .bullet-number { animation-delay: 0s; }
        .bullet-item:nth-child(2) .bullet-number { animation-delay: 0.5s; }
        .bullet-item:nth-child(3) .bullet-number { animation-delay: 1s; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .split-container {
                grid-template-columns: 1fr;
                height: auto;
                max-width: 420px;
                margin: 16px;
            }

            .right-panel {
                display: none;
            }

            .left-panel {
                padding: 28px 20px;
            }

            .glass-card {
                padding: 28px 24px;
                border-radius: 16px;
            }

            .bullet-number {
                font-size: 24px;
            }

            .card-title {
                font-size: 13px;
                letter-spacing: 2.5px;
            }
        }
    </style>
</head>
<body>

    <div class="split-container">
        <!-- ═══ LEFT PANEL: Card Content ═══ -->
        <div class="left-panel">
            <div class="glass-card">
                <!-- Lightsweep overlay -->
                <div class="lightsweep"></div>

                <!-- Header with icon -->
                <div class="card-header">
                    <div class="icon-wrapper">
                        <!-- Rocket icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.59 14.37a6 6 0 01-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 003.02-11.91 14.98 14.98 0 00-8.37 2.88m2.17 2.17a14.96 14.96 0 01-2.89 8.37m-2.17-2.17a6 6 0 00-7.38 5.84h4.8m2.58-5.84a14.97 14.97 0 01-11.91 3.02 14.97 14.97 0 012.88-8.37m8.37 2.17a14.96 14.96 0 00-8.37-2.89" />
                        </svg>
                    </div>
                    <span class="card-title">NEW CHANNEL<br>RESULTS</span>
                </div>

                <!-- Divider -->
                <div class="card-divider"></div>

                <!-- Bullet Points -->
                <div class="bullet-list">
                    <!-- 9 Weeks -->
                    <div class="bullet-item">
                        <div class="bullet-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#E8973F">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <div class="bullet-content">
                            <span class="bullet-number">9 Weeks</span>
                            <span class="bullet-label">From zero to viral</span>
                        </div>
                    </div>

                    <!-- 1,700+ Subscribers -->
                    <div class="bullet-item">
                        <div class="bullet-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#35CC23">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
                            </svg>
                        </div>
                        <div class="bullet-content">
                            <span class="bullet-number">1,700+</span>
                            <span class="bullet-label">Subscribers</span>
                        </div>
                    </div>

                    <!-- 80,000+ Views -->
                    <div class="bullet-item">
                        <div class="bullet-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#F6C71E">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </div>
                        <div class="bullet-content">
                            <span class="bullet-number">80,000+</span>
                            <span class="bullet-label">Views</span>
                        </div>
                    </div>
                </div>

                <!-- Footer quote -->
                <div class="card-footer">
                    <p class="card-footer-text">"From zero to over 1,700 subscribers and 80,000+ views in just nine weeks."</p>
                </div>
            </div>
        </div>

        <!-- ═══ RIGHT PANEL: Speaker Placeholder ═══ -->
        <div class="right-panel">
            <div class="speaker-silhouette">
                <div class="speaker-avatar">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#A9ADB1">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                    </svg>
                </div>
                <span class="speaker-label">Speaker A-Roll</span>
            </div>
        </div>
    </div>

</body>
</html>
