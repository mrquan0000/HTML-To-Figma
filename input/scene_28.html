<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success Factors Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            'warm-accent': '#E8973F',
                            'deep-orange': '#D36708',
                            'dark-glow': '#200F00',
                            'bright-yellow': '#F6C71E',
                            'glass-gray': '#A9ADB1',
                            'deep-black': '#150A01',
                            'warm-wood': '#542A06',
                            'red-accent': '#C21403',
                            'neon-gold': '#CF9A34',
                            'positive-green': '#35CC23',
                        }
                    },
                    fontFamily: {
                        'heading': ['Montserrat', 'sans-serif'],
                        'body': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes slideInFromLeft {
            0% {
                opacity: 0;
                transform: translateX(-120px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow:
                    0 0 15px rgba(207, 154, 52, 0.4),
                    0 0 30px rgba(207, 154, 52, 0.2),
                    0 0 60px rgba(207, 154, 52, 0.1),
                    inset 0 0 20px rgba(207, 154, 52, 0.05);
            }
            50% {
                box-shadow:
                    0 0 20px rgba(207, 154, 52, 0.6),
                    0 0 40px rgba(207, 154, 52, 0.3),
                    0 0 80px rgba(207, 154, 52, 0.15),
                    inset 0 0 30px rgba(207, 154, 52, 0.08);
            }
        }

        @keyframes lightSweep {
            0% {
                left: -100%;
            }
            100% {
                left: 200%;
            }
        }

        @keyframes subtleFloat {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-4px);
            }
        }

        @keyframes iconPop {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            70% {
                transform: scale(1.15);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .card-slide-in {
            animation: slideInFromLeft 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 1;
        }

        .fade-in-1 {
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
            opacity: 1;
        }

        .fade-in-2 {
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
            opacity: 1;
        }

        .fade-in-3 {
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
            opacity: 1;
        }

        .fade-in-4 {
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
            opacity: 1;
        }

        .fade-in-5 {
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.7s forwards;
            opacity: 1;
        }

        .icon-pop-1 {
            animation: iconPop 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1.0s forwards;
            opacity: 1;
        }

        .icon-pop-2 {
            animation: iconPop 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1.3s forwards;
            opacity: 1;
        }

        .glow-pulse {
            animation: glowPulse 3s ease-in-out infinite;
        }

        .light-sweep::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(207, 154, 52, 0.06),
                rgba(246, 199, 30, 0.08),
                rgba(207, 154, 52, 0.06),
                transparent
            );
            animation: lightSweep 4s ease-in-out 2s infinite;
            pointer-events: none;
            border-radius: inherit;
        }

        .float-anim {
            animation: subtleFloat 4s ease-in-out infinite;
            animation-delay: 2.5s;
        }

        .glass-card {
            background: rgba(32, 15, 0, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(207, 154, 52, 0.35);
        }

        .bullet-line::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 70%;
            border-radius: 2px;
            background: linear-gradient(180deg, #CF9A34, #E8973F);
        }

        .keyword-highlight {
            background: linear-gradient(135deg, #E8973F, #F6C71E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 0 8px rgba(232, 151, 63, 0.4));
        }

        body {
            background: #000000;
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-[600px] mx-auto">
        <!-- Split Grid Container -->
        <div class="flex min-h-[500px] rounded-3xl overflow-hidden relative" style="background: #150A01;">

            <!-- Left Side: Card Area -->
            <div class="w-full relative flex items-center justify-center p-6 md:p-8">
                <!-- Subtle background glow -->
                <div class="absolute inset-0 opacity-30">
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] rounded-full"
                         style="background: radial-gradient(circle, rgba(207, 154, 52, 0.15) 0%, transparent 70%);">
                    </div>
                </div>

                <!-- Main Card -->
                <div class="card-slide-in glow-pulse light-sweep float-anim relative w-full glass-card rounded-2xl p-6 md:p-8"
                     style="border-radius: 20px;">

                    <!-- Inner gradient overlay -->
                    <div class="absolute inset-0 rounded-[20px] pointer-events-none"
                         style="background: linear-gradient(135deg, rgba(207, 154, 52, 0.05) 0%, transparent 40%, rgba(232, 151, 63, 0.03) 100%);">
                    </div>

                    <!-- Decorative corner accents -->
                    <div class="absolute top-0 left-0 w-16 h-16 pointer-events-none" style="border-top: 2px solid rgba(207, 154, 52, 0.5); border-left: 2px solid rgba(207, 154, 52, 0.5); border-radius: 20px 0 0 0;"></div>
                    <div class="absolute bottom-0 right-0 w-16 h-16 pointer-events-none" style="border-bottom: 2px solid rgba(207, 154, 52, 0.3); border-right: 2px solid rgba(207, 154, 52, 0.3); border-radius: 0 0 20px 0;"></div>

                    <!-- Card Content -->
                    <div class="relative z-10">

                        <!-- Decorative line above title -->
                        <div class="fade-in-1 mb-4 flex items-center gap-3">
                            <div class="h-[2px] w-10 rounded-full" style="background: linear-gradient(90deg, #CF9A34, transparent);"></div>
                            <div class="h-[2px] w-6 rounded-full" style="background: linear-gradient(90deg, #F6C71E, transparent); opacity: 0.6;"></div>
                        </div>

                        <!-- Title -->
                        <h1 class="fade-in-1 font-heading font-black text-2xl md:text-3xl tracking-wider mb-6"
                            style="color: #F6C71E; text-shadow: 0 0 20px rgba(246, 199, 30, 0.3), 0 0 40px rgba(246, 199, 30, 0.1); letter-spacing: 3px;">
                            SUCCESS FACTORS
                        </h1>

                        <!-- Divider with glow -->
                        <div class="fade-in-2 mb-6 relative">
                            <div class="h-[1px] w-full rounded-full" style="background: linear-gradient(90deg, rgba(207, 154, 52, 0.6), rgba(207, 154, 52, 0.15), transparent);"></div>
                            <div class="absolute top-0 left-0 h-[1px] w-1/3 rounded-full blur-sm" style="background: linear-gradient(90deg, #CF9A34, transparent);"></div>
                        </div>

                        <!-- Bullet Points -->
                        <div class="space-y-5">

                            <!-- Bullet 1: Niche -->
                            <div class="fade-in-3 flex items-start gap-4 group">
                                <div class="icon-pop-1 flex-shrink-0 mt-0.5">
                                    <div class="w-10 h-10 rounded-xl flex items-center justify-center relative"
                                         style="background: linear-gradient(135deg, rgba(207, 154, 52, 0.15), rgba(232, 151, 63, 0.1)); border: 1px solid rgba(207, 154, 52, 0.25); box-shadow: 0 0 12px rgba(207, 154, 52, 0.1);">
                                        <!-- Target Icon SVG -->
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <circle cx="12" cy="12" r="10" stroke="#CF9A34" stroke-width="1.5" opacity="0.7"/>
                                            <circle cx="12" cy="12" r="6" stroke="#F6C71E" stroke-width="1.5" opacity="0.8"/>
                                            <circle cx="12" cy="12" r="2.5" fill="#E8973F"/>
                                            <line x1="12" y1="2" x2="12" y2="6" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                                            <line x1="12" y1="18" x2="12" y2="22" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                                            <line x1="2" y1="12" x2="6" y2="12" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                                            <line x1="18" y1="12" x2="22" y2="12" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                                        </svg>
                                    </div>
                                </div>
                                <div class="flex-1">
                                    <p class="font-body text-base md:text-lg leading-relaxed font-medium" style="color: rgba(255, 255, 255, 0.9);">
                                        Focused heavily on his
                                        <span class="keyword-highlight font-bold text-lg md:text-xl">Niche</span>
                                    </p>
                                    <p class="font-body text-sm mt-1 leading-relaxed" style="color: rgba(255, 255, 255, 0.45);">
                                        Every single week, consistently
                                    </p>
                                </div>
                            </div>

                            <!-- Bullet 2: Packaging -->
                            <div class="fade-in-4 flex items-start gap-4 group">
                                <div class="icon-pop-2 flex-shrink-0 mt-0.5">
                                    <div class="w-10 h-10 rounded-xl flex items-center justify-center relative"
                                         style="background: linear-gradient(135deg, rgba(207, 154, 52, 0.15), rgba(232, 151, 63, 0.1)); border: 1px solid rgba(207, 154, 52, 0.25); box-shadow: 0 0 12px rgba(207, 154, 52, 0.1);">
                                        <!-- Box Icon SVG -->
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M21 8L12 2L3 8V16L12 22L21 16V8Z" stroke="#CF9A34" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/>
                                            <path d="M12 22V12" stroke="#F6C71E" stroke-width="1.5" opacity="0.8"/>
                                            <path d="M21 8L12 12L3 8" stroke="#F6C71E" stroke-width="1.5" opacity="0.8"/>
                                            <path d="M7.5 4.5L16.5 9.5" stroke="#E8973F" stroke-width="1" opacity="0.5"/>
                                            <circle cx="12" cy="12" r="1.5" fill="#E8973F" opacity="0.9"/>
                                        </svg>
                                    </div>
                                </div>
                                <div class="flex-1">
                                    <p class="font-body text-base md:text-lg leading-relaxed font-medium" style="color: rgba(255, 255, 255, 0.9);">
                                        And his
                                        <span class="keyword-highlight font-bold text-lg md:text-xl">Packaging</span>
                                    </p>
                                    <p class="font-body text-sm mt-1 leading-relaxed" style="color: rgba(255, 255, 255, 0.45);">
                                        Proven across multiple channels
                                    </p>
                                </div>
                            </div>
                        </div>

                        <!-- Bottom decorative bar -->
                        <div class="fade-in-5 mt-8 flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <div class="w-2 h-2 rounded-full" style="background: #CF9A34; box-shadow: 0 0 8px rgba(207, 154, 52, 0.5);"></div>
                                <div class="w-1.5 h-1.5 rounded-full" style="background: #E8973F; opacity: 0.6;"></div>
                                <div class="w-1 h-1 rounded-full" style="background: #E8973F; opacity: 0.3;"></div>
                            </div>
                            <p class="font-body text-xs tracking-widest uppercase" style="color: rgba(207, 154, 52, 0.35);">
                                Key Drivers
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side: Speaker Area Placeholder -->
            <div class="hidden md:flex w-0 items-center justify-center relative">
                <!-- This area represents where the speaker (A-roll) would be positioned -->
            </div>
        </div>

        <!-- Caption / Quote Text Below -->
        <div class="fade-in-5 mt-6 px-4">
            <p class="font-body text-sm leading-relaxed text-center max-w-lg mx-auto" style="color: rgba(255, 255, 255, 0.35);">
                "The reason it worked so fast is because we focused heavily on two things every single week."
            </p>
        </div>
    </div>
</body>
</html>
