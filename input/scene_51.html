<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 Key Strategies — YouTube Growth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-bg-dark': '#150A01',
                        'brand-card': '#200F00',
                        'brand-neon': '#CF9A34',
                        'brand-yellow': '#F6C71E',
                        'brand-orange': '#E8973F',
                        'brand-wood': '#542A06',
                        'brand-gray': '#A9ADB1',
                        'brand-red': '#C21403',
                        'brand-green': '#35CC23',
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #150A01;
            margin: 0;
            overflow-x: hidden;
        }

        /* ── Ambient radial glow ── */
        .ambient-glow {
            position: absolute;
            inset: -80px;
            background: radial-gradient(
                ellipse 50% 50% at 50% 50%,
                rgba(207, 154, 52, 0.10) 0%,
                rgba(207, 154, 52, 0.03) 40%,
                transparent 70%
            );
            pointer-events: none;
            z-index: 0;
        }

        /* ── Glassmorphism card ── */
        .glass-card {
            position: relative;
            background: linear-gradient(
                165deg,
                rgba(32, 15, 0, 0.92) 0%,
                rgba(32, 15, 0, 0.80) 50%,
                rgba(21, 10, 1, 0.88) 100%
            );
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1.5px solid rgba(207, 154, 52, 0.45);
            border-radius: 28px;
            box-shadow:
                0 0 40px rgba(207, 154, 52, 0.18),
                0 0 80px rgba(207, 154, 52, 0.06),
                0 12px 48px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(207, 154, 52, 0.12);
            z-index: 1;
        }

        /* ── Lightsweep shimmer ── */
        .glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            background: linear-gradient(
                105deg,
                transparent 0%,
                transparent 40%,
                rgba(207, 154, 52, 0.06) 45%,
                rgba(246, 199, 30, 0.04) 50%,
                rgba(207, 154, 52, 0.06) 55%,
                transparent 60%,
                transparent 100%
            );
            animation: lightsweep 5s ease-in-out infinite;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes lightsweep {
            0%, 100% { transform: translateX(-120%); }
            50% { transform: translateX(120%); }
        }

        /* ── Title glow ── */
        .glow-title {
            text-shadow:
                0 0 24px rgba(246, 199, 30, 0.45),
                0 0 48px rgba(246, 199, 30, 0.15),
                0 2px 4px rgba(0, 0, 0, 0.4);
        }

        /* ── Number accent glow ── */
        .accent-num {
            text-shadow:
                0 0 12px rgba(232, 151, 63, 0.5),
                0 0 24px rgba(232, 151, 63, 0.2);
        }

        /* ── Star icon glow ── */
        .star-glow {
            filter: drop-shadow(0 0 8px rgba(246, 199, 30, 0.6));
        }

        /* ── Divider gradient ── */
        .divider-glow {
            background: linear-gradient(90deg, transparent 0%, #CF9A34 50%, transparent 100%);
            height: 1px;
            opacity: 0.5;
        }

        /* ── Number badge ── */
        .num-badge {
            background: linear-gradient(135deg, rgba(84, 42, 6, 0.5) 0%, rgba(32, 15, 0, 0.7) 100%);
            border: 1px solid rgba(207, 154, 52, 0.3);
            box-shadow:
                0 0 12px rgba(207, 154, 52, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* ── Bullet row hover ── */
        .bullet-row {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                        background-color 0.3s ease;
            cursor: default;
        }
        .bullet-row:hover {
            transform: translateX(6px);
            background-color: rgba(207, 154, 52, 0.06);
        }

        /* ── Corner bracket decorations ── */
        .corner-bracket {
            position: absolute;
            width: 18px;
            height: 18px;
            opacity: 0.35;
        }
        .corner-bracket.tl { top: 14px; left: 14px; border-top: 2px solid #CF9A34; border-left: 2px solid #CF9A34; border-top-left-radius: 6px; }
        .corner-bracket.tr { top: 14px; right: 14px; border-top: 2px solid #CF9A34; border-right: 2px solid #CF9A34; border-top-right-radius: 6px; }
        .corner-bracket.bl { bottom: 14px; left: 14px; border-bottom: 2px solid #CF9A34; border-left: 2px solid #CF9A34; border-bottom-left-radius: 6px; }
        .corner-bracket.br { bottom: 14px; right: 14px; border-bottom: 2px solid #CF9A34; border-right: 2px solid #CF9A34; border-bottom-right-radius: 6px; }

        /* ── Floating particle dots ── */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(207, 154, 52, 0.6) 0%, transparent 70%);
            pointer-events: none;
        }
        .p1 { width: 6px; height: 6px; top: 12%; left: -30px; animation: float-p 6s ease-in-out infinite; }
        .p2 { width: 4px; height: 4px; top: 45%; right: -25px; animation: float-p 8s ease-in-out infinite 1s; }
        .p3 { width: 5px; height: 5px; bottom: 18%; left: -20px; animation: float-p 7s ease-in-out infinite 2s; }
        .p4 { width: 3px; height: 3px; top: 30%; right: -35px; animation: float-p 5s ease-in-out infinite 0.5s; }

        @keyframes float-p {
            0%, 100% { transform: translateY(0px); opacity: 0.6; }
            50% { transform: translateY(-12px); opacity: 1; }
        }

        /* ── Outer accent ring glow ── */
        .outer-ring {
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            border: 1px solid rgba(207, 154, 52, 0.08);
            pointer-events: none;
        }

        /* ── Key phrase highlight ── */
        .key-phrase {
            color: #E8973F;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(232, 151, 63, 0.3);
        }

        /* ── Inner top shine ── */
        .top-shine {
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(207, 154, 52, 0.4), transparent);
            border-radius: 0 0 50% 50%;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <!-- ─── Main Wrapper ─── -->
    <div class="relative w-full" style="max-width: 600px;">

        <!-- Ambient glow backdrop -->
        <div class="ambient-glow"></div>

        <!-- Outer accent ring -->
        <div class="outer-ring"></div>

        <!-- Floating particles -->
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>

        <!-- ═══════════ GLASS CARD ═══════════ -->
        <div class="glass-card px-7 py-8 sm:px-10 sm:py-10 relative">

            <!-- Top inner shine -->
            <div class="top-shine"></div>

            <!-- Corner brackets -->
            <div class="corner-bracket tl"></div>
            <div class="corner-bracket tr"></div>
            <div class="corner-bracket bl"></div>
            <div class="corner-bracket br"></div>

            <!-- ── Header row: icons ── -->
            <div class="flex items-center justify-between mb-5 relative" style="z-index:2;">

                <!-- Left: Stars cluster -->
                <div class="flex items-center gap-1.5">
                    <svg class="w-7 h-7 star-glow" viewBox="0 0 24 24" fill="#F6C71E">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                    <svg class="w-4 h-4 star-glow" style="filter: drop-shadow(0 0 5px rgba(232,151,63,0.5));" viewBox="0 0 24 24" fill="#E8973F">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                    <svg class="w-3 h-3" style="filter: drop-shadow(0 0 4px rgba(207,154,52,0.4));" viewBox="0 0 24 24" fill="#CF9A34">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                </div>

                <!-- Right: Checklist icon -->
                <div class="flex items-center gap-2">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="#CF9A34" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 6px rgba(207,154,52,0.4));">
                        <rect x="3" y="3" width="18" height="18" rx="3"/>
                        <path d="M9 12l2 2 4-4"/>
                    </svg>
                </div>
            </div>

            <!-- ── Title ── -->
            <div class="text-center mb-2 relative" style="z-index:2;">
                <h1 class="glow-title font-black tracking-wider text-brand-yellow leading-none"
                    style="font-size: clamp(2rem, 6vw, 3rem); letter-spacing: 0.18em;">
                    5 KEY STRATEGIES
                </h1>
            </div>

            <!-- ── Subtitle ── -->
            <p class="text-center text-xs sm:text-sm tracking-widest font-medium uppercase mb-7 relative" style="z-index:2; color: #A9ADB1;">
                FOR YOUTUBE GROWTH
            </p>

            <!-- ── Divider ── -->
            <div class="divider-glow mb-7 mx-6 sm:mx-10 relative" style="z-index:2;"></div>

            <!-- ── Bullet Points ── -->
            <div class="space-y-4 relative" style="z-index:2;">

                <!-- 1 -->
                <div class="bullet-row flex items-center gap-4 rounded-xl px-3 py-3 sm:px-4 sm:py-3.5">
                    <div class="num-badge flex-shrink-0 w-10 h-10 sm:w-11 sm:h-11 rounded-xl flex items-center justify-center">
                        <span class="accent-num font-extrabold text-brand-orange" style="font-size: 1.15rem;">1</span>
                    </div>
                    <p class="text-white font-semibold text-base sm:text-lg leading-snug">
                        <span class="key-phrase">First</span> 24 Hours
                    </p>
                </div>

                <!-- 2 -->
                <div class="bullet-row flex items-center gap-4 rounded-xl px-3 py-3 sm:px-4 sm:py-3.5">
                    <div class="num-badge flex-shrink-0 w-10 h-10 sm:w-11 sm:h-11 rounded-xl flex items-center justify-center">
                        <span class="accent-num font-extrabold text-brand-orange" style="font-size: 1.15rem;">2</span>
                    </div>
                    <p class="text-white font-semibold text-base sm:text-lg leading-snug">
                        <span class="key-phrase">Choose</span> Audience
                    </p>
                </div>

                <!-- 3 -->
                <div class="bullet-row flex items-center gap-4 rounded-xl px-3 py-3 sm:px-4 sm:py-3.5">
                    <div class="num-badge flex-shrink-0 w-10 h-10 sm:w-11 sm:h-11 rounded-xl flex items-center justify-center">
                        <span class="accent-num font-extrabold text-brand-orange" style="font-size: 1.15rem;">3</span>
                    </div>
                    <p class="text-white font-semibold text-base sm:text-lg leading-snug">
                        <span class="key-phrase">Master</span> Packaging
                    </p>
                </div>

                <!-- 4 -->
                <div class="bullet-row flex items-center gap-4 rounded-xl px-3 py-3 sm:px-4 sm:py-3.5">
                    <div class="num-badge flex-shrink-0 w-10 h-10 sm:w-11 sm:h-11 rounded-xl flex items-center justify-center">
                        <span class="accent-num font-extrabold text-brand-orange" style="font-size: 1.15rem;">4</span>
                    </div>
                    <p class="text-white font-semibold text-base sm:text-lg leading-snug">
                        <span class="key-phrase">Improve</span> Hooks
                    </p>
                </div>

                <!-- 5 — Highlighted -->
                <div class="bullet-row flex items-center gap-4 rounded-xl px-3 py-3 sm:px-4 sm:py-3.5" style="background: rgba(207,154,52,0.06); border: 1px solid rgba(207,154,52,0.12);">
                    <div class="num-badge flex-shrink-0 w-10 h-10 sm:w-11 sm:h-11 rounded-xl flex items-center justify-center" style="border-color: rgba(207,154,52,0.5); box-shadow: 0 0 16px rgba(207,154,52,0.2), inset 0 1px 0 rgba(255,255,255,0.05);">
                        <span class="accent-num font-extrabold text-brand-orange" style="font-size: 1.15rem; text-shadow: 0 0 16px rgba(232,151,63,0.6);">5</span>
                    </div>
                    <p class="text-white font-bold text-base sm:text-lg leading-snug">
                        <span class="key-phrase">Stay</span> in the Game
                    </p>
                    <!-- Star accent on the last item -->
                    <svg class="w-4 h-4 ml-auto star-glow flex-shrink-0" viewBox="0 0 24 24" fill="#F6C71E">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                </div>
            </div>

            <!-- ── Bottom Divider ── -->
            <div class="divider-glow mt-7 mx-6 sm:mx-10 relative" style="z-index:2;"></div>

            <!-- ── Footer tagline ── -->
            <div class="mt-6 text-center relative" style="z-index:2;">
                <p class="font-medium tracking-widest uppercase" style="font-size: 0.65rem; color: rgba(169,173,177,0.55);">
                    ✦ Commit to the Process ✦
                </p>
            </div>

        </div>
        <!-- ═══════════ END CARD ═══════════ -->

    </div>

</body>
</html>
