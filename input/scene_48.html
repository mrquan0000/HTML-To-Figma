<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post-Upload Question Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            'orange-warm': '#E8973F',
                            'orange-deep': '#D36708',
                            'bg-glow': '#200F00',
                            'yellow-bright': '#F6C71E',
                            'gray-glass': '#A9ADB1',
                            'bg-black': '#150A01',
                            'wood-warm': '#542A06',
                            'red-accent': '#C21403',
                            'neon-gold': '#CF9A34',
                            'green-pos': '#35CC23',
                        }
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #150A01;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: linear-gradient(135deg, rgba(32, 15, 0, 0.85) 0%, rgba(32, 15, 0, 0.95) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1.5px solid rgba(207, 154, 52, 0.5);
            border-radius: 24px;
            box-shadow:
                0 0 20px rgba(207, 154, 52, 0.15),
                0 0 60px rgba(207, 154, 52, 0.08),
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(207, 154, 52, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* Neon glow border effect */
        .glass-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 25px;
            background: linear-gradient(135deg, rgba(207, 154, 52, 0.4), rgba(232, 151, 63, 0.2), rgba(207, 154, 52, 0.4));
            z-index: -1;
            filter: blur(1px);
        }

        /* Lightsweep effect */
        .glass-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(207, 154, 52, 0.03) 40%,
                rgba(207, 154, 52, 0.06) 50%,
                rgba(207, 154, 52, 0.03) 60%,
                transparent 100%
            );
            animation: lightsweep 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes lightsweep {
            0% {
                left: -100%;
            }
            50% {
                left: 100%;
            }
            100% {
                left: 100%;
            }
        }

        /* Subtle glow pulse for the card */
        .glow-pulse {
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow:
                    0 0 20px rgba(207, 154, 52, 0.15),
                    0 0 60px rgba(207, 154, 52, 0.08),
                    0 20px 60px rgba(0, 0, 0, 0.5),
                    inset 0 1px 0 rgba(207, 154, 52, 0.1);
            }
            50% {
                box-shadow:
                    0 0 30px rgba(207, 154, 52, 0.25),
                    0 0 80px rgba(207, 154, 52, 0.12),
                    0 20px 60px rgba(0, 0, 0, 0.5),
                    inset 0 1px 0 rgba(207, 154, 52, 0.15);
            }
        }

        /* Title glow text */
        .title-glow {
            text-shadow: 0 0 20px rgba(246, 199, 30, 0.4), 0 0 40px rgba(246, 199, 30, 0.15);
        }

        /* Accent line glow */
        .accent-glow {
            text-shadow: 0 0 16px rgba(232, 151, 63, 0.35), 0 0 32px rgba(232, 151, 63, 0.12);
        }

        /* Icon glow */
        .icon-glow {
            filter: drop-shadow(0 0 8px rgba(246, 199, 30, 0.4));
        }

        /* Bullet marker glow */
        .bullet-marker {
            box-shadow: 0 0 6px rgba(207, 154, 52, 0.5);
        }

        /* Top accent bar glow */
        .top-accent-bar {
            background: linear-gradient(90deg, transparent, #CF9A34, transparent);
            box-shadow: 0 0 12px rgba(207, 154, 52, 0.3);
        }

        /* Subtle inner gradient overlay */
        .inner-gradient {
            background: radial-gradient(ellipse at top left, rgba(207, 154, 52, 0.06) 0%, transparent 60%);
        }
    </style>
</head>
<body>

    <!-- Main Container - Centered, max-width 600px -->
    <div class="w-full max-w-[600px] mx-auto px-4 py-8 relative z-10">

        <!-- Glassmorphism Card -->
        <div class="glass-card glow-pulse relative p-8 sm:p-10">

            <!-- Inner gradient overlay -->
            <div class="inner-gradient absolute inset-0 rounded-3xl pointer-events-none"></div>

            <!-- Top Accent Bar -->
            <div class="top-accent-bar absolute top-0 left-1/2 -translate-x-1/2 w-24 h-[2px] rounded-full"></div>

            <!-- Content Wrapper -->
            <div class="relative z-10">

                <!-- Question Icon + Title Section -->
                <div class="flex items-center gap-4 mb-6">

                    <!-- Question Mark Icon -->
                    <div class="flex-shrink-0 w-12 h-12 rounded-xl flex items-center justify-center"
                         style="background: linear-gradient(135deg, rgba(207, 154, 52, 0.15), rgba(246, 199, 30, 0.08)); border: 1px solid rgba(207, 154, 52, 0.25);">
                        <svg class="icon-glow w-6 h-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-4h2v2h-2v-2zm1.61-7.35c-.75-.82-1.2-1.32-1.35-1.51-.28-.34-.22-.65.06-.9.24-.22.57-.26.83-.08.18.12.33.3.45.5l1.09-.44C14.24 5.36 13.7 5 13.06 5c-.58 0-1.08.18-1.42.53-.52.52-.78 1.37-.78 2.53h2c.02-.62.1-1.07.24-1.38z" fill="#CF9A34"/>
                        </svg>
                    </div>

                    <!-- Title -->
                    <div>
                        <h2 class="title-glow text-lg sm:text-xl font-extrabold tracking-[0.08em] uppercase"
                            style="color: #F6C71E; letter-spacing: 0.08em;">
                            Post-Upload Question
                        </h2>
                        <p class="text-xs font-medium tracking-wider uppercase mt-0.5"
                           style="color: rgba(169, 173, 177, 0.5);">
                            The One Thing That Changes Everything
                        </p>
                    </div>
                </div>

                <!-- Divider -->
                <div class="w-full h-[1px] mb-6 rounded-full"
                     style="background: linear-gradient(90deg, rgba(207, 154, 52, 0.3), rgba(207, 154, 52, 0.08));"></div>

                <!-- Main Question Text -->
                <div class="mb-6">
                    <div class="flex items-start gap-3">
                        <!-- Decorative quote mark -->
                        <span class="text-2xl font-black leading-none flex-shrink-0 mt-0.5"
                              style="color: rgba(207, 154, 52, 0.35);">"</span>
                        <p class="text-base sm:text-lg font-semibold leading-relaxed"
                           style="color: #FFFFFF;">
                            What can I improve in the next video?
                        </p>
                    </div>
                </div>

                <!-- Examples Section -->
                <div class="mb-6 pl-4">
                    <p class="text-xs font-bold tracking-widest uppercase mb-3"
                       style="color: rgba(169, 173, 177, 0.5);">
                        Maybe it's...
                    </p>

                    <!-- Bullet Points Grid -->
                    <div class="grid grid-cols-2 gap-x-4 gap-y-2.5">

                        <!-- Thumbnail -->
                        <div class="flex items-center gap-2.5">
                            <div class="bullet-marker w-1.5 h-1.5 rounded-full flex-shrink-0"
                                 style="background-color: #CF9A34;"></div>
                            <span class="text-sm sm:text-base font-medium"
                                  style="color: #A9ADB1;">Thumbnail</span>
                        </div>

                        <!-- Hook -->
                        <div class="flex items-center gap-2.5">
                            <div class="bullet-marker w-1.5 h-1.5 rounded-full flex-shrink-0"
                                 style="background-color: #CF9A34;"></div>
                            <span class="text-sm sm:text-base font-medium"
                                  style="color: #A9ADB1;">Hook</span>
                        </div>

                        <!-- Pacing -->
                        <div class="flex items-center gap-2.5">
                            <div class="bullet-marker w-1.5 h-1.5 rounded-full flex-shrink-0"
                                 style="background-color: #CF9A34;"></div>
                            <span class="text-sm sm:text-base font-medium"
                                  style="color: #A9ADB1;">Pacing</span>
                        </div>

                        <!-- Title -->
                        <div class="flex items-center gap-2.5">
                            <div class="bullet-marker w-1.5 h-1.5 rounded-full flex-shrink-0"
                                 style="background-color: #CF9A34;"></div>
                            <span class="text-sm sm:text-base font-medium"
                                  style="color: #A9ADB1;">Title</span>
                        </div>
                    </div>
                </div>

                <!-- Divider -->
                <div class="w-full h-[1px] mb-6 rounded-full"
                     style="background: linear-gradient(90deg, rgba(207, 154, 52, 0.08), rgba(207, 154, 52, 0.3), rgba(207, 154, 52, 0.08));"></div>

                <!-- Mindset Section -->
                <div class="flex items-center gap-3">

                    <!-- Mindset Icon -->
                    <div class="flex-shrink-0 w-10 h-10 rounded-lg flex items-center justify-center"
                         style="background: linear-gradient(135deg, rgba(232, 151, 63, 0.15), rgba(232, 151, 63, 0.05)); border: 1px solid rgba(232, 151, 63, 0.2);">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                             style="filter: drop-shadow(0 0 6px rgba(232, 151, 63, 0.4));">
                            <!-- Brain/mindset icon -->
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zm2 13h-4v-1h4v1zm0-2H10c-.55 0-1-.45-1-1v-1c0-.55.45-1 1-1h1v-1.5c0-.28.22-.5.5-.5s.5.22.5.5V10h1c.55 0 1 .45 1 1v1c0 .55-.45 1-1 1z"
                                  fill="#E8973F" opacity="0.9"/>
                            <path d="M9 19h6M12 17v2" stroke="#E8973F" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
                        </svg>
                    </div>

                    <!-- Mindset Text -->
                    <div>
                        <p class="text-xs font-bold tracking-widest uppercase mb-1"
                           style="color: rgba(232, 151, 63, 0.5);">
                            Mindset
                        </p>
                        <p class="accent-glow text-base sm:text-lg font-bold italic leading-snug"
                           style="color: #E8973F;">
                            This mindset changes everything
                        </p>
                    </div>
                </div>

            </div>

            <!-- Bottom decorative elements -->
            <div class="absolute bottom-3 right-4 flex items-center gap-1.5 opacity-30 z-10">
                <div class="w-1 h-1 rounded-full" style="background-color: #CF9A34;"></div>
                <div class="w-1.5 h-1.5 rounded-full" style="background-color: #CF9A34;"></div>
                <div class="w-2 h-2 rounded-full" style="background-color: #CF9A34;"></div>
            </div>

        </div>
        <!-- End Glassmorphism Card -->

        <!-- Attribution / subtle branding -->
        <p class="text-center mt-5 text-xs font-medium tracking-wider uppercase"
           style="color: rgba(169, 173, 177, 0.2);">
            Every upload is a lesson
        </p>

    </div>

</body>
</html>
