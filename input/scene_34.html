<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPLE THUMBNAILS WIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#150A01',
                        'brand-card': '#200F00',
                        'brand-neon': '#CF9A34',
                        'brand-gold': '#F6C71E',
                        'brand-green': '#35CC23',
                        'brand-orange': '#E8973F',
                        'brand-deep-orange': '#D36708',
                        'brand-gray': '#A9ADB1',
                        'brand-wood': '#542A06',
                        'brand-red': '#C21403',
                    },
                    fontFamily: {
                        'inter': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #150A01;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-glassmorphism {
            background: rgba(32, 15, 0, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid rgba(207, 154, 52, 0.6);
            box-shadow:
                0 0 15px rgba(207, 154, 52, 0.3),
                0 0 40px rgba(207, 154, 52, 0.12),
                0 0 80px rgba(207, 154, 52, 0.06),
                inset 0 1px 0 rgba(207, 154, 52, 0.15),
                0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .card-glassmorphism::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: inherit;
            background: linear-gradient(
                135deg,
                rgba(207, 154, 52, 0.25) 0%,
                rgba(207, 154, 52, 0.05) 30%,
                transparent 50%,
                rgba(207, 154, 52, 0.05) 70%,
                rgba(207, 154, 52, 0.2) 100%
            );
            pointer-events: none;
            z-index: 0;
        }

        .card-glassmorphism::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(207, 154, 52, 0.06),
                rgba(255, 255, 255, 0.03),
                rgba(207, 154, 52, 0.06),
                transparent
            );
            animation: lightsweep 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
            border-radius: inherit;
        }

        @keyframes lightsweep {
            0% { left: -100%; }
            50% { left: 150%; }
            100% { left: 150%; }
        }

        .title-glow {
            text-shadow:
                0 0 10px rgba(246, 199, 30, 0.5),
                0 0 30px rgba(246, 199, 30, 0.25),
                0 0 60px rgba(246, 199, 30, 0.1);
        }

        .win-glow {
            text-shadow:
                0 0 10px rgba(53, 204, 35, 0.6),
                0 0 25px rgba(53, 204, 35, 0.3),
                0 0 50px rgba(53, 204, 35, 0.15);
        }

        .neon-border-glow {
            box-shadow:
                0 0 8px rgba(207, 154, 52, 0.4),
                0 0 25px rgba(207, 154, 52, 0.15);
        }

        .bullet-dot {
            box-shadow: 0 0 8px rgba(207, 154, 52, 0.5);
        }

        .icon-container {
            background: rgba(207, 154, 52, 0.08);
            border: 1px solid rgba(207, 154, 52, 0.2);
            box-shadow: 0 0 12px rgba(207, 154, 52, 0.08);
        }

        .ambient-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }

        .speaker-gradient {
            background: linear-gradient(
                270deg,
                rgba(21, 10, 1, 0) 0%,
                rgba(21, 10, 1, 0.4) 40%,
                rgba(21, 10, 1, 0.85) 100%
            );
        }
    </style>
</head>
<body>
    <div class="relative w-full max-w-[960px] h-[540px] bg-brand-dark overflow-hidden rounded-2xl shadow-2xl">

        <!-- Ambient glow effects -->
        <div class="ambient-glow w-[300px] h-[300px] bg-brand-neon opacity-[0.06] top-[-50px] left-[-50px]"></div>
        <div class="ambient-glow w-[200px] h-[200px] bg-brand-gold opacity-[0.04] bottom-[50px] left-[200px]"></div>

        <!-- Right side: Speaker area (simulated) -->
        <div class="absolute top-0 right-0 w-[45%] h-full z-0">
            <!-- Speaker silhouette placeholder -->
            <div class="absolute bottom-0 right-[5%] w-[70%] h-[92%] rounded-t-[40%] bg-gradient-to-t from-[#2A1505] via-[#1A0D03] to-transparent opacity-40"></div>
            <!-- Speaker overlay gradient -->
            <div class="absolute inset-0 speaker-gradient"></div>
        </div>

        <!-- Main content area (left half) -->
        <div class="relative z-10 w-full h-full flex items-center px-8 md:px-12 lg:px-16">

            <!-- Card -->
            <div class="card-glassmorphism relative rounded-2xl p-8 md:p-10 w-full max-w-[460px]">

                <!-- Card inner content -->
                <div class="relative z-10">

                    <!-- Top accent line -->
                    <div class="w-12 h-[3px] bg-brand-neon rounded-full mb-6 neon-border-glow"></div>

                    <!-- Trophy icon -->
                    <div class="icon-container inline-flex items-center justify-center w-12 h-12 rounded-xl mb-5">
                        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="#CF9A34" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 2h12M8 2v4a4 4 0 0 1-4 4H3a1 1 0 0 1-1-1V4a2 2 0 0 1 2-2h2z"/>
                            <path d="M16 2v4a4 4 0 0 0 4 4h1a1 1 0 0 0 1-1V4a2 2 0 0 0-2-2h-2z"/>
                            <path d="M12 10a6 6 0 0 1-6 6H5a1 1 0 0 1-1-1v-2h8v3"/>
                            <path d="M12 10a6 6 0 0 0 6 6h1a1 1 0 0 0 1-1v-2h-8v3"/>
                            <path d="M9 22h6"/>
                            <path d="M10 19h4"/>
                        </svg>
                    </div>

                    <!-- Title -->
                    <h1 class="text-2xl md:text-3xl font-black uppercase tracking-tight leading-tight mb-2 title-glow">
                        <span class="text-brand-gold">SIMPLE THUMBNAILS</span>
                        <span class="text-brand-green win-glow ml-1">WIN</span>
                    </h1>

                    <!-- Subtitle / Main quote -->
                    <p class="text-brand-gray text-sm md:text-[15px] leading-relaxed mb-7 font-medium">
                        "but simple usually ends up performing way better on YouTube."
                    </p>

                    <!-- Divider -->
                    <div class="w-full h-[1px] bg-gradient-to-r from-brand-neon/30 via-brand-neon/10 to-transparent mb-7"></div>

                    <!-- Bullet points -->
                    <div class="space-y-4">
                        <!-- Bullet 1 -->
                        <div class="flex items-center gap-4 group">
                            <div class="flex-shrink-0 icon-container w-9 h-9 rounded-lg flex items-center justify-center">
                                <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="#E8973F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"/>
                                    <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                                    <line x1="9" y1="9" x2="9.01" y2="9"/>
                                    <line x1="15" y1="9" x2="15.01" y2="9"/>
                                </svg>
                            </div>
                            <div>
                                <span class="text-white font-semibold text-sm md:text-[15px] tracking-wide">
                                    <span class="text-brand-neon font-bold mr-1">1</span> Strong Emotion
                                </span>
                            </div>
                        </div>

                        <!-- Bullet 2 -->
                        <div class="flex items-center gap-4 group">
                            <div class="flex-shrink-0 icon-container w-9 h-9 rounded-lg flex items-center justify-center">
                                <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="#E8973F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"/>
                                    <circle cx="12" cy="12" r="6"/>
                                    <circle cx="12" cy="12" r="2"/>
                                </svg>
                            </div>
                            <div>
                                <span class="text-white font-semibold text-sm md:text-[15px] tracking-wide">
                                    <span class="text-brand-neon font-bold mr-1">1</span> Clear Message
                                </span>
                            </div>
                        </div>

                        <!-- Bullet 3 -->
                        <div class="flex items-center gap-4 group">
                            <div class="flex-shrink-0 icon-container w-9 h-9 rounded-lg flex items-center justify-center">
                                <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="#E8973F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M15 3h6v6"/>
                                    <path d="M10 14L21 3"/>
                                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                                </svg>
                            </div>
                            <div>
                                <span class="text-white font-semibold text-sm md:text-[15px] tracking-wide">
                                    <span class="text-brand-neon font-bold mr-1">1</span> Reason to Click
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- Bottom tagline -->
                    <div class="mt-7 pt-5 border-t border-brand-neon/10">
                        <p class="text-brand-gold/60 text-xs uppercase tracking-[0.2em] font-semibold">
                            That's it.
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Speaker placeholder indicator -->
        <div class="absolute bottom-6 right-8 z-10 flex items-center gap-2 opacity-50">
            <div class="w-2 h-2 rounded-full bg-brand-neon"></div>
            <span class="text-brand-gray text-[10px] uppercase tracking-[0.15em] font-medium">Speaker Area</span>
        </div>
    </div>
</body>
</html>
