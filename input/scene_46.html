<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Years of Learning — Premium Card Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'dark': '#150A01',
                        'card-bg': '#200F00',
                        'gold': '#F6C71E',
                        'orange': '#E8973F',
                        'neon': '#CF9A34',
                        'wood': '#542A06',
                        'dorange': '#D36708',
                        'cred': '#C21403',
                        'muted': '#A9ADB1',
                        'green': '#35CC23',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            margin: 0;
        }

        /* ═══ GLASSMORPHISM CARD ═══ */
        .glass-card {
            background: linear-gradient(145deg, rgba(32,15,0,0.88) 0%, rgba(32,15,0,0.76) 50%, rgba(32,15,0,0.88) 100%);
            backdrop-filter: blur(28px) saturate(1.3);
            -webkit-backdrop-filter: blur(28px) saturate(1.3);
            border: 1.5px solid rgba(207,154,52,0.42);
            border-radius: 20px;
            box-shadow:
                0 0 22px rgba(207,154,52,0.22),
                0 0 55px rgba(207,154,52,0.07),
                0 28px 65px -12px rgba(0,0,0,0.65),
                inset 0 1px 0 rgba(255,255,255,0.07),
                inset 0 -1px 0 rgba(0,0,0,0.25);
            animation: neonPulse 4s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        /* Top accent glow line */
        .glass-card::after {
            content: '';
            position: absolute;
            top: -1px;
            left: 18%;
            right: 18%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(207,154,52,0.5), transparent);
            border-radius: 2px;
            pointer-events: none;
        }

        /* Lightsweep */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -80%;
            width: 45%;
            height: 100%;
            background: linear-gradient(105deg, transparent 25%, rgba(207,154,52,0.045) 42%, rgba(207,154,52,0.09) 50%, rgba(207,154,52,0.045) 58%, transparent 75%);
            animation: lightsweep 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes neonPulse {
            0%, 100% {
                box-shadow:
                    0 0 22px rgba(207,154,52,0.22),
                    0 0 55px rgba(207,154,52,0.07),
                    0 28px 65px -12px rgba(0,0,0,0.65),
                    inset 0 1px 0 rgba(255,255,255,0.07),
                    inset 0 -1px 0 rgba(0,0,0,0.25);
            }
            50% {
                box-shadow:
                    0 0 32px rgba(207,154,52,0.38),
                    0 0 75px rgba(207,154,52,0.12),
                    0 28px 65px -12px rgba(0,0,0,0.65),
                    inset 0 1px 0 rgba(255,255,255,0.09),
                    inset 0 -1px 0 rgba(0,0,0,0.25);
            }
        }

        @keyframes lightsweep {
            0%   { left: -80%; }
            100% { left: 180%; }
        }

        /* ═══ TEXT GLOWS ═══ */
        .gold-glow {
            text-shadow: 0 0 22px rgba(246,199,30,0.35), 0 0 45px rgba(246,199,30,0.14);
        }
        .orange-glow {
            text-shadow: 0 0 28px rgba(232,151,63,0.5), 0 0 55px rgba(232,151,63,0.22), 0 0 90px rgba(232,151,63,0.08);
        }

        /* ═══ PATTERNS ═══ */
        .dot-pattern {
            background-image: radial-gradient(circle, rgba(207,154,52,0.045) 1px, transparent 1px);
            background-size: 22px 22px;
        }

        /* ═══ COMPONENTS ═══ */
        .icon-badge {
            background: rgba(207,154,52,0.07);
            border: 1px solid rgba(207,154,52,0.18);
            border-radius: 10px;
        }
        .neon-dot {
            box-shadow: 0 0 8px rgba(207,154,52,0.55);
        }
        .gradient-line {
            background: linear-gradient(90deg, rgba(207,154,52,0.65), rgba(207,154,52,0.08), transparent);
        }
        .frame-border {
            border: 1px solid rgba(207,154,52,0.07);
        }
        .ambient-glow {
            background: radial-gradient(circle at 48% 50%, rgba(207,154,52,0.055) 0%, rgba(207,154,52,0.015) 35%, transparent 65%);
        }
        .speaker-spotlight {
            background: radial-gradient(ellipse 55% 50% at 50% 42%, rgba(207,154,52,0.04) 0%, rgba(232,151,63,0.018) 35%, transparent 70%);
        }
        .vignette {
            background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.45) 100%);
        }

        /* Corner marks */
        .corner-marks::before {
            content: '';
            position: absolute;
            top: 6px; left: 6px;
            width: 14px; height: 14px;
            border-top: 1.5px solid rgba(207,154,52,0.2);
            border-left: 1.5px solid rgba(207,154,52,0.2);
            border-top-left-radius: 3px;
            pointer-events: none;
            z-index: 30;
        }
        .corner-marks::after {
            content: '';
            position: absolute;
            bottom: 6px; right: 6px;
            width: 14px; height: 14px;
            border-bottom: 1.5px solid rgba(207,154,52,0.2);
            border-right: 1.5px solid rgba(207,154,52,0.2);
            border-bottom-right-radius: 3px;
            pointer-events: none;
            z-index: 30;
        }

        /* Subtle pulse on bullet dots */
        .dot-pulse {
            animation: dotPulse 3s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 6px rgba(207,154,52,0.45); }
            50%      { box-shadow: 0 0 12px rgba(207,154,52,0.7); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- ═══════════════════════════════════════════
         VIDEO FRAME CONTAINER
    ═══════════════════════════════════════════ -->
    <div class="w-full max-w-[600px] aspect-video rounded-2xl overflow-hidden relative"
         style="box-shadow: 0 0 120px rgba(207,154,52,0.04), 0 50px 100px rgba(0,0,0,0.75);">

        <!-- Outer frame border -->
        <div class="absolute inset-0 rounded-2xl frame-border z-20 pointer-events-none"></div>

        <!-- Corner marks -->
        <div class="absolute inset-0 rounded-2xl corner-marks pointer-events-none"></div>

        <!-- ═══ SPLIT LAYOUT ═══ -->
        <div class="absolute inset-0 flex">

            <!-- ═══════════════════════════════
                 LEFT PANEL — CARD AREA
            ═══════════════════════════════ -->
            <div class="w-[52%] bg-dark relative flex items-center justify-center dot-pattern">

                <!-- Ambient glow behind card -->
                <div class="absolute inset-0 ambient-glow pointer-events-none"></div>

                <!-- ═══ GLASSMORPHISM CARD ═══ -->
                <div class="glass-card relative p-5 mx-4 w-full max-w-[260px]">

                    <!-- ── Icon Badges ── -->
                    <div class="flex gap-2.5 mb-4 relative z-10">
                        <!-- Book Icon -->
                        <div class="icon-badge w-9 h-9 flex items-center justify-center">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"
                                      stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M8 7h6M8 11h3"
                                      stroke="#CF9A34" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
                            </svg>
                        </div>
                        <!-- Brain Icon -->
                        <div class="icon-badge w-9 h-9 flex items-center justify-center">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 2C9.2 2 7 4 6.5 6.5C4.5 6.5 3 8.5 3 11c0 2 1.2 3.6 2.8 4.4V20a1 1 0 0 0 1 1h10.4a1 1 0 0 0 1-1v-4.6C19.8 14.6 21 13 21 11c0-2.5-1.5-4.5-3.5-4.5C17 4 14.8 2 12 2z"
                                      stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M12 2v20" stroke="#CF9A34" stroke-width="1" stroke-dasharray="2 2" opacity="0.4"/>
                                <circle cx="9.5" cy="9.5" r="0.7" fill="#CF9A34" opacity="0.5"/>
                                <circle cx="14.5" cy="9.5" r="0.7" fill="#CF9A34" opacity="0.5"/>
                            </svg>
                        </div>
                    </div>

                    <!-- ── Title Block ── -->
                    <div class="mb-3 relative z-10">
                        <p class="text-gold font-semibold uppercase gold-glow mb-1"
                           style="font-size: 9px; letter-spacing: 0.3em;">
                            Years of
                        </p>
                        <h2 class="text-orange font-black uppercase orange-glow leading-none"
                            style="font-size: 22px; letter-spacing: 0.08em;">
                            Learning
                        </h2>
                    </div>

                    <!-- ── Gradient Divider ── -->
                    <div class="gradient-line h-px w-14 mb-4 rounded-full relative z-10"></div>

                    <!-- ── Bullet Points ── -->
                    <ul class="space-y-2.5 relative z-10">
                        <li class="flex items-center gap-2.5">
                            <span class="w-[5px] h-[5px] rounded-full bg-neon neon-dot dot-pulse flex-shrink-0"></span>
                            <span class="text-white font-medium tracking-wide" style="font-size: 11px;">Storytelling</span>
                        </li>
                        <li class="flex items-center gap-2.5">
                            <span class="w-[5px] h-[5px] rounded-full bg-neon neon-dot dot-pulse flex-shrink-0" style="animation-delay: 0.4s;"></span>
                            <span class="text-white font-medium tracking-wide" style="font-size: 11px;">Hooks</span>
                        </li>
                        <li class="flex items-center gap-2.5">
                            <span class="w-[5px] h-[5px] rounded-full bg-neon neon-dot dot-pulse flex-shrink-0" style="animation-delay: 0.8s;"></span>
                            <span class="text-white font-medium tracking-wide" style="font-size: 11px;">Psychology</span>
                        </li>
                        <li class="flex items-center gap-2.5">
                            <span class="w-[5px] h-[5px] rounded-full bg-neon neon-dot dot-pulse flex-shrink-0" style="animation-delay: 1.2s;"></span>
                            <span class="text-white font-medium tracking-wide" style="font-size: 11px;">Audience Attention</span>
                        </li>
                    </ul>

                    <!-- ── Footer ── -->
                    <div class="mt-4 pt-3 border-t border-white/5 relative z-10">
                        <p class="uppercase font-medium"
                           style="color: rgba(169,173,177,0.35); font-size: 7px; letter-spacing: 0.25em;">
                            The Foundation
                        </p>
                    </div>
                </div>

                <!-- Decorative ambient dots -->
                <div class="absolute top-3.5 left-3.5 w-1.5 h-1.5 rounded-full pointer-events-none"
                     style="background: rgba(207,154,52,0.12);"></div>
                <div class="absolute bottom-3.5 left-3.5 w-1 h-1 rounded-full pointer-events-none"
                     style="background: rgba(232,151,63,0.1);"></div>
                <div class="absolute top-3.5 right-3 w-1 h-1 rounded-full pointer-events-none"
                     style="background: rgba(246,199,30,0.08);"></div>
                <div class="absolute bottom-3.5 right-3 w-1.5 h-1.5 rounded-full pointer-events-none"
                     style="background: rgba(207,154,52,0.08);"></div>
            </div>

            <!-- ═══════════════════════════════
                 RIGHT PANEL — SPEAKER AREA
            ═══════════════════════════════ -->
            <div class="w-[48%] relative"
                 style="background: linear-gradient(145deg, #070300 0%, #0D0700 25%, #150A01 55%, #1A0E02 100%);">

                <!-- Speaker spotlight -->
                <div class="absolute inset-0 speaker-spotlight pointer-events-none"></div>

                <!-- Vignette -->
                <div class="absolute inset-0 vignette pointer-events-none"></div>

                <!-- Subtle speaker silhouette -->
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <svg width="110" height="130" viewBox="0 0 110 130" fill="none" xmlns="http://www.w3.org/2000/svg"
                         style="opacity: 0.055;">
                        <ellipse cx="55" cy="38" rx="20" ry="24" stroke="#CF9A34" stroke-width="1.5"/>
                        <path d="M15 125C15 95 30 75 55 75C80 75 95 95 95 125" stroke="#CF9A34" stroke-width="1.5"/>
                    </svg>
                </div>

                <!-- Frame corner marks (right side) -->
                <div class="absolute top-3 right-3 w-3 h-3 pointer-events-none"
                     style="border-top: 1px solid rgba(207,154,52,0.08); border-right: 1px solid rgba(207,154,52,0.08);"></div>
                <div class="absolute bottom-3 left-3 w-3 h-3 pointer-events-none"
                     style="border-bottom: 1px solid rgba(207,154,52,0.08); border-left: 1px solid rgba(207,154,52,0.08);"></div>

                <!-- A-Roll label -->
                <div class="absolute bottom-2.5 right-3">
                    <span class="uppercase font-medium"
                          style="color: rgba(169,173,177,0.18); font-size: 7px; letter-spacing: 0.3em;">
                        A-Roll
                    </span>
                </div>
            </div>
        </div>

        <!-- Subtle grain overlay -->
        <div class="absolute inset-0 rounded-2xl pointer-events-none z-10"
             style="background-image: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.004) 3px, rgba(255,255,255,0.004) 4px), repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(255,255,255,0.004) 3px, rgba(255,255,255,0.004) 4px);">
        </div>
    </div>

</body>
</html>
