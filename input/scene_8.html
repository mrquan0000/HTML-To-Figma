<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First 24 Hours</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#200F00',
                        'brand-darker': '#150A01',
                        'brand-gold': '#F6C71E',
                        'brand-neon': '#CF9A34',
                        'brand-orange': '#E8973F',
                        'brand-deep-orange': '#D36708',
                        'brand-wood': '#542A06',
                        'brand-red': '#C21403',
                        'brand-green': '#35CC23',
                        'brand-gray': '#A9ADB1',
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                        'pop': ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes slideInLeft {
            0% {
                transform: translateX(-60px);
                opacity: 1;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            0% {
                opacity: 1;
                transform: translateY(14px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow:
                    0 0 20px rgba(207, 154, 52, 0.3),
                    0 0 45px rgba(207, 154, 52, 0.12),
                    0 0 80px rgba(207, 154, 52, 0.06),
                    inset 0 1px 1px rgba(207, 154, 52, 0.1);
            }
            50% {
                box-shadow:
                    0 0 30px rgba(207, 154, 52, 0.45),
                    0 0 65px rgba(207, 154, 52, 0.22),
                    0 0 110px rgba(207, 154, 52, 0.1),
                    inset 0 1px 1px rgba(207, 154, 52, 0.15);
            }
        }

        @keyframes titleGlow {
            0%, 100% {
                text-shadow:
                    0 0 10px rgba(246, 199, 30, 0.45),
                    0 0 25px rgba(246, 199, 30, 0.2);
            }
            50% {
                text-shadow:
                    0 0 16px rgba(246, 199, 30, 0.65),
                    0 0 35px rgba(246, 199, 30, 0.35),
                    0 0 55px rgba(246, 199, 30, 0.15);
            }
        }

        @keyframes lightsweep {
            0% { transform: translateX(-180%) skewX(-15deg); }
            100% { transform: translateX(280%) skewX(-15deg); }
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes borderShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .card-slide-in {
            animation: slideInLeft 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .glow-border {
            animation: glowPulse 3.2s ease-in-out infinite;
        }

        .title-glow {
            animation: titleGlow 2.8s ease-in-out infinite;
        }

        .icon-float {
            animation: iconFloat 3.5s ease-in-out infinite;
        }

        .text-enter-1 {
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }

        .text-enter-2 {
            animation: fadeInUp 0.6s ease-out 0.65s both;
        }

        .text-enter-3 {
            animation: fadeInUp 0.6s ease-out 0.9s both;
        }

        .dot-pulse {
            animation: dotPulse 2s ease-in-out infinite;
        }

        .lightsweep-effect {
            overflow: hidden;
            position: relative;
        }

        .lightsweep-effect::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 45%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(207, 154, 52, 0.05) 35%,
                rgba(246, 199, 30, 0.09) 50%,
                rgba(207, 154, 52, 0.05) 65%,
                transparent 100%
            );
            animation: lightsweep 5s ease-in-out infinite;
            animation-delay: 1.5s;
            pointer-events: none;
        }

        .neon-border-shimmer {
            background: linear-gradient(
                90deg,
                rgba(207, 154, 52, 0.55),
                rgba(246, 199, 30, 0.85),
                rgba(232, 151, 63, 0.65),
                rgba(207, 154, 52, 0.55)
            );
            background-size: 300% 100%;
            animation: borderShimmer 4.5s linear infinite;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
        }

        .glass-bg {
            background: rgba(32, 15, 0, 0.84);
            backdrop-filter: blur(22px) saturate(1.4);
            -webkit-backdrop-filter: blur(22px) saturate(1.4);
        }

        /* Hourglass rotation */
        @keyframes hourglassTilt {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(8deg); }
            75% { transform: rotate(-8deg); }
        }

        .hourglass-anim {
            animation: hourglassTilt 4s ease-in-out infinite;
        }

        /* Bullet dot glow */
        .bullet-dot {
            box-shadow: 0 0 8px rgba(207, 154, 52, 0.5), 0 0 16px rgba(207, 154, 52, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center overflow-hidden p-4" style="background: #150A01;">

    <!-- Background atmosphere -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute inset-0" style="background: radial-gradient(ellipse at 25% 50%, rgba(84, 42, 6, 0.12) 0%, transparent 55%);"></div>
        <div class="absolute inset-0" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 256 256%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noise%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noise)%22 opacity=%220.03%22/%3E%3C/svg%3E'); opacity: 0.35;"></div>
        <!-- Subtle warm glow from card area -->
        <div class="absolute top-1/2 left-1/4 -translate-y-1/2 -translate-x-1/2 w-96 h-96 rounded-full" style="background: radial-gradient(circle, rgba(207, 154, 52, 0.06) 0%, transparent 70%);"></div>
    </div>

    <!-- Split Grid Layout -->
    <div class="relative z-10 w-full flex" style="max-width: 1100px; margin: 0 auto;">

        <!-- LEFT HALF — Card Area -->
        <div class="w-1/2 flex items-center justify-center pr-6">
            <div class="card-slide-in w-full" style="max-width: 480px;">

                <!-- Outer neon border wrapper -->
                <div class="glow-border w-full rounded-3xl p-[1.5px] neon-border-shimmer">

                    <!-- Inner card with glassmorphism -->
                    <div class="glass-bg lightsweep-effect w-full rounded-3xl relative" style="border: 1px solid rgba(207, 154, 52, 0.12);">

                        <!-- Card Content -->
                        <div class="px-8 py-10 sm:px-10 sm:py-12 flex flex-col items-start text-left relative z-10">

                            <!-- Top Icon Row: Clock + Hourglass -->
                            <div class="text-enter-1 flex items-center gap-4 mb-7">
                                <!-- Clock Icon -->
                                <div class="icon-float flex items-center justify-center w-11 h-11 rounded-xl" style="background: linear-gradient(135deg, rgba(207, 154, 52, 0.15) 0%, rgba(32, 15, 0, 0.5) 100%); border: 1px solid rgba(207, 154, 52, 0.25);">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <circle cx="12" cy="12" r="10" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round"/>
                                        <polyline points="12,6 12,12 16,14" stroke="#F6C71E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </div>

                                <!-- Hourglass Icon -->
                                <div class="icon-float hourglass-anim flex items-center justify-center w-11 h-11 rounded-xl" style="background: linear-gradient(135deg, rgba(207, 154, 52, 0.15) 0%, rgba(32, 15, 0, 0.5) 100%); border: 1px solid rgba(207, 154, 52, 0.25); animation-delay: 0.8s;">
                                    <svg width="18" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M5 3h14v3.5a6.5 6.5 0 0 1-3.5 5.8A6.5 6.5 0 0 1 19 17.5V21H5v-3.5a6.5 6.5 0 0 1 3.5-5.8A6.5 6.5 0 0 1 5 6.5V3z" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        <line x1="9" y1="3" x2="9" y2="21" stroke="#CF9A34" stroke-width="0.5" opacity="0.4"/>
                                        <line x1="15" y1="3" x2="15" y2="21" stroke="#CF9A34" stroke-width="0.5" opacity="0.4"/>
                                    </svg>
                                </div>

                                <!-- Decorative dots -->
                                <div class="flex items-center gap-1.5 ml-auto">
                                    <div class="dot-pulse w-1 h-1 rounded-full" style="background: rgba(207, 154, 52, 0.4); animation-delay: 0s;"></div>
                                    <div class="dot-pulse w-1.5 h-1.5 rounded-full" style="background: rgba(207, 154, 52, 0.6); animation-delay: 0.3s;"></div>
                                    <div class="dot-pulse w-1 h-1 rounded-full" style="background: rgba(207, 154, 52, 0.4); animation-delay: 0.6s;"></div>
                                </div>
                            </div>

                            <!-- Decorative separator line -->
                            <div class="text-enter-1 w-full mb-6">
                                <div class="h-[1px] w-full" style="background: linear-gradient(90deg, rgba(207, 154, 52, 0.5), rgba(207, 154, 52, 0.1), transparent);"></div>
                            </div>

                            <!-- Title: FIRST 24 HOURS -->
                            <h1 class="text-enter-1 title-glow font-montserrat font-900 tracking-wider uppercase leading-none mb-8" style="color: #F6C71E; font-size: clamp(1.7rem, 4.5vw, 2.4rem); letter-spacing: 0.12em;">
                                FIRST 24 HOURS
                            </h1>

                            <!-- Bullet Points -->
                            <div class="flex flex-col gap-5 w-full">

                                <!-- Bullet 1 -->
                                <div class="text-enter-2 flex items-start gap-4">
                                    <div class="mt-2 flex-shrink-0 w-2.5 h-2.5 rounded-full bullet-dot" style="background: #CF9A34;"></div>
                                    <p class="font-pop font-500 leading-relaxed" style="color: rgba(255, 255, 255, 0.92); font-size: clamp(0.95rem, 2.5vw, 1.15rem);">
                                        <span class="font-700" style="color: #E8973F;">Crucial</span> for video performance
                                    </p>
                                </div>

                                <!-- Bullet 2 -->
                                <div class="text-enter-3 flex items-start gap-4">
                                    <div class="mt-2 flex-shrink-0 w-2.5 h-2.5 rounded-full bullet-dot" style="background: #CF9A34; animation-delay: 0.5s;"></div>
                                    <p class="font-pop font-500 leading-relaxed" style="color: rgba(255, 255, 255, 0.92); font-size: clamp(0.95rem, 2.5vw, 1.15rem);">
                                        <span class="font-700" style="color: #E8973F;">More important</span> than you think
                                    </p>
                                </div>
                            </div>

                            <!-- Bottom decorative separator -->
                            <div class="mt-8 w-full flex items-center gap-3">
                                <div class="h-[1px] flex-1" style="background: linear-gradient(90deg, rgba(207, 154, 52, 0.35), transparent);"></div>
                                <div class="flex items-center gap-2">
                                    <div class="w-1 h-1 rounded-full" style="background: rgba(207, 154, 52, 0.3);"></div>
                                    <div class="w-1.5 h-1.5 rounded-full" style="background: rgba(207, 154, 52, 0.5);"></div>
                                    <div class="w-1 h-1 rounded-full" style="background: rgba(207, 154, 52, 0.3);"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Corner accents -->
                        <div class="absolute top-4 left-4 w-5 h-5" style="border-top: 1.5px solid rgba(207, 154, 52, 0.25); border-left: 1.5px solid rgba(207, 154, 52, 0.25); border-top-left-radius: 8px;"></div>
                        <div class="absolute top-4 right-4 w-5 h-5" style="border-top: 1.5px solid rgba(207, 154, 52, 0.25); border-right: 1.5px solid rgba(207, 154, 52, 0.25); border-top-right-radius: 8px;"></div>
                        <div class="absolute bottom-4 left-4 w-5 h-5" style="border-bottom: 1.5px solid rgba(207, 154, 52, 0.25); border-left: 1.5px solid rgba(207, 154, 52, 0.25); border-bottom-left-radius: 8px;"></div>
                        <div class="absolute bottom-4 right-4 w-5 h-5" style="border-bottom: 1.5px solid rgba(207, 154, 52, 0.25); border-right: 1.5px solid rgba(207, 154, 52, 0.25); border-bottom-right-radius: 8px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT HALF — Speaker Area (empty for A-roll overlay) -->
        <div class="w-1/2 relative">
            <!-- Subtle ambient glow suggesting speaker presence -->
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-64 h-80 rounded-full" style="background: radial-gradient(ellipse, rgba(211, 103, 8, 0.04) 0%, transparent 70%);"></div>
            </div>
        </div>

    </div>

</body>
</html>
