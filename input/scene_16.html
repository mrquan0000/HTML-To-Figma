<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing Best Practices - Premium Card</title>
    <script src="https://cdn.tailtailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            warmAccent: '#E8973F',
                            deepOrange: '#D36708',
                            darkGlow: '#200F00',
                            brightYellow: '#F6C71E',
                            mutedGray: '#A9ADB1',
                            deepBlack: '#150A01',
                            warmWood: '#542A06',
                            alertRed: '#C21403',
                            neonGold: '#CF9A34',
                            positiveGreen: '#35CC23'
                        }
                    },
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #150A01;
            overflow: hidden;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: linear-gradient(135deg, rgba(32, 15, 0, 0.95) 0%, rgba(84, 42, 6, 0.85) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid rgba(207, 154, 52, 0.6);
            box-shadow: 
                0 0 30px rgba(207, 154, 52, 0.3),
                0 0 60px rgba(207, 154, 52, 0.15),
                inset 0 0 30px rgba(207, 154, 52, 0.05);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(207, 154, 52, 0.03) 25%,
                rgba(246, 199, 30, 0.06) 50%,
                rgba(207, 154, 52, 0.03) 75%,
                transparent 100%
            );
            animation: lightsweep 8s ease-in-out infinite;
        }

        @keyframes lightsweep {
            0% { transform: translateX(-30%); }
            100% { transform: translateX(30%); }
        }

        /* Neon glow pulse */
        .neon-glow {
            animation: glowPulse 4s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            0% {
                box-shadow: 
                    0 0 20px rgba(207, 154, 52, 0.25),
                    0 0 40px rgba(207, 154, 52, 0.1),
                    inset 0 0 20px rgba(207, 154, 52, 0.03);
            }
            100% {
                box-shadow: 
                    0 0 35px rgba(207, 154, 52, 0.4),
                    0 0 70px rgba(207, 154, 52, 0.2),
                    inset 0 0 35px rgba(207, 154, 52, 0.08);
            }
        }

        /* Title glow */
        .title-glow {
            text-shadow: 
                0 0 20px rgba(246, 199, 30, 0.5),
                0 0 40px rgba(246, 199, 30, 0.25),
                0 0 80px rgba(246, 199, 30, 0.1);
        }

        /* Keyword emphasis glow */
        .keyword-glow {
            text-shadow: 
                0 0 15px rgba(232, 151, 63, 0.6),
                0 0 30px rgba(232, 151, 63, 0.3);
        }

        /* Icon glow */
        .icon-glow {
            filter: drop-shadow(0 0 8px rgba(207, 154, 52, 0.5));
        }

        /* Slide in animation - starts visible, just adds transform */
        .slide-in {
            transform: translateX(0);
        }

        /* Decorative gradient orbs */
        .orb-1 {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(232, 151, 63, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
        }

        .orb-2 {
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(246, 199, 30, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(30px);
        }

        /* Speaker silhouette styling */
        .speaker-area {
            background: linear-gradient(135deg, #150A01 0%, #200F00 50%, #150A01 100%);
            position: relative;
        }

        .speaker-silhouette {
            background: linear-gradient(180deg, rgba(84, 42, 6, 0.4) 0%, rgba(207, 154, 52, 0.2) 100%);
            clip-path: polygon(30% 0%, 70% 0%, 75% 15%, 85% 25%, 80% 35%, 82% 50%, 78% 55%, 85% 65%, 75% 100%, 25% 100%, 15% 65%, 22% 55%, 18% 50%, 20% 35%, 15% 25%, 25% 15%);
        }

        /* Subtle border accent */
        .border-accent-top {
            background: linear-gradient(90deg, transparent 0%, #CF9A34 50%, transparent 100%);
            height: 2px;
        }
    </style>
</head>
<body class="font-montserrat">
    <div class="flex w-full h-screen max-w-[1400px] mx-auto">
        
        <!-- LEFT HALF - Dark Background with Card -->
        <div class="w-1/2 bg-brand-deepBlack relative flex items-center justify-center p-8">
            
            <!-- Decorative Background Orbs -->
            <div class="orb-1" style="top: 10%; left: 10%;"></div>
            <div class="orb-2" style="bottom: 20%; right: 20%;"></div>
            
            <!-- Subtle grid pattern -->
            <div class="absolute inset-0" style="background-image: radial-gradient(rgba(207, 154, 52, 0.03) 1px, transparent 1px); background-size: 30px 30px;"></div>
            
            <!-- MAIN CARD -->
            <div class="glass-card neon-glow rounded-2xl w-full max-w-[420px] relative z-10 slide-in">
                
                <!-- Top accent line -->
                <div class="border-accent-top w-full rounded-t-2xl"></div>
                
                <!-- Card Content -->
                <div class="p-8">
                    
                    <!-- Icon + Category Badge -->
                    <div class="flex items-center gap-3 mb-6">
                        <!-- Refresh Icon -->
                        <div class="w-10 h-10 rounded-xl bg-brand-darkGlow border border-brand-neonGold/30 flex items-center justify-center icon-glow">
                            <svg class="w-5 h-5 text-brand-brightYellow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                            </svg>
                        </div>
                        <span class="text-brand-mutedGray text-xs font-medium uppercase tracking-widest">Strategy #1</span>
                    </div>
                    
                    <!-- TITLE -->
                    <h1 class="text-brand-brightYellow title-glow text-2xl sm:text-3xl font-extrabold uppercase tracking-wide leading-tight mb-8">
                        TESTING<br>BEST PRACTICES
                    </h1>
                    
                    <!-- Divider -->
                    <div class="w-16 h-1 bg-gradient-to-r from-brand-neonGold to-brand-warmAccent rounded-full mb-8"></div>
                    
                    <!-- BULLET POINTS -->
                    <div class="space-y-5">
                        
                        <!-- Bullet 1: Change 1-2 times MAX -->
                        <div class="flex items-start gap-4">
                            <div class="mt-1 flex-shrink-0">
                                <div class="w-8 h-8 rounded-lg bg-brand-deepOrange/20 border border-brand-deepOrange/40 flex items-center justify-center">
                                    <!-- Refresh Icon small -->
                                    <svg class="w-4 h-4 text-brand-warmAccent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                                    </svg>
                                </div>
                            </div>
                            <div>
                                <p class="text-white/95 text-sm sm:text-base font-semibold leading-relaxed">
                                    Change 1-2 times <span class="text-brand-brightYellow font-bold">MAX</span>
                                </p>
                                <p class="text-brand-mutedGray text-xs mt-1 leading-relaxed">
                                    Don't endlessly change title &amp; thumbnail
                                </p>
                            </div>
                        </div>
                        
                        <!-- Bullet 2: Learn & Move On -->
                        <div class="flex items-start gap-4">
                            <div class="mt-1 flex-shrink-0">
                                <div class="w-8 h-8 rounded-lg bg-brand-warmAccent/20 border border-brand-warmAccent/40 flex items-center justify-center">
                                    <!-- Book Icon -->
                                    <svg class="w-4 h-4 text-brand-warmAccent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                                    </svg>
                                </div>
                            </div>
                            <div>
                                <p class="text-sm sm:text-base font-semibold leading-relaxed">
                                    <span class="text-white/95">Just </span>
                                    <span class="text-brand-warmAccent keyword-glow font-extrabold uppercase tracking-wide">Learn &amp; Move On</span>
                                </p>
                                <p class="text-brand-mutedGray text-xs mt-1 leading-relaxed">
                                    Apply lessons to your next upload
                                </p>
                            </div>
                        </div>
                        
                    </div>
                    
                    <!-- Bottom Quote / Subtext -->
                    <div class="mt-8 pt-6 border-t border-brand-neonGold/15">
                        <div class="flex items-start gap-3">
                            <svg class="w-4 h-4 text-brand-warmAccent/60 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10H14.017zM0 21v-7.391c0-5.704 3.748-9.57 9-10.609L9.996 5.151C7.563 6.068 6 8.789 6 11h4v10H0z"/>
                            </svg>
                            <p class="text-brand-mutedGray/70 text-xs italic leading-relaxed">
                                Don't just keep changing your title and thumbnail endlessly. Learn from it and then move on to your next upload.
                            </p>
                        </div>
                    </div>
                    
                </div>
            </div>
            
        </div>
        
        <!-- RIGHT HALF - Speaker Area -->
        <div class="w-1/2 speaker-area relative flex items-center justify-center overflow-hidden">
            
            <!-- Subtle gradient overlay -->
            <div class="absolute inset-0" style="background: linear-gradient(270deg, rgba(21, 10, 1, 0.3) 0%, transparent 50%);"></div>
            
            <!-- Speaker Placeholder -->
            <div class="relative w-full h-full flex items-center justify-center">
                
                <!-- Speaker silhouette shape -->
                <div class="w-48 h-72 sm:w-56 sm:h-80 relative">
                    
                    <!-- Head/Body silhouette placeholder -->
                    <div class="absolute inset-0 flex flex-col items-center justify-end pb-8">
                        
                        <!-- Head circle -->
                        <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-gradient-to-b from-brand-warmWood/30 to-brand-deepOrange/20 border-2 border-brand-neonGold/20 mb-4"></div>
                        
                        <!-- Body shape -->
                        <div class="w-32 h-40 sm:w-36 sm:h-48 rounded-t-full bg-gradient-to-b from-brand-warmWood/25 to-brand-darkGlow/50 border-t-2 border-x-2 border-brand-neonGold/15"></div>
                    </div>
                    
                    <!-- Speaking indicator dots -->
                    <div class="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-2">
                        <div class="w-2 h-2 rounded-full bg-brand-positiveGreen" style="animation: pulse 1.5s ease-in-out infinite;"></div>
                        <div class="w-2 h-2 rounded-full bg-brand-positiveGreen" style="animation: pulse 1.5s ease-in-out infinite 0.2s;"></div>
                        <div class="w-2 h-2 rounded-full bg-brand-positiveGreen" style="animation: pulse 1.5s ease-in-out infinite 0.4s;"></div>
                    </div>
                    
                </div>
                
                <!-- "SPEAKER" label -->
                <div class="absolute bottom-8 left-1/2 -translate-x-1/2">
                    <span class="text-brand-mutedGray/40 text-[10px] uppercase tracking-[0.3em] font-semibold">Speaker / A-Roll</span>
                </div>
                
            </div>
            
            <!-- Ambient light from card -->
            <div class="absolute left-0 top-1/2 -translate-y-1/2 w-32 h-64 bg-brand-neonGold/5 blur-3xl"></div>
            
        </div>
        
    </div>

    <style>
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</body>
</html>
