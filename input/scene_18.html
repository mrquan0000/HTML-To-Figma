<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVOID RANDOM CONTENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orangeLight: '#E8973F',
                            orangeDark: '#D36708',
                            bgWarmGlow: '#200F00',
                            yellowBright: '#F6C71E',
                            glassGray: '#A9ADB1',
                            bgBlack: '#150A01',
                            woodWarm: '#542A06',
                            redAccent: '#C21403',
                            neonGold: '#CF9A34',
                            greenPositive: '#35CC23',
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'neon-gold': '0 0 15px rgba(207, 154, 52, 0.5), 0 0 30px rgba(207, 154, 52, 0.25), 0 0 60px rgba(207, 154, 52, 0.1)',
                        'neon-gold-strong': '0 0 20px rgba(207, 154, 52, 0.6), 0 0 40px rgba(207, 154, 52, 0.35), 0 0 80px rgba(207, 154, 52, 0.15)',
                        'inner-glow': 'inset 0 1px 1px rgba(207, 154, 52, 0.1)',
                        'card-deep': '0 25px 50px -12px rgba(0, 0, 0, 0.6), 0 0 30px rgba(207, 154, 52, 0.2)',
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #150A01;
            overflow-x: hidden;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: linear-gradient(
                135deg,
                rgba(32, 15, 0, 0.85) 0%,
                rgba(32, 15, 0, 0.7) 50%,
                rgba(32, 15, 0, 0.85) 100%
            );
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid rgba(207, 154, 52, 0.4);
            box-shadow:
                0 0 15px rgba(207, 154, 52, 0.35),
                0 0 30px rgba(207, 154, 52, 0.15),
                0 0 60px rgba(207, 154, 52, 0.08),
                inset 0 1px 0 rgba(207, 154, 52, 0.15),
                inset 0 -1px 0 rgba(0, 0, 0, 0.3),
                0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(207, 154, 52, 0.6) 30%,
                rgba(246, 199, 30, 0.8) 50%,
                rgba(207, 154, 52, 0.6) 70%,
                transparent 100%
            );
            border-radius: 16px 16px 0 0;
        }

        /* Lightsweep Animation */
        .lightsweep {
            position: relative;
            overflow: hidden;
        }

        .lightsweep::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(207, 154, 52, 0.06) 40%,
                rgba(246, 199, 30, 0.1) 50%,
                rgba(207, 154, 52, 0.06) 60%,
                transparent 100%
            );
            animation: lightsweep 4s ease-in-out infinite;
        }

        @keyframes lightsweep {
            0% { left: -100%; }
            50% { left: 150%; }
            100% { left: 150%; }
        }

        /* Glow Pulse for Title */
        .title-glow {
            text-shadow:
                0 0 10px rgba(246, 199, 30, 0.4),
                0 0 20px rgba(246, 199, 30, 0.2),
                0 0 40px rgba(246, 199, 30, 0.1);
        }

        /* Red text glow */
        .red-glow {
            text-shadow:
                0 0 8px rgba(194, 20, 3, 0.5),
                0 0 16px rgba(194, 20, 3, 0.25);
        }

        /* Bullet dot styling */
        .bullet-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: linear-gradient(135deg, #CF9A34, #F6C71E);
            box-shadow: 0 0 6px rgba(207, 154, 52, 0.5);
            flex-shrink: 0;
        }

        /* Speaker placeholder gradient */
        .speaker-zone {
            background: linear-gradient(
                180deg,
                rgba(32, 15, 0, 0.3) 0%,
                rgba(21, 10, 1, 0.6) 100%
            );
        }

        /* Subtle noise texture overlay */
        .noise-overlay {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        }

        /* Icon glow */
        .icon-glow {
            filter: drop-shadow(0 0 4px rgba(207, 154, 52, 0.5));
        }

        /* Corner accent lines */
        .corner-accent {
            position: absolute;
            width: 24px;
            height: 24px;
            border-color: rgba(207, 154, 52, 0.4);
        }

        .corner-accent.top-left {
            top: 12px;
            left: 12px;
            border-top: 2px solid;
            border-left: 2px solid;
            border-color: rgba(207, 154, 52, 0.4);
        }

        .corner-accent.bottom-right {
            bottom: 12px;
            right: 12px;
            border-bottom: 2px solid;
            border-right: 2px solid;
            border-color: rgba(207, 154, 52, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-brand-bgBlack font-inter">

    <!-- Main Container - Split Grid Layout -->
    <div class="w-full max-w-[1200px] max-h-[680px] relative rounded-2xl overflow-hidden flex" style="height: 680px;">

        <!-- Left Half - Card Area -->
        <div class="relative w-[55%] bg-brand-bgBlack flex items-center justify-center p-8 overflow-hidden">
            <!-- Background ambient glow -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] rounded-full opacity-30"
                 style="background: radial-gradient(circle, rgba(207, 154, 52, 0.12) 0%, rgba(32, 15, 0, 0.3) 50%, transparent 70%);">
            </div>

            <!-- Decorative grid lines -->
            <div class="absolute inset-0 opacity-5"
                 style="background-image: linear-gradient(rgba(207, 154, 52, 0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(207, 154, 52, 0.3) 1px, transparent 1px); background-size: 40px 40px;">
            </div>

            <!-- THE CARD -->
            <div class="glass-card lightsweep relative w-full max-w-[480px] rounded-2xl p-8 z-10">

                <!-- Corner accents -->
                <div class="corner-accent top-left"></div>
                <div class="corner-accent bottom-right"></div>

                <!-- Top decorative bar -->
                <div class="flex items-center gap-2 mb-6">
                    <div class="h-[2px] flex-1 rounded-full" style="background: linear-gradient(90deg, rgba(207, 154, 52, 0.6), transparent);"></div>
                    <span class="material-icons-outlined text-brand-neonGold icon-glow text-lg">shuffle</span>
                    <div class="h-[2px] flex-1 rounded-full" style="background: linear-gradient(90deg, transparent, rgba(207, 154, 52, 0.6));"></div>
                </div>

                <!-- Title -->
                <h1 class="title-glow text-brand-yellowBright text-3xl lg:text-4xl font-extrabold tracking-wide text-center leading-tight mb-8 uppercase">
                    AVOID<br>Random Content
                </h1>

                <!-- Divider with glow -->
                <div class="h-[1px] w-full mb-7 rounded-full"
                     style="background: linear-gradient(90deg, transparent, rgba(207, 154, 52, 0.5), transparent);">
                </div>

                <!-- Bullet Points Section -->
                <div class="space-y-4 mb-7">
                    <!-- Motivation -->
                    <div class="flex items-center gap-4">
                        <div class="bullet-dot"></div>
                        <span class="text-white text-lg font-semibold tracking-wide">Motivation</span>
                        <div class="flex-1 h-[1px] opacity-20" style="background: linear-gradient(90deg, rgba(255,255,255,0.3), transparent);"></div>
                        <span class="material-icons-outlined text-brand-neonGold opacity-60 text-sm">bolt</span>
                    </div>

                    <!-- Vlogs -->
                    <div class="flex items-center gap-4">
                        <div class="bullet-dot"></div>
                        <span class="text-white text-lg font-semibold tracking-wide">Vlogs</span>
                        <div class="flex-1 h-[1px] opacity-20" style="background: linear-gradient(90deg, rgba(255,255,255,0.3), transparent);"></div>
                        <span class="material-icons-outlined text-brand-neonGold opacity-60 text-sm">videocam</span>
                    </div>

                    <!-- Reactions -->
                    <div class="flex items-center gap-4">
                        <div class="bullet-dot"></div>
                        <span class="text-white text-lg font-semibold tracking-wide">Reactions</span>
                        <div class="flex-1 h-[1px] opacity-20" style="background: linear-gradient(90deg, rgba(255,255,255,0.3), transparent);"></div>
                        <span class="material-icons-outlined text-brand-neonGold opacity-60 text-sm">emoji_emotions</span>
                    </div>

                    <!-- Business Content -->
                    <div class="flex items-center gap-4">
                        <div class="bullet-dot"></div>
                        <span class="text-white text-lg font-semibold tracking-wide">Business Content</span>
                        <div class="flex-1 h-[1px] opacity-20" style="background: linear-gradient(90deg, rgba(255,255,255,0.3), transparent);"></div>
                        <span class="material-icons-outlined text-brand-neonGold opacity-60 text-sm">trending_up</span>
                    </div>
                </div>

                <!-- Divider -->
                <div class="h-[1px] w-full mb-7 rounded-full"
                     style="background: linear-gradient(90deg, transparent, rgba(194, 20, 3, 0.5), transparent);">
                </div>

                <!-- Warning Section - Confuses Algorithm -->
                <div class="flex items-center justify-center gap-3 bg-brand-redAccent bg-opacity-10 rounded-xl px-5 py-4 border border-brand-redAccent border-opacity-20"
                     style="background: rgba(194, 20, 3, 0.1); border-color: rgba(194, 20, 3, 0.25);">
                    <span class="material-icons-outlined text-brand-redAccent icon-glow text-2xl"
                          style="filter: drop-shadow(0 0 6px rgba(194, 20, 3, 0.6));">warning_amber</span>
                    <span class="red-glow text-brand-redAccent text-xl font-bold tracking-wider uppercase">
                        Confuses Algorithm
                    </span>
                    <span class="material-icons-outlined text-brand-redAccent icon-glow text-xl"
                          style="filter: drop-shadow(0 0 6px rgba(194, 20, 3, 0.6));">help_outline</span>
                </div>

                <!-- Bottom decorative bar -->
                <div class="flex items-center gap-2 mt-6">
                    <div class="h-[1px] flex-1 rounded-full" style="background: linear-gradient(90deg, transparent, rgba(207, 154, 52, 0.3));"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-brand-neonGold opacity-40"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-brand-neonGold opacity-60"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-brand-neonGold opacity-40"></div>
                    <div class="h-[1px] flex-1 rounded-full" style="background: linear-gradient(90deg, rgba(207, 154, 52, 0.3), transparent);"></div>
                </div>
            </div>
        </div>

        <!-- Right Half - Speaker Zone (A-roll placeholder) -->
        <div class="relative w-[45%] speaker-zone flex items-end justify-center overflow-hidden">
            <!-- Subtle gradient overlay -->
            <div class="absolute inset-0"
                 style="background: linear-gradient(135deg, rgba(32, 15, 0, 0.4) 0%, rgba(21, 10, 1, 0.7) 100%);">
            </div>

            <!-- Speaker silhouette placeholder -->
            <div class="relative z-10 flex flex-col items-center mb-12">
                <!-- Abstract person shape -->
                <div class="w-32 h-32 rounded-full border-2 border-brand-neonGold border-opacity-20 flex items-center justify-center mb-4"
                     style="background: linear-gradient(180deg, rgba(84, 42, 6, 0.4), rgba(32, 15, 0, 0.6));
                            box-shadow: 0 0 30px rgba(207, 154, 52, 0.1);">
                    <span class="material-icons-outlined text-brand-neonGold text-5xl opacity-30">person</span>
                </div>
                <span class="text-brand-glassGray text-xs uppercase tracking-[0.2em] opacity-40 font-medium">Speaker Position</span>
                <!-- Direction arrow pointing left -->
                <div class="mt-3 opacity-20">
                    <span class="material-icons-outlined text-brand-neonGold text-sm">arrow_back</span>
                </div>
            </div>

            <!-- Vertical accent line -->
            <div class="absolute left-0 top-[15%] bottom-[15%] w-[1px]"
                 style="background: linear-gradient(180deg, transparent, rgba(207, 154, 52, 0.15), transparent);">
            </div>
        </div>
    </div>

</body>
</html>
