<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power of Strong Hooks — Card Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'warm-accent': '#E8973F',
                        'deep-orange': '#D36708',
                        'dark-glow': '#200F00',
                        'bright-yellow': '#F6C71E',
                        'glass-gray': '#A9ADB1',
                        'deep-black': '#150A01',
                        'warm-wood': '#542A06',
                        'red-accent': '#C21403',
                        'neon-gold': '#CF9A34',
                        'positive-green': '#35CC23',
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Glassmorphism Card ── */
        .glass-card {
            background: linear-gradient(160deg, rgba(32,15,0,0.94) 0%, rgba(32,15,0,0.86) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1.5px solid rgba(207,154,52,0.42);
            box-shadow:
                0 0 12px rgba(207,154,52,0.18),
                0 0 40px rgba(207,154,52,0.07),
                0 12px 40px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.04),
                inset 0 0 30px rgba(207,154,52,0.015);
            position: relative;
            overflow: hidden;
        }

        /* ── Lightsweep ── */
        .glass-card::before {
            content: '';
            position: absolute;
            top: -120%; left: -120%;
            width: 340%; height: 340%;
            background: linear-gradient(42deg,
                transparent 30%,
                rgba(207,154,52,0.02) 40%,
                rgba(207,154,52,0.06) 50%,
                rgba(207,154,52,0.02) 60%,
                transparent 70%);
            animation: lightsweep 5s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes lightsweep {
            0%,100% { transform: translate(-18%,-18%); }
            50%     { transform: translate(18%,18%); }
        }

        /* ── Glow Breathing ── */
        .glow-breathe { animation: glowBreathe 4.5s ease-in-out infinite; }
        @keyframes glowBreathe {
            0%,100% {
                box-shadow:
                    0 0 12px rgba(207,154,52,0.18),
                    0 0 40px rgba(207,154,52,0.07),
                    0 12px 40px rgba(0,0,0,0.5),
                    inset 0 1px 0 rgba(255,255,255,0.04);
            }
            50% {
                box-shadow:
                    0 0 20px rgba(207,154,52,0.28),
                    0 0 56px rgba(207,154,52,0.11),
                    0 12px 40px rgba(0,0,0,0.5),
                    inset 0 1px 0 rgba(255,255,255,0.06);
            }
        }

        /* ── Text Glows ── */
        .title-glow {
            text-shadow:
                0 0 8px rgba(246,199,30,0.55),
                0 0 22px rgba(246,199,30,0.22),
                0 0 44px rgba(246,199,30,0.08);
        }
        .accent-text-glow {
            text-shadow:
                0 0 6px rgba(232,151,63,0.45),
                0 0 14px rgba(232,151,63,0.18);
        }

        /* ── Icon Glow ── */
        .icon-glow { filter: drop-shadow(0 0 5px rgba(207,154,52,0.38)); }

        /* ── Gradient Divider ── */
        .divider-fade {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(207,154,52,0.38), transparent);
        }

        /* ── Ambient Orb ── */
        .ambient-orb { position: absolute; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>

    <!-- ═══════════════ MAIN CONTAINER ═══════════════ -->
    <div class="w-full max-w-[600px] relative">

        <!-- Video Frame -->
        <div class="relative flex overflow-hidden aspect-video"
             style="border-radius:16px; background:#150A01; border:1px solid rgba(207,154,52,0.06);">

            <!-- ──── LEFT HALF (55 %): Card Area ──── -->
            <div class="relative flex items-center justify-center"
                 style="width:55%; padding:14px 16px;">

                <!-- Ambient orbs -->
                <div class="ambient-orb" style="width:160px;height:160px;top:-10px;left:-20px;
                     background:radial-gradient(circle,rgba(207,154,52,0.065) 0%,transparent 70%);"></div>
                <div class="ambient-orb" style="width:110px;height:110px;bottom:-10px;right:-10px;
                     background:radial-gradient(circle,rgba(232,151,63,0.045) 0%,transparent 70%);"></div>

                <!-- ══════════ THE CARD ══════════ -->
                <div class="glass-card glow-breathe w-full"
                     style="border-radius:16px; padding:18px 16px; max-width:276px;">

                    <div class="relative z-10">

                        <!-- Brain Icon -->
                        <div class="flex justify-center" style="margin-bottom:10px;">
                            <div class="icon-glow">
                                <svg width="36" height="36" viewBox="0 0 36 36" fill="none"
                                     stroke="#CF9A34" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M10 14C7 14 5 16.5 5 19.5c0 2.5 1.5 4.5 4 5.2V28c0 1.7 1.3 3 3 3"/>
                                    <path d="M26 14c3 0 5 2.5 5 5.5 0 2.5-1.5 4.5-4 5.2V28c0 1.7-1.3 3-3 3"/>
                                    <path d="M10 14c0-3.3 3-6 7-6s7 2.7 7 6"/>
                                    <path d="M13 31h10"/>
                                    <line x1="18" y1="8" x2="18" y2="31" stroke-width="1.2" opacity="0.3"/>
                                    <path d="M12 18c2-1 4-1 6 0" stroke-width="1.5"/>
                                    <path d="M24 18c-2-1-4-1-6 0" stroke-width="1.5"/>
                                </svg>
                            </div>
                        </div>

                        <!-- Title -->
                        <h1 class="title-glow text-center font-black uppercase leading-tight"
                            style="color:#F6C71E; font-size:15px; letter-spacing:0.12em; margin-bottom:10px;">
                            POWER OF<br>STRONG HOOKS
                        </h1>

                        <!-- Divider -->
                        <div class="divider-fade" style="margin:0 12px 12px;"></div>

                        <!-- Bullet Points -->
                        <div style="display:flex; flex-direction:column; gap:9px; margin-bottom:12px;">

                            <!-- Creates Curiosity -->
                            <div class="flex items-center" style="gap:9px;">
                                <div class="icon-glow flex-shrink-0">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                        <circle cx="12" cy="12" r="9.5" stroke="#CF9A34" stroke-width="1.5"/>
                                        <path d="M9.5 10.5a3 3 0 0 1 5.5 1.5c0 1.2-1 1.8-2 2.2-.5.2-.8.6-.8 1.3"
                                              stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round"/>
                                        <circle cx="12.2" cy="17.5" r="0.9" fill="#CF9A34"/>
                                    </svg>
                                </div>
                                <span class="font-semibold" style="color:#FFFFFF; font-size:11.5px; letter-spacing:0.02em;">
                                    Creates Curiosity
                                </span>
                            </div>

                            <!-- Information Gap -->
                            <div class="flex items-center" style="gap:9px;">
                                <div class="icon-glow flex-shrink-0">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                        <circle cx="12" cy="12" r="9.5" stroke="#CF9A34" stroke-width="1.5"/>
                                        <path d="M9.5 10.5a3 3 0 0 1 5.5 1.5c0 1.2-1 1.8-2 2.2-.5.2-.8.6-.8 1.3"
                                              stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round"/>
                                        <circle cx="12.2" cy="17.5" r="0.9" fill="#CF9A34"/>
                                    </svg>
                                </div>
                                <span class="font-semibold" style="color:#FFFFFF; font-size:11.5px; letter-spacing:0.02em;">
                                    Information Gap
                                </span>
                            </div>

                        </div>

                        <!-- Brain seeks answers -->
                        <p class="accent-text-glow text-center font-bold"
                           style="color:#E8973F; font-size:12.5px; letter-spacing:0.04em; margin-bottom:10px;">
                            Brain seeks answers
                        </p>

                        <!-- Thin divider -->
                        <div class="divider-fade" style="margin:0 18px 8px;"></div>

                        <!-- Quote -->
                        <p class="text-center"
                           style="color:rgba(255,255,255,0.35); font-size:9.5px; line-height:1.55; font-style:italic;">
                            &ldquo;They create an information gap, and the brain wants to
                            answer what that question is all about.&rdquo;
                        </p>

                    </div>
                </div>
                <!-- /Card -->
            </div>
            <!-- /Left Half -->

            <!-- ──── RIGHT HALF (45 %): Speaker / A-Roll ──── -->
            <div class="relative"
                 style="width:45%; background:linear-gradient(160deg,#200F00 0%,#150A01 100%);">

                <!-- Spotlight on speaker -->
                <div class="ambient-orb" style="width:180px;height:220px;bottom:0;right:15%;
                     background:radial-gradient(ellipse,rgba(207,154,52,0.04) 0%,transparent 65%);"></div>

                <!-- Speaker silhouette placeholder -->
                <div class="absolute" style="bottom:0; right:20px; display:flex; flex-direction:column; align-items:center;">
                    <div style="width:30px;height:30px;border-radius:50%;background:rgba(207,154,52,0.035);"></div>
                    <div style="width:58px;height:55px;border-radius:29px 29px 0 0;background:rgba(207,154,52,0.025);margin-top:-5px;"></div>
                </div>

                <!-- Label -->
                <div class="absolute" style="bottom:6px;right:10px;
                     color:rgba(255,255,255,0.09);font-size:7px;font-weight:700;
                     letter-spacing:0.18em;text-transform:uppercase;">
                    A-ROLL
                </div>
            </div>
            <!-- /Right Half -->

        </div>
        <!-- /Video Frame -->

        <!-- Outer ambient glow -->
        <div class="absolute inset-0 pointer-events-none"
             style="border-radius:16px; box-shadow:0 0 80px rgba(207,154,52,0.035);"></div>
    </div>
    <!-- /Main Container -->

</body>
</html>
