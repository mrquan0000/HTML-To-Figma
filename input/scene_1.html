<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout C – The Overlay Pop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            amber: '#E8973F',
                            orange: '#D36708',
                            glowBg: '#200F00',
                            yellow: '#F6C71E',
                            glass: '#A9ADB1',
                            black: '#150A01',
                            wood: '#542A06',
                            red: '#C21403',
                            gold: '#CF9A34',
                            green: '#35CC23',
                        }
                    },
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif'],
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #150A01;
            overflow: hidden;
        }

        /* Glow pulse animation for the card */
        @keyframes glowPulse {
            0%, 100% {
                box-shadow:
                    0 0 30px rgba(232, 151, 63, 0.4),
                    0 0 60px rgba(232, 151, 63, 0.2),
                    0 8px 32px rgba(0, 0, 0, 0.5),
                    inset 0 0 20px rgba(232, 151, 63, 0.05);
            }
            50% {
                box-shadow:
                    0 0 50px rgba(232, 151, 63, 0.6),
                    0 0 100px rgba(232, 151, 63, 0.3),
                    0 8px 32px rgba(0, 0, 0, 0.5),
                    inset 0 0 30px rgba(232, 151, 63, 0.1);
            }
        }

        /* Subtle float animation */
        @keyframes floatUp {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        /* Number count shimmer */
        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }
            100% {
                background-position: 200% center;
            }
        }

        /* Lightsweep across the card */
        @keyframes lightsweep {
            0% {
                left: -100%;
            }
            100% {
                left: 200%;
            }
        }

        /* Pop-in animation for the card */
        @keyframes popIn {
            0% {
                transform: scale(0.85) translateY(20px);
                opacity: 1;
            }
            60% {
                transform: scale(1.05) translateY(-4px);
                opacity: 1;
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        /* Ring pulse for the speaker area */
        @keyframes ringPulse {
            0%, 100% {
                box-shadow:
                    0 0 0 0 rgba(232, 151, 63, 0.3),
                    0 0 0 0 rgba(232, 151, 63, 0.1);
            }
            50% {
                box-shadow:
                    0 0 0 12px rgba(232, 151, 63, 0),
                    0 0 0 24px rgba(232, 151, 63, 0);
            }
        }

        /* Background ambient glow */
        @keyframes ambientGlow {
            0%, 100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        .card-glass {
            background: linear-gradient(
                135deg,
                rgba(169, 173, 177, 0.08) 0%,
                rgba(232, 151, 63, 0.06) 50%,
                rgba(169, 173, 177, 0.04) 100%
            );
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(207, 154, 52, 0.25);
            animation: glowPulse 3s ease-in-out infinite, floatUp 4s ease-in-out infinite;
        }

        .card-glass::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(232, 151, 63, 0.08),
                transparent
            );
            animation: lightsweep 4s ease-in-out infinite;
            pointer-events: none;
        }

        .number-text {
            background: linear-gradient(
                90deg,
                #E8973F 0%,
                #F6C71E 30%,
                #E8973F 50%,
                #F6C71E 70%,
                #E8973F 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
            filter: drop-shadow(0 0 20px rgba(232, 151, 63, 0.5));
        }

        .pop-in {
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .ambient-orb {
            animation: ambientGlow 5s ease-in-out infinite;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen font-poppins relative overflow-hidden">

    <!-- Ambient background orbs -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <!-- Large warm glow behind speaker -->
        <div class="absolute ambient-orb"
             style="width: 400px; height: 400px; border-radius: 50%;
                    background: radial-gradient(circle, rgba(232,151,63,0.12) 0%, rgba(20,10,1,0) 70%);
                    top: 50%; left: 35%; transform: translate(-50%, -50%);">
        </div>
        <!-- Smaller amber accent glow near card area -->
        <div class="absolute ambient-orb"
             style="width: 300px; height: 300px; border-radius: 50%;
                    background: radial-gradient(circle, rgba(232,151,63,0.1) 0%, rgba(20,10,1,0) 70%);
                    top: 30%; right: 10%; transform: translate(50%, -50%);
                    animation-delay: 2s;">
        </div>
        <!-- Subtle wood-tone bottom glow -->
        <div class="absolute"
             style="width: 100%; height: 200px; bottom: 0; left: 0;
                    background: linear-gradient(to top, rgba(84,42,6,0.15) 0%, transparent 100%);">
        </div>
    </div>

    <!-- Main Container -->
    <div class="relative w-full mx-auto px-4" style="max-width: 600px; height: 85vh; min-height: 500px; max-height: 800px;">

        <!-- Speaker Silhouette (A-Roll placeholder, centered) -->
        <div class="absolute inset-0 flex items-end justify-center pb-8">
            <div class="relative flex flex-col items-center">
                <!-- Speaker body silhouette -->
                <div class="relative">
                    <!-- Head -->
                    <div class="rounded-full mx-auto ring-2 ring-brand-gold/20 ring-offset-4 ring-offset-brand-black"
                         style="width: 80px; height: 80px;
                                background: linear-gradient(135deg, #3a2a1a 0%, #1a0e04 100%);
                                box-shadow: 0 0 0 4px rgba(84,42,6,0.3), 0 0 30px rgba(232,151,63,0.15);
                                animation: ringPulse 3s ease-in-out infinite;">
                    </div>
                    <!-- Shoulders / Upper body -->
                    <div class="mx-auto -mt-2 rounded-t-3xl"
                         style="width: 160px; height: 100px;
                                background: linear-gradient(180deg, #2a1a0a 0%, #150a01 100%);
                                border-top: 2px solid rgba(207,154,52,0.1);">
                    </div>
                </div>
                <!-- Speaker label -->
                <div class="mt-3 px-4 py-1.5 rounded-full"
                     style="background: rgba(84,42,6,0.4);
                            border: 1px solid rgba(207,154,52,0.15);
                            backdrop-filter: blur(10px);">
                    <span class="text-xs font-montserrat font-semibold tracking-widest uppercase"
                          style="color: rgba(232,151,63,0.7);">
                        Speaker
                    </span>
                </div>
            </div>
        </div>

        <!-- Glassmorphism Card – Floating to the right -->
        <div class="absolute pop-in"
             style="top: 50%; right: 0; transform: translateY(-55%); z-index: 10;">
            <div class="card-glass relative overflow-hidden rounded-3xl p-6"
                 style="width: 260px; min-height: 220px;">

                <!-- Inner glow accent line at top -->
                <div class="absolute top-0 left-1/2 -translate-x-1/2 rounded-full"
                     style="width: 60px; height: 3px; top: 8px;
                            background: linear-gradient(90deg, transparent, #E8973F, #F6C71E, #E8973F, transparent);
                            filter: blur(1px);">
                </div>

                <!-- YouTube Icon -->
                <div class="flex items-center justify-center mb-3">
                    <div class="flex items-center gap-2 px-3 py-1.5 rounded-full"
                         style="background: rgba(232,151,63,0.1);
                                border: 1px solid rgba(232,151,63,0.2);">
                        <!-- YouTube Play Button SVG -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="2" y="4" width="20" height="16" rx="4" stroke="#E8973F" stroke-width="1.5" fill="none"/>
                            <path d="M10 8.5L16 12L10 15.5V8.5Z" fill="#E8973F"/>
                        </svg>
                        <span class="text-xs font-montserrat font-semibold tracking-wider uppercase"
                              style="color: #E8973F;">
                            YouTube
                        </span>
                    </div>
                </div>

                <!-- Large Number Display -->
                <div class="text-center mb-1">
                    <span class="number-text font-montserrat font-black leading-none"
                          style="font-size: 3.5rem; letter-spacing: -2px;">
                        1,000+
                    </span>
                </div>

                <!-- Subscriber Label with Icon -->
                <div class="flex items-center justify-center gap-2 mb-4">
                    <!-- Subscriber Plus Icon SVG -->
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="10" cy="9" r="4" stroke="#CF9A34" stroke-width="1.5" fill="none"/>
                        <path d="M3 20C3 16.5 6 14 10 14C14 14 17 16.5 17 20" stroke="#CF9A34" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="20" y1="9" x2="20" y2="15" stroke="#35CC23" stroke-width="2" stroke-linecap="round"/>
                        <line x1="17" y1="12" x2="23" y2="12" stroke="#35CC23" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span class="text-sm font-poppins font-medium tracking-wide"
                          style="color: rgba(207,154,52,0.9);">
                        Subscribers
                    </span>
                    <!-- Green checkmark -->
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" fill="#35CC23" opacity="0.2"/>
                        <circle cx="12" cy="12" r="10" stroke="#35CC23" stroke-width="1.5" fill="none"/>
                        <path d="M8 12.5L11 15.5L16.5 9" stroke="#35CC23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>

                <!-- Divider -->
                <div class="mx-auto mb-4 rounded-full"
                     style="width: 80%; height: 1px;
                            background: linear-gradient(90deg, transparent, rgba(207,154,52,0.3), transparent);">
                </div>

                <!-- Quote Text -->
                <div class="text-center">
                    <p class="text-xs font-poppins font-light leading-relaxed"
                       style="color: rgba(255,255,255,0.7);">
                        "I just got over
                        <span class="font-bold" style="color: #E8973F;">1,000 subscribers</span>
                        on YouTube."
                    </p>
                </div>

                <!-- Decorative corner accents -->
                <div class="absolute top-3 left-3 w-3 h-3 border-t border-l rounded-tl-sm"
                     style="border-color: rgba(207,154,52,0.3);"></div>
                <div class="absolute top-3 right-3 w-3 h-3 border-t border-r rounded-tr-sm"
                     style="border-color: rgba(207,154,52,0.3);"></div>
                <div class="absolute bottom-3 left-3 w-3 h-3 border-b border-l rounded-bl-sm"
                     style="border-color: rgba(207,154,52,0.3);"></div>
                <div class="absolute bottom-3 right-3 w-3 h-3 border-b border-r rounded-br-sm"
                     style="border-color: rgba(207,154,52,0.3);"></div>
            </div>
        </div>

        <!-- Top-left badge / context label -->
        <div class="absolute top-4 left-4 z-20">
            <div class="flex items-center gap-2 px-3 py-2 rounded-xl"
                 style="background: rgba(84,42,6,0.5);
                        border: 1px solid rgba(207,154,52,0.15);
                        backdrop-filter: blur(12px);">
                <!-- Small celebration icon -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"
                          fill="#F6C71E" opacity="0.9"/>
                </svg>
                <span class="text-xs font-montserrat font-bold tracking-widest uppercase"
                      style="color: #F6C71E;">
                    Milestone
                </span>
            </div>
        </div>

        <!-- Bottom decorative particle dots -->
        <div class="absolute bottom-6 left-8 w-1.5 h-1.5 rounded-full"
             style="background: #E8973F; box-shadow: 0 0 8px rgba(232,151,63,0.6);"></div>
        <div class="absolute bottom-12 left-16 w-1 h-1 rounded-full"
             style="background: #CF9A34; box-shadow: 0 0 6px rgba(207,154,52,0.5);"></div>
        <div class="absolute bottom-4 right-20 w-1 h-1 rounded-full"
             style="background: #D36708; box-shadow: 0 0 6px rgba(211,103,8,0.5);"></div>

    </div>

</body>
</html>
