<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Scene 12.2 - Split Grid Layout</title>
    <style>
        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Container chính mô phỏng màn hình video */
        .split-grid-container {
            display: flex;
            width: 850px;
            height: 480px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
            transform-origin: center;
            /* Motion: Mask Reveal từ giữa ra hai phía (0.4s) */
            animation: maskReveal 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Vùng trái (40%): A-roll Người nói */
        .left-aroll {
            width: 40%;
            background: linear-gradient(145deg, #1e1e24, #0f0f12);
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px solid rgba(232, 151, 63, 0.15);
            position: relative;
        }
        .presenter-placeholder {
            color: #55565a;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Vùng phải (60%): Nền Grid với dots mờ */
        .right-content {
            width: 60%;
            background-color: #200F00;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
        }

        /* Cấu trúc các hộp so sánh */
        .box {
            width: 280px;
            padding: 15px 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        /* Hộp BEFORE */
        .before-box {
            background-color: #542A06;
            border: 2px solid #C21403;
        }
        .before-label {
            background-color: #C21403;
            color: #fff;
        }
        .text-before {
            font-size: 24px;
            color: #a9adb1;
            font-weight: 500;
            position: relative;
            display: inline-block;
        }
        /* Motion: Strikethrough line đỏ (Trim Paths từ 0->100%) */
        .text-before::after {
            content: "";
            position: absolute;
            left: 0;
            top: 55%;
            width: 0;
            height: 3px;
            background-color: #C21403;
            animation: strikethrough 0.5s ease-out 0.6s forwards;
        }

        /* Mũi tên nối màu #E8973F */
        .arrow {
            color: #E8973F;
            font-size: 32px;
            margin: 8px 0;
            font-weight: bold;
            line-height: 1;
        }

        /* Khối chứa AFTER và Metrics Overlay */
        .after-container {
            display: flex;
            align-items: center;
            width: 410px; 
            justify-content: flex-start;
            padding-left: 25px;
        }

        /* Hộp AFTER */
        .after-box {
            background-color: #150A01;
            border: 2px solid #35CC23;
        }
        .after-label {
            background-color: #35CC23;
            color: #fff;
        }
        .text-after {
            font-size: 24px;
            color: #F6C71E;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        /* Điểm chung của nhãn định danh */
        .label {
            font-size: 10px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        /* Khu vực chỉ số bên phải hộp AFTER */
        .metrics-overlay {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-left: 15px;
        }

        /* Motion: Slide in từ bên phải, stagger 0.15s */
        .metric-badge {
            border: 1px solid #35CC23;
            color: #35CC23;
            background-color: rgba(53, 204, 35, 0.1);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            opacity: 0;
            transform: translateX(30px);
            animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .metric-badge:nth-child(1) { animation-delay: 1.1s; }
        .metric-badge:nth-child(2) { animation-delay: 1.25s; }

        /* Định nghĩa hệ thống Animations */
        @keyframes maskReveal {
            from { transform: scaleX(0); opacity: 0; }
            to { transform: scaleX(1); opacity: 1; }
        }
        @keyframes strikethrough {
            to { width: 100%; }
        }
        @keyframes slideIn {
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="split-grid-container">
        <div class="left-aroll">
            <div class="presenter-placeholder">[ 👤 A-ROLL SPEAKER ]</div>
        </div>

        <div class="right-content">
            
            <div class="box before-box">
                <span class="label before-label">BEFORE</span>
                <span class="text-before">anti-edit</span>
            </div>

            <div class="arrow">↓</div>

            <div class="after-container">
                <div class="box after-box">
                    <span class="label after-label">AFTER</span>
                    <span class="text-after">NO EDITING</span>
                </div>
                
                <div class="metrics-overlay">
                    <div class="metric-badge">CTR ↑</div>
                    <div class="metric-badge">VIEWS ↑</div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
