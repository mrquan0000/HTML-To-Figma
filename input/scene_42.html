<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved Hooks — Overlay Card</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* =============================================
           RESET & BASE
           ============================================= */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
        }

        /* =============================================
           SCENE — Full-viewport background
           ============================================= */
        .scene {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 50% 36%, rgba(84, 42, 6, 0.28) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(207, 154, 52, 0.05) 0%, transparent 45%),
                radial-gradient(circle at 30% 65%, rgba(213, 103, 8, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 70% 30%, rgba(84, 42, 6, 0.04) 0%, transparent 35%),
                #150A01;
            overflow: hidden;
        }

        /* Cinematic vignette */
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(
                ellipse 62% 62% at 50% 50%,
                transparent 35%,
                rgba(21, 10, 1, 0.88) 100%
            );
            pointer-events: none;
            z-index: 2;
        }

        /* =============================================
           SPEAKER (A-Roll Silhouette)
           ============================================= */
        .speaker {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .speaker-head {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(
                circle at 46% 40%,
                rgba(207, 154, 52, 0.22) 0%,
                rgba(84, 42, 6, 0.07) 75%,
                transparent 100%
            );
            box-shadow: 0 0 70px 15px rgba(207, 154, 52, 0.06);
        }

        .speaker-neck {
            width: 34px;
            height: 18px;
            background: rgba(207, 154, 52, 0.06);
            border-radius: 4px;
        }

        .speaker-body {
            width: 200px;
            height: 95px;
            border-radius: 100px 100px 0 0;
            background: radial-gradient(
                ellipse 55% 85% at 50% 0%,
                rgba(207, 154, 52, 0.14) 0%,
                rgba(84, 42, 6, 0.05) 75%,
                transparent 100%
            );
            box-shadow: 0 0 50px 8px rgba(207, 154, 52, 0.04);
        }

        /* Warm spotlight behind speaker */
        .spotlight {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 340px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(
                ellipse,
                rgba(207, 154, 52, 0.08) 0%,
                rgba(232, 151, 63, 0.03) 40%,
                transparent 70%
            );
            z-index: 2;
            pointer-events: none;
        }

        /* =============================================
           FLOATING PARTICLES
           ============================================= */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 4;
        }

        .p1 { animation: pf1 7s ease-in-out infinite; }
        .p2 { animation: pf2 8.5s ease-in-out infinite; }
        .p3 { animation: pf3 6s ease-in-out infinite; }
        .p4 { animation: pf4 9s ease-in-out infinite; }
        .p5 { animation: pf5 7.5s ease-in-out infinite; }
        .p6 { animation: pf6 10s ease-in-out infinite; }

        @keyframes pf1 {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(-20px); opacity: 0.65; }
        }
        @keyframes pf2 {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.2; }
            50% { transform: translateY(-24px) translateX(10px); opacity: 0.5; }
        }
        @keyframes pf3 {
            0%, 100% { transform: translateY(0); opacity: 0.25; }
            50% { transform: translateY(-15px); opacity: 0.55; }
        }
        @keyframes pf4 {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.18; }
            50% { transform: translateY(-22px) translateX(-8px); opacity: 0.48; }
        }
        @keyframes pf5 {
            0%, 100% { transform: translateY(0); opacity: 0.15; }
            50% { transform: translateY(-18px); opacity: 0.45; }
        }
        @keyframes pf6 {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.12; }
            50% { transform: translateY(-14px) translateX(6px); opacity: 0.4; }
        }

        /* =============================================
           GLASSMORPHISM CARD
           ============================================= */
        .glass-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 560px;
            margin: 0 16px;
            padding: 44px 40px 36px;
            background:
                linear-gradient(145deg, rgba(207, 154, 52, 0.05) 0%, transparent 40%),
                rgba(32, 15, 0, 0.78);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(207, 154, 52, 0.42);
            border-radius: 24px;
            box-shadow:
                inset 0 1px 0 rgba(207, 154, 52, 0.08),
                0 0 18px rgba(207, 154, 52, 0.15),
                0 0 45px rgba(207, 154, 52, 0.08),
                0 0 90px rgba(207, 154, 52, 0.04),
                0 22px 60px rgba(0, 0, 0, 0.55);
            transform: scale(1);
            opacity: 1;
            overflow: hidden;
            animation:
                cardPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1),
                cardGlow 4s ease-in-out 0.9s infinite;
        }

        @keyframes cardPop {
            0%   { transform: scale(0.92); }
            100% { transform: scale(1); }
        }

        @keyframes cardGlow {
            0%, 100% {
                box-shadow:
                    inset 0 1px 0 rgba(207, 154, 52, 0.08),
                    0 0 18px rgba(207, 154, 52, 0.15),
                    0 0 45px rgba(207, 154, 52, 0.08),
                    0 0 90px rgba(207, 154, 52, 0.04),
                    0 22px 60px rgba(0, 0, 0, 0.55);
                border-color: rgba(207, 154, 52, 0.42);
            }
            50% {
                box-shadow:
                    inset 0 1px 0 rgba(207, 154, 52, 0.12),
                    0 0 28px rgba(207, 154, 52, 0.32),
                    0 0 65px rgba(207, 154, 52, 0.16),
                    0 0 110px rgba(207, 154, 52, 0.07),
                    0 22px 60px rgba(0, 0, 0, 0.55);
                border-color: rgba(207, 154, 52, 0.65);
            }
        }

        /* Top neon accent bar */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 28px;
            right: 28px;
            height: 2px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(207, 154, 52, 0.5),
                rgba(246, 199, 30, 0.7),
                rgba(207, 154, 52, 0.5),
                transparent
            );
            border-radius: 2px;
            z-index: 20;
        }

        /* Lightsweep shimmer */
        .glass-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 65%;
            height: 100%;
            background: linear-gradient(
                100deg,
                transparent 25%,
                rgba(207, 154, 52, 0.035) 42%,
                rgba(246, 199, 30, 0.07) 50%,
                rgba(207, 154, 52, 0.035) 58%,
                transparent 75%
            );
            animation: lightsweep 5s ease-in-out 1.5s infinite;
            pointer-events: none;
            z-index: 20;
            border-radius: 24px;
        }

        @keyframes lightsweep {
            0%   { left: -120%; }
            100% { left: 220%; }
        }

        /* =============================================
           TEXT GLOW EFFECTS
           ============================================= */
        .text-glow-yellow {
            text-shadow:
                0 0 12px rgba(246, 199, 30, 0.55),
                0 0 35px rgba(246, 199, 30, 0.25),
                0 0 60px rgba(246, 199, 30, 0.1);
        }

        .text-glow-green {
            text-shadow:
                0 0 12px rgba(53, 204, 35, 0.45),
                0 0 28px rgba(53, 204, 35, 0.18);
        }

        /* =============================================
           ICON BOXES
           ============================================= */
        .icon-box {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* =============================================
           DIVIDER
           ============================================= */
        .divider-gradient {
            background: linear-gradient(
                90deg,
                transparent,
                rgba(207, 154, 52, 0.45),
                transparent
            );
        }

        /* Quote marks */
        .quote-mark {
            font-family: Georgia, 'Times New Roman', serif;
            line-height: 1;
        }

        /* =============================================
           RESPONSIVE ADJUSTMENTS
           ============================================= */
        @media (max-width: 480px) {
            .glass-card {
                padding: 32px 24px 28px;
            }
            .speaker-head {
                width: 72px;
                height: 72px;
            }
            .speaker-body {
                width: 150px;
                height: 70px;
                border-radius: 75px 75px 0 0;
            }
        }
    </style>
</head>
<body>

    <!-- ================================================
         SCENE CONTAINER
         ================================================ -->
    <div class="scene">

        <!-- Cinematic vignette -->
        <div class="vignette"></div>

        <!-- Floating ambient particles -->
        <div class="particle p1" style="width:4px; height:4px; background:rgba(207,154,52,0.45); top:16%; left:10%;"></div>
        <div class="particle p2" style="width:3px; height:3px; background:rgba(246,199,30,0.3); top:26%; right:16%;"></div>
        <div class="particle p3" style="width:5px; height:5px; background:rgba(207,154,52,0.25); bottom:20%; left:20%;"></div>
        <div class="particle p4" style="width:3px; height:3px; background:rgba(207,154,52,0.32); bottom:30%; right:12%;"></div>
        <div class="particle p5" style="width:4px; height:4px; background:rgba(232,151,63,0.22); top:58%; left:7%;"></div>
        <div class="particle p6" style="width:3px; height:3px; background:rgba(207,154,52,0.2); top:14%; right:30%;"></div>

        <!-- Warm studio spotlight -->
        <div class="spotlight"></div>

        <!-- Speaker silhouette (A-Roll) -->
        <div class="speaker">
            <div class="speaker-head"></div>
            <div class="speaker-neck"></div>
            <div class="speaker-body"></div>
        </div>

        <!-- ============================================
             GLASSMORPHISM CARD — The Overlay Pop
             ============================================ -->
        <div class="glass-card">

            <!-- Icon Row -->
            <div class="flex items-center justify-center gap-5 mb-6">

                <!-- Hook Icon -->
                <div class="icon-box w-[58px] h-[58px] rounded-2xl flex items-center justify-center"
                     style="background:rgba(207,154,52,0.12); border:1px solid rgba(207,154,52,0.28);">
                    <svg width="30" height="30" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="17" cy="4" r="2.5"
                                stroke="#CF9A34" stroke-width="2" fill="none"
                                style="filter:drop-shadow(0 0 5px rgba(207,154,52,0.6));"/>
                        <path d="M17 6.5 L17 15 C17 21 11 23.5 7.5 20"
                              stroke="#CF9A34" stroke-width="2.5" stroke-linecap="round" fill="none"
                              style="filter:drop-shadow(0 0 6px rgba(207,154,52,0.5));"/>
                    </svg>
                </div>

                <!-- Retention / Growth Chart Icon -->
                <div class="icon-box w-[58px] h-[58px] rounded-2xl flex items-center justify-center"
                     style="background:rgba(53,204,35,0.1); border:1px solid rgba(53,204,35,0.22);">
                    <svg width="30" height="30" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <polyline points="4,20 10,12 15,16 24,6"
                                  stroke="#35CC23" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                                  style="filter:drop-shadow(0 0 6px rgba(53,204,35,0.55));"/>
                        <polyline points="18,6 24,6 24,12"
                                  stroke="#35CC23" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                                  style="filter:drop-shadow(0 0 6px rgba(53,204,35,0.55));"/>
                    </svg>
                </div>

            </div>

            <!-- Title -->
            <h2 class="text-center font-black text-3xl sm:text-4xl tracking-wider text-glow-yellow mb-2 uppercase"
                style="color:#F6C71E; letter-spacing:0.14em;">
                IMPROVED HOOKS
            </h2>

            <!-- Subtitle -->
            <p class="text-center font-bold text-lg sm:text-xl tracking-wide text-glow-green mb-6"
               style="color:#35CC23; letter-spacing:0.06em;">
                Increased Retention
            </p>

            <!-- Gradient Divider -->
            <div class="divider-gradient h-px w-full mb-7"></div>

            <!-- Quote Text -->
            <div class="px-0 sm:px-2">
                <p class="text-center leading-relaxed text-base sm:text-[17px] font-medium"
                   style="color:rgba(255,255,255,0.88);">
                    <span class="quote-mark text-[26px] sm:text-[30px] inline-block"
                          style="color:#E8973F; vertical-align:-4px; margin-right:2px;">&#8220;</span>And once I improved my <span class="font-bold" style="color:#F6C71E;">hooks</span>, my <span class="font-bold" style="color:#35CC23;">retention</span> improved a lot too, which is what helped YouTube push my videos that much harder.<span class="quote-mark text-[26px] sm:text-[30px] inline-block"
                          style="color:#E8973F; vertical-align:-4px; margin-left:2px;">&#8221;</span>
                </p>
            </div>

            <!-- Bottom Accent -->
            <div class="flex items-center justify-center gap-2.5 mt-8">
                <div class="w-1.5 h-1.5 rounded-full" style="background:rgba(207,154,52,0.4);"></div>
                <div class="w-10 h-[3px] rounded-full" style="background:linear-gradient(90deg, #CF9A34, #F6C71E, #CF9A34);"></div>
                <div class="w-1.5 h-1.5 rounded-full" style="background:rgba(207,154,52,0.4);"></div>
            </div>

        </div>
        <!-- END Glass Card -->

    </div>
    <!-- END Scene -->

</body>
</html>
