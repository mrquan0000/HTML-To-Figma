<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improvement, Not Perfection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orange: '#E8973F',
                            deepOrange: '#D36708',
                            darkWarm: '#200F00',
                            brightYellow: '#F6C71E',
                            glassGray: '#A9ADB1',
                            specialDark: '#150A01',
                            warmWood: '#542A06',
                            redAccent: '#C21403',
                            goldNeon: '#CF9A34',
                            positiveGreen: '#35CC23',
                        }
                    },
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(32, 15, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid rgba(207, 154, 52, 0.4);
            box-shadow: 
                0 0 30px rgba(207, 154, 52, 0.25),
                0 0 60px rgba(207, 154, 52, 0.1),
                0 25px 50px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* Neon Glow Border Animation */
        .neon-border {
            position: relative;
        }

        .neon-border::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 26px;
            background: linear-gradient(45deg, 
                rgba(207, 154, 52, 0.6), 
                rgba(246, 199, 30, 0.3), 
                rgba(207, 154, 52, 0.6),
                rgba(232, 151, 63, 0.3));
            background-size: 300% 300%;
            animation: neonShift 4s ease-in-out infinite;
            z-index: -1;
            filter: blur(3px);
        }

        @keyframes neonShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Glow Pulse Animation */
        .glow-pulse {
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 
                    0 0 30px rgba(207, 154, 52, 0.25),
                    0 0 60px rgba(207, 154, 52, 0.1);
            }
            50% {
                box-shadow: 
                    0 0 40px rgba(207, 154, 52, 0.4),
                    0 0 80px rgba(207, 154, 52, 0.2),
                    0 0 120px rgba(207, 154, 52, 0.1);
            }
        }

        /* Pop-up Animation */
        .pop-up {
            animation: popUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popUp {
            0% {
                transform: scale(0.6) translateY(30px);
                opacity: 1;
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        /* Title Glow */
        .title-glow {
            text-shadow: 
                0 0 10px rgba(246, 199, 30, 0.5),
                0 0 30px rgba(246, 199, 30, 0.3),
                0 0 50px rgba(246, 199, 30, 0.1);
        }

        /* Green Glow */
        .green-glow {
            text-shadow: 
                0 0 8px rgba(53, 204, 35, 0.4),
                0 0 20px rgba(53, 204, 35, 0.2);
        }

        /* Lightsweep Effect */
        .lightsweep {
            position: relative;
            overflow: hidden;
        }

        .lightsweep::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.05),
                transparent
            );
            animation: sweep 4s ease-in-out infinite;
        }

        @keyframes sweep {
            0% { left: -100%; }
            50%, 100% { left: 150%; }
        }

        /* Progress Bar Animation */
        .progress-fill {
            animation: progressGrow 2s ease-out forwards;
        }

        @keyframes progressGrow {
            0% { width: 0%; }
            100% { width: 75%; }
        }

        /* Trophy Glow */
        .trophy-glow {
            filter: drop-shadow(0 0 8px rgba(246, 199, 30, 0.6));
            animation: trophyPulse 2s ease-in-out infinite;
        }

        @keyframes trophyPulse {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(246, 199, 30, 0.6)); }
            50% { filter: drop-shadow(0 0 15px rgba(246, 199, 30, 0.9)); }
        }

        /* Icon Background */
        .icon-bg {
            background: linear-gradient(135deg, rgba(207, 154, 52, 0.15), rgba(246, 199, 30, 0.05));
            border: 1px solid rgba(207, 154, 52, 0.3);
        }

        /* Fade-in for text elements */
        .fade-in-1 { animation: fadeIn 0.6s ease-out 0.3s both; }
        .fade-in-2 { animation: fadeIn 0.6s ease-out 0.5s both; }
        .fade-in-3 { animation: fadeIn 0.6s ease-out 0.7s both; }
        .fade-in-4 { animation: fadeIn 0.6s ease-out 0.9s both; }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Video background overlay gradient */
        .bg-overlay {
            background: radial-gradient(ellipse at center, 
                rgba(0, 0, 0, 0.4) 0%, 
                rgba(0, 0, 0, 0.7) 50%, 
                rgba(0, 0, 0, 0.9) 100%);
        }

        /* Speaker silhouette styling */
        .speaker-glow {
            box-shadow: 0 0 80px rgba(207, 154, 52, 0.15);
        }
    </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Background - Simulated dimmed video A-roll -->
    <div class="absolute inset-0">
        <!-- Simulated video background with warm dark tones -->
        <div class="absolute inset-0 bg-gradient-to-br from-[#150A01] via-[#0A0500] to-[#000000]"></div>
        
        <!-- Subtle warm light spots suggesting video background -->
        <div class="absolute top-1/4 left-1/3 w-96 h-96 bg-[#200F00] rounded-full blur-[100px] opacity-30"></div>
        <div class="absolute bottom-1/3 right-1/4 w-64 h-64 bg-[#542A06] rounded-full blur-[80px] opacity-20"></div>
        
        <!-- Simulated speaker silhouette (A-roll placeholder) -->
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-48 h-64 rounded-full bg-gradient-to-b from-[#542A06]/20 to-transparent speaker-glow"></div>
        
        <!-- Overlay gradient -->
        <div class="absolute inset-0 bg-overlay"></div>
    </div>

    <!-- Ambient light particles -->
    <div class="absolute top-1/4 left-1/4 w-2 h-2 bg-[#CF9A34] rounded-full opacity-30" style="animation: float 6s ease-in-out infinite;"></div>
    <div class="absolute top-1/3 right-1/3 w-1 h-1 bg-[#F6C71E] rounded-full opacity-20" style="animation: float 8s ease-in-out infinite 1s;"></div>
    <div class="absolute bottom-1/3 left-1/3 w-1.5 h-1.5 bg-[#CF9A34] rounded-full opacity-25" style="animation: float 7s ease-in-out infinite 2s;"></div>

    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.2; }
            50% { transform: translateY(-20px) scale(1.2); opacity: 0.4; }
        }
    </style>

    <!-- Main Card - Overlay Pop Layout -->
    <div class="relative z-10 w-full max-w-[600px] mx-4 pop-up">
        
        <!-- Card Container -->
        <div class="glass-card rounded-3xl p-8 md:p-10 lightsweep glow-pulse neon-border">
            
            <!-- Trophy Icon Section -->
            <div class="flex items-center justify-center mb-6 fade-in-1">
                <div class="icon-bg rounded-2xl p-4 inline-flex items-center justify-center">
                    <!-- Trophy SVG Icon -->
                    <svg class="w-12 h-12 trophy-glow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 21H16M12 21V17M7 4H17V8C17 10.7614 14.7614 13 12 13C9.23858 13 7 10.7614 7 8V4Z" stroke="#F6C71E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M7 6H4C4 6 3 6 3 7V8C3 9.65685 4.34315 11 6 11H7" stroke="#F6C71E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M17 6H20C20 6 21 6 21 7V8C21 9.65685 19.6569 11 18 11H17" stroke="#F6C71E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 17H9" stroke="#CF9A34" stroke-width="2" stroke-linecap="round"/>
                        <path d="M12 17H15" stroke="#CF9A34" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>

            <!-- Title Section -->
            <div class="text-center mb-4 fade-in-2">
                <h1 class="text-3xl md:text-4xl font-black text-[#F6C71E] tracking-wider leading-tight title-glow uppercase">
                    IMPROVEMENT,<br>
                    <span class="text-[#E8973F]">NOT PERFECTION</span>
                </h1>
            </div>

            <!-- Decorative Line -->
            <div class="w-24 h-0.5 mx-auto mb-4 bg-gradient-to-r from-transparent via-[#CF9A34] to-transparent fade-in-2"></div>

            <!-- Subtitle -->
            <div class="text-center mb-6 fade-in-3">
                <p class="text-lg md:text-xl font-semibold text-[#35CC23] tracking-wide green-glow">
                    YouTube rewards progress
                </p>
            </div>

            <!-- Progress Bar Section -->
            <div class="mb-8 fade-in-3">
                <div class="flex items-center justify-center gap-3 mb-3">
                    <!-- Progress Bar Icon -->
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="6" width="20" height="12" rx="2" stroke="#CF9A34" stroke-width="1.5"/>
                        <path d="M5 12H19" stroke="#542A06" stroke-width="6" stroke-linecap="round"/>
                        <path d="M5 12H14" stroke="#35CC23" stroke-width="6" stroke-linecap="round">
                            <animate attributeName="d" from="M5 12H5" to="M5 12H14" dur="2s" fill="freeze"/>
                        </path>
                    </svg>
                    <span class="text-xs font-medium text-[#A9ADB1] uppercase tracking-widest">Growth in Progress</span>
                </div>
                <!-- Visual Progress Bar -->
                <div class="w-full max-w-xs mx-auto h-2 bg-[#0A0500] rounded-full overflow-hidden border border-[#542A06]/30">
                    <div class="progress-fill h-full bg-gradient-to-r from-[#35CC23] to-[#E8973F] rounded-full"></div>
                </div>
                <div class="flex justify-between max-w-xs mx-auto mt-1.5">
                    <span class="text-[10px] text-[#542A06]">START</span>
                    <span class="text-[10px] text-[#35CC23]">75% PROGRESS</span>
                </div>
            </div>

            <!-- Quote Content -->
            <div class="fade-in-4">
                <div class="relative bg-gradient-to-br from-[#150A01]/80 to-[#200F00]/60 rounded-2xl p-5 md:p-6 border border-[#542A06]/20">
                    <!-- Quote Icon -->
                    <svg class="absolute -top-3 -left-1 w-8 h-8 opacity-30" viewBox="0 0 24 24" fill="#CF9A34">
                        <path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"/>
                    </svg>
                    
                    <p class="text-white/90 text-sm md:text-base leading-relaxed font-medium italic pl-6">
                        "And one thing I noticed really quickly is that YouTube rewards <span class="text-[#35CC23] font-bold not-italic">improvement</span> and <span class="text-[#C21403] font-bold not-italic">not perfection</span>."
                    </p>
                </div>
            </div>

            <!-- Bottom Icons Section -->
            <div class="flex items-center justify-center gap-6 mt-6 fade-in-4">
                <!-- Left decorative element -->
                <div class="flex items-center gap-2">
                    <div class="w-8 h-0.5 bg-gradient-to-r from-transparent to-[#CF9A34]/40"></div>
                    <svg class="w-5 h-5 opacity-50" viewBox="0 0 24 24" fill="#E8973F">
                        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                    </svg>
                </div>
                
                <!-- Progress/Arrow Up Icon -->
                <div class="icon-bg rounded-xl p-2.5">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 19V5M12 5L5 12M12 5L19 12" stroke="#35CC23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                
                <!-- Right decorative element -->
                <div class="flex items-center gap-2">
                    <svg class="w-5 h-5 opacity-50" viewBox="0 0 24 24" fill="#E8973F">
                        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                    </svg>
                    <div class="w-8 h-0.5 bg-gradient-to-l from-transparent to-[#CF9A34]/40"></div>
                </div>
            </div>

        </div>

        <!-- External glow effect behind card -->
        <div class="absolute -inset-4 bg-[#CF9A34] rounded-[28px] opacity-[0.08] blur-xl -z-10"></div>
        <div class="absolute -inset-8 bg-[#F6C71E] rounded-[32px] opacity-[0.04] blur-2xl -z-20"></div>

    </div>

</body>
</html>
