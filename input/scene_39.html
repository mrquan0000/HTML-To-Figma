<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hook Strategy Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 16 / 9;
            background-color: #150A01;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 60px rgba(207, 154, 52, 0.08), 0 20px 80px rgba(0, 0, 0, 0.6);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(32, 15, 0, 0.9), rgba(21, 10, 1, 0.85));
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1.5px solid rgba(207, 154, 52, 0.5);
            border-radius: 20px;
            box-shadow:
                0 0 12px rgba(207, 154, 52, 0.35),
                0 0 35px rgba(207, 154, 52, 0.12),
                0 0 70px rgba(207, 154, 52, 0.06),
                0 12px 40px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                inset 0 -1px 0 rgba(207, 154, 52, 0.05);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(207, 154, 52, 0.06), transparent);
            animation: lightsweep 4s ease-in-out infinite;
            pointer-events: none;
        }

        .glass-card::after {
            content: '';
            position: absolute;
            top: -1px;
            left: 20%;
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(246, 199, 30, 0.4), transparent);
            pointer-events: none;
        }

        @keyframes lightsweep {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(300%); }
        }

        @keyframes subtlePulse {
            0%, 100% {
                box-shadow:
                    0 0 12px rgba(207, 154, 52, 0.35),
                    0 0 35px rgba(207, 154, 52, 0.12),
                    0 0 70px rgba(207, 154, 52, 0.06),
                    0 12px 40px rgba(0, 0, 0, 0.5);
            }
            50% {
                box-shadow:
                    0 0 18px rgba(207, 154, 52, 0.45),
                    0 0 45px rgba(207, 154, 52, 0.18),
                    0 0 80px rgba(207, 154, 52, 0.08),
                    0 12px 40px rgba(0, 0, 0, 0.5);
            }
        }

        .glass-card {
            animation: subtlePulse 3s ease-in-out infinite;
        }

        .title-glow {
            text-shadow:
                0 0 12px rgba(246, 199, 30, 0.5),
                0 0 30px rgba(246, 199, 30, 0.2),
                0 0 60px rgba(246, 199, 30, 0.1);
        }

        .accent-text-glow {
            text-shadow:
                0 0 10px rgba(232, 151, 63, 0.4),
                0 0 25px rgba(232, 151, 63, 0.15);
        }

        .icon-glow {
            filter: drop-shadow(0 0 6px rgba(246, 199, 30, 0.5));
        }

        .check-glow {
            filter: drop-shadow(0 0 4px rgba(53, 204, 35, 0.4));
        }

        .speaker-gradient {
            background: linear-gradient(135deg, #150A01 0%, #0D0600 40%, #1A0D02 100%);
        }

        .divider-line {
            height: 1px;
            background: linear-gradient(90deg, rgba(207, 154, 52, 0.5), rgba(232, 151, 63, 0.3), transparent);
        }

        .dot-pattern {
            background-image: radial-gradient(rgba(207, 154, 52, 0.08) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Fade-in animation for text elements */
        @keyframes fadeInUp {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-1 { animation: fadeInUp 0.6s ease-out forwards; }
        .fade-in-2 { animation: fadeInUp 0.6s ease-out 0.15s forwards; }
        .fade-in-3 { animation: fadeInUp 0.6s ease-out 0.3s forwards; }
        .fade-in-4 { animation: fadeInUp 0.6s ease-out 0.45s forwards; }
        .fade-in-5 { animation: fadeInUp 0.6s ease-out 0.6s forwards; }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Split Grid: Left + Right -->
        <div class="flex h-full">

            <!-- LEFT HALF — Card Area (55%) -->
            <div class="flex items-center justify-center p-4" style="width: 55%;">
                <div class="glass-card w-full p-5">

                    <!-- Header: Icon + Title -->
                    <div class="flex items-center gap-2.5 mb-4 fade-in-1">
                        <!-- Target Icon -->
                        <div class="icon-glow flex-shrink-0">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="12" r="10" stroke="#F6C71E" stroke-width="1.5" fill="none"/>
                                <circle cx="12" cy="12" r="6" stroke="#F6C71E" stroke-width="1.5" fill="none"/>
                                <circle cx="12" cy="12" r="2.5" fill="#F6C71E"/>
                                <line x1="12" y1="2" x2="12" y2="6" stroke="#F6C71E" stroke-width="1.5" stroke-linecap="round"/>
                                <line x1="12" y1="18" x2="12" y2="22" stroke="#F6C71E" stroke-width="1.5" stroke-linecap="round"/>
                                <line x1="2" y1="12" x2="6" y2="12" stroke="#F6C71E" stroke-width="1.5" stroke-linecap="round"/>
                                <line x1="18" y1="12" x2="22" y2="12" stroke="#F6C71E" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <h1 class="title-glow text-lg font-extrabold tracking-widest uppercase" style="color: #F6C71E; letter-spacing: 0.15em;">
                            HOOK STRATEGY
                        </h1>
                    </div>

                    <!-- Divider -->
                    <div class="divider-line mb-4 fade-in-2"></div>

                    <!-- Bullet Points -->
                    <div class="space-y-3 mb-4">
                        <!-- Bullet 1 -->
                        <div class="flex items-start gap-2.5 fade-in-3">
                            <div class="check-glow flex-shrink-0 mt-0.5">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <rect x="2" y="2" width="20" height="20" rx="6" fill="rgba(53, 204, 35, 0.15)" stroke="#35CC23" stroke-width="1.5"/>
                                    <path d="M7 12.5L10.5 16L17 8.5" stroke="#35CC23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <p class="text-white text-sm font-medium leading-snug">
                                Viewers want <span class="font-bold" style="color: #F6C71E;">results</span>
                            </p>
                        </div>

                        <!-- Bullet 2 -->
                        <div class="flex items-start gap-2.5 fade-in-4">
                            <div class="check-glow flex-shrink-0 mt-0.5">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <rect x="2" y="2" width="20" height="20" rx="6" fill="rgba(53, 204, 35, 0.15)" stroke="#35CC23" stroke-width="1.5"/>
                                    <path d="M7 12.5L10.5 16L17 8.5" stroke="#35CC23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <p class="text-white text-sm font-medium leading-snug">
                                Confirm <span class="font-bold" style="color: #F6C71E;">right decision</span>
                            </p>
                        </div>
                    </div>

                    <!-- Accent Line: Create Contrast -->
                    <div class="divider-line mb-3 fade-in-5" style="height: 1px; background: linear-gradient(90deg, rgba(232, 151, 63, 0.5), transparent);"></div>
                    <div class="fade-in-5">
                        <p class="accent-text-glow text-sm font-bold tracking-wide uppercase" style="color: #E8973F; letter-spacing: 0.1em;">
                            ▸ Create Contrast
                        </p>
                    </div>

                </div>
            </div>

            <!-- RIGHT HALF — Speaker Area (45%) -->
            <div class="speaker-gradient flex items-center justify-center relative" style="width: 45%;">
                <!-- Subtle dot pattern background -->
                <div class="absolute inset-0 dot-pattern opacity-50"></div>

                <!-- Speaker placeholder silhouette area -->
                <div class="relative flex flex-col items-center justify-center gap-2" style="opacity: 1;">
                    <!-- Person silhouette placeholder -->
                    <div class="rounded-full flex items-center justify-center" style="width: 64px; height: 64px; background: linear-gradient(135deg, rgba(207, 154, 52, 0.1), rgba(32, 15, 0, 0.6)); border: 1px solid rgba(207, 154, 52, 0.2);">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="8" r="4" stroke="rgba(207, 154, 52, 0.35)" stroke-width="1.5"/>
                            <path d="M4 20C4 16 7.5 13.5 12 13.5C16.5 13.5 20 16 20 20" stroke="rgba(207, 154, 52, 0.35)" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <p class="text-xs font-medium tracking-wider uppercase" style="color: rgba(207, 154, 52, 0.3); letter-spacing: 0.15em;">
                        SPEAKER
                    </p>
                </div>

                <!-- Subtle ambient glow at bottom-right -->
                <div class="absolute bottom-0 right-0 w-32 h-32 rounded-full" style="background: radial-gradient(circle, rgba(207, 154, 52, 0.06) 0%, transparent 70%);"></div>
            </div>

        </div>

        <!-- Top-left corner accent -->
        <div class="absolute top-0 left-0 w-16 h-16 pointer-events-none">
            <div class="absolute top-0 left-0 w-full h-px" style="background: linear-gradient(90deg, rgba(207, 154, 52, 0.4), transparent);"></div>
            <div class="absolute top-0 left-0 w-px h-full" style="background: linear-gradient(180deg, rgba(207, 154, 52, 0.4), transparent);"></div>
        </div>

        <!-- Bottom-right corner accent -->
        <div class="absolute bottom-0 right-0 w-16 h-16 pointer-events-none">
            <div class="absolute bottom-0 right-0 w-full h-px" style="background: linear-gradient(270deg, rgba(207, 154, 52, 0.4), transparent);"></div>
            <div class="absolute bottom-0 right-0 w-px h-full" style="background: linear-gradient(0deg, rgba(207, 154, 52, 0.4), transparent);"></div>
        </div>
    </div>
</body>
</html>
